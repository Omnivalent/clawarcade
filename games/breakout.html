<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Neon Breakout - ClawArcade</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100dvh;overflow:hidden;background:#0a0a1a;color:#fff;font-family:'Orbitron',-apple-system,sans-serif;touch-action:none;user-select:none}
/* Animated cyberpunk background */
body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
        linear-gradient(180deg, rgba(255,0,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,0,255,0.02) 1px, transparent 1px),
        radial-gradient(ellipse at 50% 0%, rgba(255,0,255,0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 100%, rgba(0,255,255,0.08) 0%, transparent 50%);
    background-size: 25px 25px, 25px 25px, 100% 100%, 100% 100%;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
    z-index: -1;
}
@keyframes gridMove {
    0% { background-position: 0 0, 0 0, 0 0, 0 0; }
    100% { background-position: 0 50px, 50px 0, 0 0, 0 0; }
}
body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.06) 0px, rgba(0,0,0,0.06) 1px, transparent 1px, transparent 3px);
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
}
#app{display:flex;flex-direction:column;height:100dvh}
#top{height:42px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);border-bottom:2px solid rgba(255,0,255,0.4);box-shadow:0 2px 20px rgba(255,0,255,0.2);font-size:15px}
.title{color:#f0f;text-shadow:0 0 12px #f0f,0 0 25px rgba(255,0,255,0.4);letter-spacing:2px;animation:neonPulse 2s ease-in-out infinite}
@keyframes neonPulse{0%,100%{text-shadow:0 0 12px #f0f,0 0 25px rgba(255,0,255,0.4)}50%{text-shadow:0 0 20px #f0f,0 0 40px rgba(255,0,255,0.6)}}
.info span{margin:0 8px;font-size:14px;transition:transform 0.2s}
.info span.pop{transform:scale(1.4)}
.sc{color:#0ff;text-shadow:0 0 8px #0ff}
.lv{color:#f44;text-shadow:0 0 8px #f44}
.level-display{color:#0f0;text-shadow:0 0 8px #0f0}
.wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.wrap.shake{animation:shake 0.25s ease-out}
@keyframes shake{0%,100%{transform:translate(0,0) rotate(0deg)}15%{transform:translate(-4px,3px) rotate(-0.5deg)}30%{transform:translate(4px,-3px) rotate(0.5deg)}45%{transform:translate(-3px,4px) rotate(-0.3deg)}60%{transform:translate(3px,-4px) rotate(0.3deg)}}
canvas{display:block;border:3px solid #f0f;border-radius:6px;box-shadow:0 0 30px rgba(255,0,255,0.35),0 0 60px rgba(255,0,255,0.1),inset 0 0 25px rgba(255,0,255,0.08);transition:box-shadow 0.3s}
#controls{height:70px;display:flex;align-items:center;justify-content:center;gap:14px;background:rgba(0,0,0,0.5);border-top:2px solid rgba(255,0,255,0.2);backdrop-filter:blur(10px)}
#controls button{min-width:48px;min-height:48px;padding:10px 18px;border:2px solid #f0f;background:rgba(255,0,255,0.1);color:#f0f;border-radius:25px;font-size:14px;cursor:pointer;transition:all 0.2s;font-family:'Orbitron',sans-serif;text-shadow:0 0 5px rgba(255,0,255,0.5)}
#controls button:active{background:rgba(255,0,255,0.35);transform:scale(0.95);box-shadow:0 0 20px rgba(255,0,255,0.5)}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,5,20,0.95);z-index:10;backdrop-filter:blur(10px)}
#overlay.hidden{display:none}
#overlay h2{color:#f0f;text-shadow:0 0 15px #f0f,0 0 30px rgba(255,0,255,0.4);font-size:1.5rem;margin-bottom:16px;letter-spacing:3px}
#overlay p{color:#aaa;margin-bottom:24px;font-size:15px;text-align:center;padding:0 25px;line-height:1.5}
#overlay button{min-height:50px;padding:12px 36px;border:3px solid #f0f;background:linear-gradient(135deg,rgba(255,0,255,0.2),rgba(0,255,255,0.1));color:#fff;border-radius:25px;font-size:17px;cursor:pointer;margin:6px;font-family:'Orbitron',sans-serif;text-shadow:0 0 8px rgba(255,0,255,0.6);box-shadow:0 0 20px rgba(255,0,255,0.3);transition:all 0.25s}
#overlay button:active{background:linear-gradient(135deg,rgba(255,0,255,0.4),rgba(0,255,255,0.2));transform:scale(0.95);box-shadow:0 0 35px rgba(255,0,255,0.5)}
/* roguelite upgrade draft overlay */
#draft{position:absolute;inset:0;z-index:9;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,5,22,0.72);backdrop-filter:blur(5px)}
#draft.hidden{display:none}
#draft h2{color:#0ff;text-shadow:0 0 16px #0ff,0 0 34px rgba(0,255,255,0.5);font-size:1.35rem;letter-spacing:4px;margin-bottom:18px;animation:neonPulse 2s ease-in-out infinite}
#draftCards{display:flex;gap:12px;justify-content:center;align-items:stretch;padding:0 8px;width:100%}
.card{flex:0 1 172px;min-width:98px;min-height:180px;padding:18px 10px;border:2px solid rgba(0,255,255,0.7);border-radius:14px;background:linear-gradient(160deg,rgba(0,40,60,0.92),rgba(22,0,44,0.94));cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;font-family:'Orbitron',sans-serif;box-shadow:0 0 18px rgba(0,255,255,0.18),inset 0 0 22px rgba(0,255,255,0.05);transition:transform 0.15s,box-shadow 0.2s,border-color 0.2s;animation:cardIn 0.35s ease-out backwards}
.card:nth-child(2){animation-delay:0.08s}
.card:nth-child(3){animation-delay:0.16s}
@keyframes cardIn{from{opacity:0;transform:translateY(24px) scale(0.9)}to{opacity:1;transform:none}}
.card:hover,.card:active{transform:translateY(-4px) scale(1.03);box-shadow:0 0 30px rgba(0,255,255,0.5),inset 0 0 26px rgba(0,255,255,0.12);border-color:#0ff}
.card .ic{font-size:2.3rem;filter:drop-shadow(0 0 8px rgba(0,255,255,0.7))}
.card .nm{color:#0ff;font-size:12.5px;letter-spacing:1px;text-align:center;text-shadow:0 0 8px rgba(0,255,255,0.6)}
.card .fx{color:#bbb;font-size:10.5px;text-align:center;line-height:1.45}
.card .own{color:#f0f;font-size:10px;text-shadow:0 0 6px #f0f}
/* HUD upgrade chips */
#chips{position:absolute;top:8px;left:12px;z-index:5;display:flex;gap:6px;flex-wrap:wrap;pointer-events:none;max-width:62%}
.chip{font-size:12px;padding:2px 8px;border:1px solid rgba(0,255,255,0.55);border-radius:11px;background:rgba(0,10,20,0.62);color:#0ff;text-shadow:0 0 6px rgba(0,255,255,0.6);font-family:'Orbitron',sans-serif}
.combo-popup{position:absolute;font-size:1.6rem;font-weight:bold;pointer-events:none;animation:comboFloat 0.9s ease-out forwards;z-index:5;font-family:'Orbitron',sans-serif}
@keyframes comboFloat{0%{opacity:1;transform:translateY(0) scale(1)}50%{transform:translateY(-20px) scale(1.3)}100%{opacity:0;transform:translateY(-40px) scale(0.8)}}
</style>
</head>
<body>
<div id="app">
<div id="top">
<span class="title">💎 BREAKOUT</span>
<div class="info">
    <span class="level-display" id="levelDisplay">LV.1</span>
    <span class="sc" id="sc">Score: 0</span>
    <span class="lv" id="lv">♥♥♥</span>
</div>
</div>
<div class="wrap" id="wrap">
<canvas id="c"></canvas>
</div>
<div id="controls">
<button id="btnPause">⏸ Pause</button>
<button id="btnReset">🔄 Reset</button>
<button id="btnMute">🔊</button>
</div>
</div>
<div id="overlay">
<h2 id="overlayTitle">💎 NEON BREAKOUT</h2>
<p id="overlayMsg">Touch & drag to move paddle.<br>Break all bricks! Catch power-ups!</p>
<button id="btnStart">▶ START</button>
</div>
    <script src="../js/human-check.js"></script>
<script>
(function(){
const dpr = window.devicePixelRatio || 1;
let audioCtx = null, soundEnabled = true;

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}
document.addEventListener('click', () => initAudio(), {once: true});
document.addEventListener('touchstart', () => initAudio(), {once: true});

function playTone(f, t, d, v = 0.2) {
    if (!soundEnabled || !audioCtx) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.setValueAtTime(v, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + d);
}
function playPaddleHit() { playTone(330, 'sine', 0.1, 0.18); }
function playBrickHit(r) { playTone(400 + r * 70, 'sine', 0.12, 0.2); }
function playWallHit() { playTone(200, 'triangle', 0.06, 0.12); }
function playPowerup() { playTone(600, 'sine', 0.12, 0.2); setTimeout(() => playTone(800, 'sine', 0.12, 0.18), 90); }
function playLoseLife() { playTone(200, 'sawtooth', 0.25, 0.25); }
function playWin() { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, 'sine', 0.22, 0.28), i * 110)); }
function playGameOver() { [400, 300, 200, 100].forEach((f, i) => setTimeout(() => playTone(f, 'sawtooth', 0.18, 0.22), i * 130)); }
function playLevelUp() { [440, 554, 659, 880].forEach((f, i) => setTimeout(() => playTone(f, 'sine', 0.18, 0.22), i * 90)); }
function playClick() { playTone(600, 'sine', 0.06, 0.12); }
function playBomb() { playTone(90, 'sawtooth', 0.35, 0.3); playTone(55, 'square', 0.45, 0.22); }
function playShift() { playTone(240, 'triangle', 0.14, 0.14); setTimeout(() => playTone(300, 'triangle', 0.12, 0.12), 80); }
function playFever() { [523, 659, 784, 1047, 1319].forEach((f, i) => setTimeout(() => playTone(f, 'square', 0.12, 0.18), i * 70)); }

document.getElementById('btnMute').onclick = () => {
    initAudio(); soundEnabled = !soundEnabled;
    document.getElementById('btnMute').textContent = soundEnabled ? '🔊' : '🔇';
    playClick();
};

const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scEl = document.getElementById('sc'), lvEl = document.getElementById('lv'), levelEl = document.getElementById('levelDisplay');
const wrap = document.getElementById('wrap');

let W, H, running = false, paused = false;
let score = 0, lives = 3, level = 1, padX, padW, padH = 14;
let balls = [], bricks = [], powerups = [], particles = [];
let combo = 0, borderPhase = 0, animFrame = null;
let bgParticles = [];
let padFlash = 0;
const colors = ['#f0f', '#0ff', '#0f0', '#ff0', '#f80', '#f44', '#88f', '#4f4'];
// twists: special bricks (bomb / shifter) + fever mode
let shiftTimer = 0, shiftDir = 1, shimmer = 0;
let rings = [];                          // bomb shockwave rings
let breakTimes = [], feverT = 0, feverPierce = 0;
let brickCols = 0, brickBW = 0, brickBH = 0;
const SHIFT_FRAMES = 600, SHIMMER_FRAMES = 60;   // shift every ~10s, telegraph last 1s

// ---- visual helpers: color math + cached sprites (gradients baked once) ----
function hexToRgb(hex) {
    let h = hex.replace('#', '');
    if (h.length === 3) h = h[0] + h[0] + h[1] + h[1] + h[2] + h[2];
    return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)];
}
function shade(hex, f) { // f > 0 toward white, f < 0 toward black
    const [r, g, b] = hexToRgb(hex);
    const m = c => Math.round(f >= 0 ? c + (255 - c) * f : c * (1 + f));
    return `rgb(${m(r)},${m(g)},${m(b)})`;
}
function rgba(hex, a) { const [r, g, b] = hexToRgb(hex); return `rgba(${r},${g},${b},${a})`; }

const tileCache = new Map();
const GLOW_PAD = 12;
function getBrickTile(color, w, h, damaged, kind) {
    const key = color + '|' + Math.round(w) + 'x' + Math.round(h) + (damaged ? '|d' : '') + '|' + (kind || '');
    let tile = tileCache.get(key);
    if (tile) return tile;
    w = Math.round(w); h = Math.round(h);
    const cw = w + GLOW_PAD * 2, ch = h + GLOW_PAD * 2;
    const cv = document.createElement('canvas');
    cv.width = cw * dpr; cv.height = ch * dpr;
    const c = cv.getContext('2d');
    c.setTransform(dpr, 0, 0, dpr, 0, 0);
    const x = GLOW_PAD, y = GLOW_PAD, rad = Math.min(4, h / 4);
    const dim = damaged ? -0.35 : 0;
    // soft neon glow baked in
    c.shadowColor = color; c.shadowBlur = damaged ? 6 : 12;
    c.fillStyle = shade(color, -0.15 + dim);
    c.beginPath(); c.roundRect(x, y, w, h, rad); c.fill();
    c.shadowBlur = 0;
    // inner body gradient (glossy top -> deep bottom)
    const g = c.createLinearGradient(x, y, x, y + h);
    g.addColorStop(0, shade(color, 0.45 + dim));
    g.addColorStop(0.45, shade(color, 0.05 + dim));
    g.addColorStop(0.55, shade(color, -0.25 + dim));
    g.addColorStop(1, shade(color, -0.5 + dim));
    c.fillStyle = g;
    c.beginPath(); c.roundRect(x, y, w, h, rad); c.fill();
    // specular streak (diagonal gloss across upper half)
    c.save();
    c.beginPath(); c.roundRect(x, y, w, h, rad); c.clip();
    const sp = c.createLinearGradient(x, y, x + w * 0.55, y + h);
    sp.addColorStop(0, 'rgba(255,255,255,0)');
    sp.addColorStop(0.35, damaged ? 'rgba(255,255,255,0.14)' : 'rgba(255,255,255,0.4)');
    sp.addColorStop(0.55, 'rgba(255,255,255,0)');
    c.fillStyle = sp;
    c.fillRect(x, y, w, h * 0.6);
    // bevel: light top-left
    c.strokeStyle = 'rgba(255,255,255,' + (damaged ? 0.25 : 0.55) + ')';
    c.lineWidth = 1.5;
    c.beginPath(); c.moveTo(x + 1, y + h - 2); c.lineTo(x + 1, y + 1); c.lineTo(x + w - 2, y + 1); c.stroke();
    // bevel: dark bottom-right
    c.strokeStyle = 'rgba(0,0,0,0.5)';
    c.beginPath(); c.moveTo(x + 1.5, y + h - 1); c.lineTo(x + w - 1, y + h - 1); c.lineTo(x + w - 1, y + 1.5); c.stroke();
    if (damaged) {
        // cracks
        c.strokeStyle = 'rgba(0,0,0,0.65)'; c.lineWidth = 1.2;
        c.beginPath();
        c.moveTo(x + w * 0.28, y); c.lineTo(x + w * 0.42, y + h * 0.45); c.lineTo(x + w * 0.3, y + h * 0.75); c.lineTo(x + w * 0.44, y + h);
        c.moveTo(x + w * 0.42, y + h * 0.45); c.lineTo(x + w * 0.62, y + h * 0.55); c.lineTo(x + w * 0.72, y + h * 0.3);
        c.moveTo(x + w * 0.62, y + h * 0.55); c.lineTo(x + w * 0.68, y + h * 0.85);
        c.stroke();
        c.strokeStyle = 'rgba(255,255,255,0.18)';
        c.beginPath(); c.moveTo(x + w * 0.29, y + 1); c.lineTo(x + w * 0.43, y + h * 0.46); c.stroke();
    }
    // special-brick icons baked into the same beveled tile
    if (kind === 'bomb') {
        c.fillStyle = 'rgba(0,0,0,0.45)';
        c.beginPath(); c.arc(x + w / 2, y + h / 2, Math.min(h * 0.42, 9), 0, Math.PI * 2); c.fill();
        c.font = Math.floor(h * 0.72) + 'px serif';
        c.textAlign = 'center'; c.textBaseline = 'middle';
        c.fillText('💥', x + w / 2, y + h / 2 + 1);
    } else if (kind === 'shift') {
        c.fillStyle = 'rgba(0,0,0,0.45)';
        c.beginPath(); c.arc(x + w / 2, y + h / 2, Math.min(h * 0.42, 9), 0, Math.PI * 2); c.fill();
        c.font = Math.floor(h * 0.66) + 'px serif';
        c.textAlign = 'center'; c.textBaseline = 'middle';
        c.fillText('🔒', x + w / 2, y + h / 2 + 1);
        // side arrows hinting sideways motion
        c.fillStyle = 'rgba(255,255,255,0.55)';
        c.font = 'bold ' + Math.floor(h * 0.45) + 'px Orbitron, sans-serif';
        c.fillText('‹', x + w * 0.16, y + h / 2 + 1);
        c.fillText('›', x + w * 0.84, y + h / 2 + 1);
    }
    c.restore();
    tile = {cv, cw, ch};
    tileCache.set(key, tile);
    return tile;
}

let ballSprite = null, ballSpriteR = 0;
function getBallSprite(r) {
    if (ballSprite && ballSpriteR === r) return ballSprite;
    const pad = 14, s = (r + pad) * 2;
    const cv = document.createElement('canvas');
    cv.width = s * dpr; cv.height = s * dpr;
    const c = cv.getContext('2d');
    c.setTransform(dpr, 0, 0, dpr, 0, 0);
    const cx = r + pad, cy = r + pad;
    // outer halo
    const halo = c.createRadialGradient(cx, cy, r * 0.4, cx, cy, r + pad);
    halo.addColorStop(0, 'rgba(0,255,255,0.55)');
    halo.addColorStop(0.5, 'rgba(0,255,255,0.15)');
    halo.addColorStop(1, 'rgba(0,255,255,0)');
    c.fillStyle = halo;
    c.fillRect(0, 0, s, s);
    // orb body
    const g = c.createRadialGradient(cx - r * 0.35, cy - r * 0.35, r * 0.1, cx, cy, r);
    g.addColorStop(0, '#ffffff');
    g.addColorStop(0.35, '#aef7ff');
    g.addColorStop(0.75, '#0ff');
    g.addColorStop(1, '#0899b8');
    c.fillStyle = g;
    c.beginPath(); c.arc(cx, cy, r, 0, Math.PI * 2); c.fill();
    ballSprite = {cv, s, pad};
    ballSpriteR = r;
    return ballSprite;
}

function initBgParticles() {
    bgParticles = [];
    for (let i = 0; i < 40; i++) {
        bgParticles.push({
            x: Math.random() * W,
            y: Math.random() * H,
            size: 0.6 + Math.random() * 1.8,
            speed: 0.15 + Math.random() * 0.5,
            opacity: 0.1 + Math.random() * 0.35,
            twinkle: Math.random() * Math.PI * 2,
            hue: Math.random() < 0.5 ? '180,100%' : '300,100%'
        });
    }
}

function resize() {
    const r = canvas.parentElement.getBoundingClientRect();
    W = r.width - 8; H = r.height - 8;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    initBgParticles();
}
window.addEventListener('resize', resize);

function getLevelConfig(lv) {
    const rows = Math.min(8, 2 + Math.floor(lv / 2));
    const cols = Math.min(10, 5 + Math.floor(lv / 3));
    const ballSpeed = 3.5 + lv * 0.3;
    const paddleWidth = Math.max(0.12, 0.28 - lv * 0.014);
    const toughChance = Math.min(0.5, lv * 0.045);
    return {rows, cols, ballSpeed, paddleWidth, toughChance};
}

function makeBricks() {
    bricks = [];
    const cfg = getLevelConfig(level);
    const cols = Math.min(cfg.cols, Math.floor(W / 42));
    const rows = cfg.rows;
    const bw = W / cols - 3, bh = Math.max(16, H * 0.032);
    brickCols = cols; brickBW = bw; brickBH = bh;
    for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
        // ~10% special bricks: 💥 bomb / 🔒 shifter
        const roll = Math.random();
        const kind = roll < 0.05 ? 'bomb' : roll < 0.10 ? 'shift' : '';
        const tough = !kind && Math.random() < cfg.toughChance;
        const col = kind === 'bomb' ? '#f80' : kind === 'shift' ? '#4df' : colors[r % colors.length];
        bricks.push({x: c * (bw + 3) + 2, y: r * (bh + 3) + 12, w: bw, h: bh, color: col, baseColor: col, alive: true, row: r, col: c, kind, hits: tough ? 2 : 1, tough});
    }
    // guarantee at least one of each special on decent-size boards
    if (bricks.length >= 8) {
        for (const k of ['bomb', 'shift']) {
            if (!bricks.some(b => b.kind === k)) {
                const plain = bricks.filter(b => !b.kind);
                if (plain.length) {
                    const b = plain[Math.floor(Math.random() * plain.length)];
                    b.kind = k; b.tough = false; b.hits = 1;
                    b.color = b.baseColor = k === 'bomb' ? '#f80' : '#4df';
                }
            }
        }
    }
    shiftTimer = 0; shimmer = 0;
}

function makeBall() {
    const cfg = getLevelConfig(level);
    return {x: W / 2, y: H - 55, vx: (Math.random() - 0.5) * 3.5, vy: -cfg.ballSpeed, r: 6, speed: cfg.ballSpeed, trail: []};
}

function init() {
    score = 0; lives = 3; level = 1; combo = 0;
    const cfg = getLevelConfig(level);
    padX = W / 2; padW = W * cfg.paddleWidth;
    balls = [makeBall()]; powerups = []; particles = [];
    rings = []; breakTimes = []; feverT = 0; feverPierce = 0; shiftDir = 1;
    makeBricks(); updateUI();
}

function updateUI() {
    scEl.textContent = 'Score: ' + score;
    lvEl.textContent = '♥'.repeat(Math.max(0, lives));
    levelEl.textContent = 'LV.' + level;
}

function popScore() { scEl.classList.add('pop'); setTimeout(() => scEl.classList.remove('pop'), 200); }
function triggerShake() { wrap.classList.remove('shake'); void wrap.offsetWidth; wrap.classList.add('shake'); }

function showCombo(x, y, text, color) {
    const el = document.createElement('div');
    el.className = 'combo-popup'; el.textContent = text;
    el.style.color = color; el.style.textShadow = '0 0 15px ' + color;
    el.style.left = x + 'px'; el.style.top = y + 'px';
    wrap.appendChild(el); setTimeout(() => el.remove(), 900);
}

function addParticles(x, y, color, count) {
    if (particles.length > 260) return;   // 60fps particle cap
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2, spd = 2 + Math.random() * 5;
        particles.push({x, y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd, life: 22 + Math.random() * 18, color, size: 2 + Math.random() * 4});
    }
}

function spawnPowerup(x, y) {
    if (Math.random() > 0.28) return;
    powerups.push({x, y, type: Math.random() < 0.5 ? 'wide' : 'multi', vy: 2.2, r: 10});
}

// ---- twists: brick destruction pipeline (bomb chains + fever tracking) ----
function destroyBrick(br) {
    if (!br.alive) return;
    br.alive = false; combo++;
    score += 10 * combo;
    spawnPowerup(br.x + br.w / 2, br.y + br.h / 2);
    addParticles(br.x + br.w / 2, br.y + br.h / 2, br.color, 12);
    if (combo > 1) showCombo(br.x + br.w / 2, br.y + br.h / 2, 'x' + combo + '!', br.color);
    if (combo >= 5) triggerShake();
    trackFever();
    if (br.kind === 'bomb') explodeBomb(br);
}
function explodeBomb(br) {
    rings.push({x: br.x + br.w / 2, y: br.y + br.h / 2, r: 6, max: (brickBW + 3) * 1.9, alpha: 1});
    triggerShake();
    playBomb();
    addParticles(br.x + br.w / 2, br.y + br.h / 2, '#f80', 18);
    addParticles(br.x + br.w / 2, br.y + br.h / 2, '#ff0', 10);
    for (const o of bricks) {   // 3x3 neighborhood (chains through other bombs)
        if (!o.alive || o === br) continue;
        if (Math.abs(o.row - br.row) <= 1 && Math.abs(o.col - br.col) <= 1) {
            o.hits = 0;
            destroyBrick(o);
        }
    }
}
function trackFever() {
    const tNow = performance.now();
    breakTimes.push(tNow);
    breakTimes = breakTimes.filter(t => tNow - t < 3000);
    if (breakTimes.length >= 6 && feverT <= 0) {
        feverT = 300; feverPierce = 1; breakTimes = [];   // 5s @60fps, 1 pierce
        showCombo(W / 2 - 60, H * 0.4, '🔥 FEVER!', '#f80');
        playFever();
        triggerShake();
    }
}
function cellOccupied(row, col) { return bricks.some(b => b.alive && b.row === row && b.col === col); }
function doShift() {
    let moved = false;
    for (const b of bricks) {
        if (!b.alive || b.kind !== 'shift') continue;
        const nc = b.col + shiftDir;
        if (nc >= 0 && nc < brickCols && !cellOccupied(b.row, nc)) {
            b.col = nc;
            b.x = nc * (brickBW + 3) + 2;
            moved = true;
        }
    }
    shiftDir *= -1;
    if (moved) playShift();
}

function update() {
    if (paused) return;
    const padY = H - 30;
    const cfg = getLevelConfig(level);

    // shifter bricks: telegraphed sideways slide every ~10s
    if (bricks.some(b => b.alive && b.kind === 'shift')) {
        shiftTimer++;
        shimmer = shiftTimer > SHIFT_FRAMES - SHIMMER_FRAMES ? (shiftTimer - (SHIFT_FRAMES - SHIMMER_FRAMES)) / SHIMMER_FRAMES : 0;
        if (shiftTimer >= SHIFT_FRAMES) { shiftTimer = 0; shimmer = 0; doShift(); }
    } else { shiftTimer = 0; shimmer = 0; }

    // fever countdown
    if (feverT > 0) { feverT--; if (feverT <= 0) feverPierce = 0; }

    // bomb shockwave rings
    rings = rings.filter(rg => { rg.r += (rg.max - rg.r) * 0.16 + 2; rg.alpha *= 0.88; return rg.alpha > 0.04; });

    // powerups
    for (let i = powerups.length - 1; i >= 0; i--) {
        const p = powerups[i]; p.y += p.vy;
        if (p.y > H) { powerups.splice(i, 1); continue; }
        if (p.y + p.r > padY - padH / 2 && p.y - p.r < padY + padH / 2 && p.x > padX - padW / 2 - p.r && p.x < padX + padW / 2 + p.r) {
            if (p.type === 'wide') { padW = Math.min(W * 0.42, padW * 1.45); playPowerup(); }
            if (p.type === 'multi' && balls.length < 8) {
                playPowerup();
                const b = balls[0] || makeBall();
                balls.push({x: b.x, y: b.y, vx: b.vx + 1.2, vy: b.vy, r: b.r, speed: b.speed, trail: []});
                balls.push({x: b.x, y: b.y, vx: b.vx - 1.2, vy: b.vy, r: b.r, speed: b.speed, trail: []});
            }
            addParticles(p.x, p.y, p.type === 'wide' ? '#0f0' : '#ff0', 14);
            powerups.splice(i, 1);
        }
    }
    
    // balls
    for (let bi = balls.length - 1; bi >= 0; bi--) {
        const b = balls[bi];
        b.trail.push({x: b.x, y: b.y}); if (b.trail.length > 14) b.trail.shift();
        b.x += b.vx; b.y += b.vy;
        
        if (b.x - b.r < 0) { b.x = b.r; b.vx *= -1; playWallHit(); }
        if (b.x + b.r > W) { b.x = W - b.r; b.vx *= -1; playWallHit(); }
        if (b.y - b.r < 0) { b.y = b.r; b.vy *= -1; playWallHit(); }
        
        // paddle
        if (b.vy > 0 && b.y + b.r >= padY - padH / 2 && b.y < padY + padH / 2) {
            if (b.x > padX - padW / 2 - b.r && b.x < padX + padW / 2 + b.r) {
                b.y = padY - padH / 2 - b.r;
                const hit = (b.x - padX) / (padW / 2);
                b.speed = Math.min(13, b.speed + 0.12);
                b.vx = hit * b.speed * 0.85;
                b.vy = -Math.sqrt(b.speed * b.speed - b.vx * b.vx);
                combo = 0; padFlash = 1; playPaddleHit(); addParticles(b.x, b.y, '#f0f', 8);
            }
        }
        
        // bricks
        for (const br of bricks) {
            if (!br.alive) continue;
            if (b.x + b.r > br.x && b.x - b.r < br.x + br.w && b.y + b.r > br.y && b.y - b.r < br.y + br.h) {
                br.hits--;
                const destroyed = br.hits <= 0;
                if (destroyed) {
                    destroyBrick(br);
                } else {
                    br.color = '#888'; addParticles(br.x + br.w / 2, br.y + br.h / 2, '#fff', 8);
                }
                // fever: ignited ball passes through one brick without bouncing
                if (destroyed && feverT > 0 && feverPierce > 0) feverPierce--;
                else b.vy *= -1;
                playBrickHit(br.row); updateUI(); popScore();
                break;
            }
        }
        
        if (b.y > H + 25) balls.splice(bi, 1);
    }
    
    if (balls.length === 0) {
        lives--; updateUI(); playLoseLife(); triggerShake();
        if (lives <= 0) { endGame('GAME OVER'); return; }
        const cfg = getLevelConfig(level);
        padW = W * cfg.paddleWidth;
        balls = [makeBall()]; combo = 0;
    }
    
    if (bricks.every(b => !b.alive)) {
        playLevelUp();
        level++;
        const cfg = getLevelConfig(level);
        padW = W * cfg.paddleWidth;
        balls = [makeBall()]; powerups = [];
        makeBricks(); updateUI();
        showCombo(W / 2, H / 2, 'LEVEL ' + level + '!', '#0f0');
    }
    
    particles = particles.filter(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.vx *= 0.98; p.life--; return p.life > 0; });
}

function draw() {
    const now = performance.now();
    // Slow-shifting dark gradient background
    const drift = Math.sin(now * 0.00012);
    const bgGrad = ctx.createRadialGradient(W / 2 + drift * W * 0.15, H * 0.35, 0, W / 2, H / 2, W * 0.85);
    bgGrad.addColorStop(0, `hsl(${248 + drift * 18},46%,8%)`);
    bgGrad.addColorStop(0.6, '#080816');
    bgGrad.addColorStop(1, '#04040e');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // Animated twinkling starfield
    bgParticles.forEach(p => {
        p.y -= p.speed;
        if (p.y < 0) { p.y = H; p.x = Math.random() * W; }
        const tw = 0.6 + 0.4 * Math.sin(now * 0.003 + p.twinkle);
        ctx.fillStyle = `hsla(${p.hue},80%,${p.opacity * tw})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * tw, 0, Math.PI * 2);
        ctx.fill();
    });

    const padY = H - 30;

    // bricks: 3D-beveled glossy tiles (cached sprites w/ baked glow)
    for (const b of bricks) {
        if (!b.alive) continue;
        const damaged = b.tough && b.hits === 1;
        const tile = getBrickTile(b.baseColor || b.color, b.w, b.h, damaged, b.kind);
        ctx.drawImage(tile.cv, b.x - GLOW_PAD, b.y - GLOW_PAD, tile.cw, tile.ch);
        // shifter telegraph: shimmer sweep right before the slide
        if (b.kind === 'shift' && shimmer > 0) {
            ctx.globalAlpha = shimmer * (0.28 + 0.3 * Math.abs(Math.sin(now * 0.02)));
            ctx.fillStyle = '#fff';
            ctx.fillRect(b.x, b.y, b.w, b.h);
            ctx.globalAlpha = 1;
        }
        if (b.tough && b.hits === 2) {
            ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.font = 'bold 11px Orbitron, sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('2', b.x + b.w / 2, b.y + b.h / 2 + 1);
            ctx.fillStyle = 'rgba(255,255,255,0.85)';
            ctx.fillText('2', b.x + b.w / 2, b.y + b.h / 2);
        }
    }
    
    // powerups with pulse effect
    for (const p of powerups) {
        const pulse = 1 + Math.sin(performance.now() * 0.01) * 0.25;
        ctx.shadowColor = p.type === 'wide' ? '#0f0' : '#ff0'; ctx.shadowBlur = 15 * pulse;
        ctx.fillStyle = p.type === 'wide' ? '#0f0' : '#ff0';
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r * pulse, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#000'; ctx.font = 'bold 11px Orbitron, sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(p.type === 'wide' ? 'W' : 'M', p.x, p.y);
    }
    ctx.shadowBlur = 0;
    
    // bomb shockwave rings
    for (const rg of rings) {
        ctx.globalAlpha = rg.alpha;
        ctx.strokeStyle = '#fa0';
        ctx.lineWidth = 4;
        ctx.shadowColor = '#f80'; ctx.shadowBlur = 20;
        ctx.beginPath(); ctx.arc(rg.x, rg.y, rg.r, 0, Math.PI * 2); ctx.stroke();
        ctx.globalAlpha = rg.alpha * 0.5;
        ctx.lineWidth = 8;
        ctx.beginPath(); ctx.arc(rg.x, rg.y, rg.r * 0.75, 0, Math.PI * 2); ctx.stroke();
    }
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;

    // balls: glowing orb sprite + fading afterimage trail (flame trail in fever)
    for (const b of balls) {
        const sprite = getBallSprite(b.r);
        if (feverT > 0) {
            for (let i = 0; i < b.trail.length; i++) {
                const t = b.trail[i], f = i / b.trail.length;
                ctx.globalAlpha = f * 0.55;
                ctx.fillStyle = i % 2 ? '#f80' : '#fc0';
                ctx.beginPath();
                ctx.arc(t.x + (Math.random() - 0.5) * 3, t.y + (Math.random() - 0.5) * 3, b.r * (0.35 + f * 0.9), 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            ctx.shadowColor = '#f80'; ctx.shadowBlur = 22;
        }
        for (let i = 0; i < b.trail.length; i++) {
            const t = b.trail[i], f = i / b.trail.length;
            ctx.globalAlpha = f * f * 0.5;
            const sz = sprite.s * (0.35 + f * 0.65);
            ctx.drawImage(sprite.cv, t.x - sz / 2, t.y - sz / 2, sz, sz);
        }
        ctx.globalAlpha = 1;
        ctx.drawImage(sprite.cv, b.x - b.r - sprite.pad, b.y - b.r - sprite.pad, sprite.s, sprite.s);
        ctx.shadowBlur = 0;
    }

    // paddle: metallic neon gradient, glow, hover bob + hit flash
    const bob = Math.sin(now * 0.004) * 1.5;
    const pY = padY + bob;
    ctx.shadowColor = '#f0f'; ctx.shadowBlur = 16 + padFlash * 22;
    const padGrad = ctx.createLinearGradient(0, pY - padH / 2, 0, pY + padH / 2);
    padGrad.addColorStop(0, '#ffb0ff');
    padGrad.addColorStop(0.25, '#f0f');
    padGrad.addColorStop(0.55, '#8a00c8');
    padGrad.addColorStop(0.8, '#b040f0');
    padGrad.addColorStop(1, '#5a0090');
    ctx.fillStyle = padGrad;
    ctx.beginPath();
    ctx.roundRect(padX - padW / 2, pY - padH / 2, padW, padH, 7);
    ctx.fill();
    ctx.shadowBlur = 0;
    // specular streak along the top
    const spec = ctx.createLinearGradient(padX - padW / 2, 0, padX + padW / 2, 0);
    spec.addColorStop(0, 'rgba(255,255,255,0.05)');
    spec.addColorStop(0.5, 'rgba(255,255,255,0.55)');
    spec.addColorStop(1, 'rgba(255,255,255,0.05)');
    ctx.fillStyle = spec;
    ctx.beginPath();
    ctx.roundRect(padX - padW / 2 + 3, pY - padH / 2 + 2, padW - 6, padH * 0.32, 4);
    ctx.fill();
    // neon edge + hit flash overlay
    ctx.strokeStyle = `rgba(255,160,255,${0.5 + padFlash * 0.5})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.roundRect(padX - padW / 2, pY - padH / 2, padW, padH, 7);
    ctx.stroke();
    if (padFlash > 0.02) {
        ctx.fillStyle = `rgba(255,255,255,${padFlash * 0.55})`;
        ctx.beginPath();
        ctx.roundRect(padX - padW / 2, pY - padH / 2, padW, padH, 7);
        ctx.fill();
        padFlash *= 0.85;
    } else padFlash = 0;
    
    // particles
    particles.forEach(p => {
        ctx.globalAlpha = p.life / 40;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color; ctx.shadowBlur = 8;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size * (p.life / 28), 0, Math.PI * 2); ctx.fill();
    });
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    
    // fever mode: screen edge glow
    if (feverT > 0) {
        const fa = Math.min(1, feverT / 60) * (0.45 + 0.18 * Math.sin(now * 0.015));
        ctx.save();
        ctx.strokeStyle = `rgba(255,140,0,${fa})`;
        ctx.lineWidth = 9;
        ctx.shadowColor = '#f80'; ctx.shadowBlur = 32;
        ctx.strokeRect(3, 3, W - 6, H - 6);
        ctx.font = 'bold 12px Orbitron, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = `rgba(255,180,0,${fa + 0.2})`;
        ctx.shadowBlur = 12;
        ctx.fillText('🔥 FEVER ' + Math.ceil(feverT / 60) + 's', W / 2, H - 8);
        ctx.restore();
    }

    // Animated border glow
    borderPhase += 0.035;
    const glow = 18 + Math.sin(borderPhase) * 10;
    const bc = feverT > 0 ? '255,140,0' : '255,0,255';
    canvas.style.boxShadow = `0 0 ${glow}px rgba(${bc},${0.3 + Math.sin(borderPhase) * 0.12}), 0 0 ${glow * 2}px rgba(${bc},0.1), inset 0 0 ${glow}px rgba(${bc},0.06)`;
}

function loop(now) {
    if (!running) return;
    update(); draw();
    animFrame = requestAnimationFrame(loop);
}

function endGame(msg) {
    running = false;
    if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
    if (msg.includes('OVER')) playGameOver(); else playWin();
    overlay.classList.remove('hidden');
    document.getElementById('overlayTitle').textContent = msg;
    document.getElementById('overlayMsg').textContent = 'Score: ' + score + ' — Reached Level ' + level;
    
    const scores = JSON.parse(localStorage.getItem('clawarcade_breakout') || '[]');
    scores.push({score, level, date: new Date().toISOString()});
    scores.sort((a, b) => b.score - a.score);
    localStorage.setItem('clawarcade_breakout', JSON.stringify(scores.slice(0, 10)));
}

// touch
let touchActive = false;
canvas.addEventListener('touchstart', e => { e.preventDefault(); touchActive = true; movepad(e.touches[0]); }, {passive: false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); if (touchActive) movepad(e.touches[0]); }, {passive: false});
canvas.addEventListener('touchend', () => { touchActive = false; });
function movepad(t) { const r = canvas.getBoundingClientRect(); padX = Math.max(padW / 2, Math.min(W - padW / 2, (t.clientX - r.left) * (W / r.width))); }
canvas.addEventListener('mousemove', e => { const r = canvas.getBoundingClientRect(); padX = Math.max(padW / 2, Math.min(W - padW / 2, (e.clientX - r.left) * (W / r.width))); });

document.getElementById('btnStart').onclick = () => {
    initAudio(); playClick();
    overlay.classList.add('hidden');
    resize(); init();
    running = true; paused = false;
    animFrame = requestAnimationFrame(loop);
};

document.getElementById('btnPause').onclick = () => {
    playClick(); paused = !paused;
    document.getElementById('btnPause').textContent = paused ? '▶ Play' : '⏸ Pause';
};

document.getElementById('btnReset').onclick = () => {
    playClick(); running = false;
    if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
    overlay.classList.remove('hidden');
    document.getElementById('overlayTitle').textContent = '💎 NEON BREAKOUT';
    document.getElementById('overlayMsg').textContent = 'Touch & drag to move paddle.\nBreak all bricks! Catch power-ups!';
};

// tiny debug hooks (headless verification)
window.__debug = {
    fever: () => { feverT = 300; feverPierce = 1; playFever(); },
    bomb: () => {
        const b = bricks.find(x => x.alive && x.kind === 'bomb') || bricks.find(x => x.alive);
        if (b) { b.kind = 'bomb'; b.hits = 0; destroyBrick(b); updateUI(); }
    },
    shift: () => doShift(),
    shimmer: () => { shiftTimer = SHIFT_FRAMES - SHIMMER_FRAMES + 5; },
    state: () => ({
        running, feverT, feverPierce, rings: rings.length, shiftTimer,
        bombs: bricks.filter(b => b.alive && b.kind === 'bomb').length,
        shifters: bricks.filter(b => b.alive && b.kind === 'shift').length,
        alive: bricks.filter(b => b.alive).length, score, level
    })
};

resize();
})();
</script>
