<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Snake - ClawArcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100dvh;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            font-family: 'Orbitron', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a1a;
            color: #e8e6e3;
            display: flex;
            flex-direction: column;
            height: 100dvh;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                linear-gradient(180deg, rgba(0,255,136,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px),
                radial-gradient(ellipse at 50% 0%, rgba(0,255,136,0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(255,0,255,0.08) 0%, transparent 50%);
            background-size: 30px 30px, 30px 30px, 100% 100%, 100% 100%;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
            z-index: -1;
        }
        @keyframes gridMove {
            0% { background-position: 0 0, 0 0, 0 0, 0 0; }
            100% { background-position: 0 60px, 60px 0, 0 0, 0 0; }
        }
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 1px, transparent 1px, transparent 3px);
            pointer-events: none;
            z-index: 1000;
            opacity: 0.3;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
            height: 40px;
            min-height: 40px;
            border-bottom: 2px solid rgba(0,255,136,0.4);
            box-shadow: 0 2px 20px rgba(0,255,136,0.2);
        }
        .top-bar h1 { 
            font-size: 1rem; 
            color: #00ff88; 
            text-shadow: 0 0 10px rgba(0,255,136,0.8), 0 0 20px rgba(0,255,136,0.4);
            letter-spacing: 2px;
        }
        .stats { display: flex; gap: 12px; font-size: 0.8rem; align-items: center; }
        .stat-value { color: #00ff88; font-weight: bold; text-shadow: 0 0 8px rgba(0,255,136,0.6); font-size: 1rem; transition: all 0.2s ease; }
        .stat-value.pop { transform: scale(1.4); text-shadow: 0 0 20px rgba(0,255,136,1); color: #fff; }
        .mode-btn {
            background: rgba(0,255,136,0.1);
            border: 2px solid rgba(0,255,136,0.5);
            color: #00ff88;
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 20px;
            cursor: pointer;
            text-shadow: 0 0 6px rgba(0,255,136,0.5);
            transition: all 0.3s ease;
            font-family: 'Orbitron', sans-serif;
        }
        .mode-btn:active { transform: scale(0.95); background: rgba(0,255,136,0.3); }
        .mode-btn.active { background: rgba(255,0,255,0.2); border-color: #ff00ff; color: #ff00ff; }
        .mode-btn.online { background: rgba(0,187,255,0.2); border-color: #00bbff; color: #00bbff; }
        .tournament-badge {
            background: linear-gradient(135deg, #ffd700, #ff6600);
            color: #000;
            font-size: 0.65rem;
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: bold;
            animation: pulse 2s infinite;
            text-shadow: none;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .canvas-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
            position: relative;
            overflow: hidden;
            transition: transform 0.05s ease-out;
        }
        .canvas-wrap.shake { animation: shake 0.4s ease-out; }
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-6px, 4px); }
            20% { transform: translate(6px, -4px); }
            30% { transform: translate(-4px, 6px); }
            40% { transform: translate(4px, -6px); }
        }
        canvas {
            border: 3px solid #00ff88;
            background: #050510;
            border-radius: 8px;
            display: block;
            box-shadow: 0 0 30px rgba(0,255,136,0.3), inset 0 0 30px rgba(0,255,136,0.05);
        }
        .overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(5,5,20,0.95);
            border: 3px solid #00ff88;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            z-index: 10;
            box-shadow: 0 0 40px rgba(0,255,136,0.4);
            max-width: 320px;
            opacity: 0;
            animation: overlayIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            backdrop-filter: blur(10px);
        }
        @keyframes overlayIn { to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
        .overlay h2 { color: #00ff88; margin-bottom: 10px; font-size: 1.4rem; text-shadow: 0 0 20px rgba(0,255,136,0.8); letter-spacing: 3px; }
        .overlay p { margin-bottom: 10px; font-size: 0.85rem; color: #aaa; }
        .overlay .score-big { font-size: 2.5rem; color: #00ff88; font-weight: bold; text-shadow: 0 0 30px rgba(0,255,136,0.8); }
        .btn {
            background: linear-gradient(135deg, #00ff88 0%, #00cc66 100%);
            color: #0a0a1a;
            border: none;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            min-height: 48px;
            box-shadow: 0 0 20px rgba(0,255,136,0.5);
            transition: all 0.3s ease;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin: 5px;
        }
        .btn:active { transform: scale(0.95); }
        .btn.online-btn {
            background: linear-gradient(135deg, #00bbff 0%, #0088cc 100%);
            box-shadow: 0 0 20px rgba(0,187,255,0.5);
        }
        .btn.spectate-btn {
            background: linear-gradient(135deg, #ff00ff 0%, #cc00cc 100%);
            box-shadow: 0 0 20px rgba(255,0,255,0.5);
            font-size: 0.8rem;
            padding: 8px 16px;
        }
        .controls {
            flex-shrink: 0;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 4px 0;
            background: rgba(0,0,0,0.5);
            border-top: 2px solid rgba(0,255,136,0.2);
            backdrop-filter: blur(10px);
        }
        .dpad {
            display: grid;
            grid-template-columns: 56px 56px 56px;
            grid-template-rows: 46px 46px;
            gap: 4px;
        }
        .dpad-btn {
            background: rgba(0,255,136,0.1);
            border: 2px solid rgba(0,255,136,0.4);
            color: #00ff88;
            font-size: 1.4rem;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            text-shadow: 0 0 10px rgba(0,255,136,0.6);
        }
        .dpad-btn:active { background: rgba(0,255,136,0.4); transform: scale(0.92); }
        .dpad-empty { visibility: hidden; }
        .hidden { display: none !important; }
        .pts-popup {
            position: absolute;
            font-weight: bold;
            font-size: 1.2rem;
            pointer-events: none;
            animation: floatUp 0.7s ease-out forwards;
            z-index: 5;
            font-family: 'Orbitron', sans-serif;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.3); }
            100% { opacity: 0; transform: translateY(-40px) scale(0.8); }
        }
        .player-list {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(0,255,136,0.3);
            border-radius: 8px;
            padding: 8px;
            margin: 10px 0;
            max-height: 120px;
            overflow-y: auto;
            font-size: 0.75rem;
        }
        .player-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .player-item:last-child { border-bottom: none; }
        .player-color { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .connection-status {
            position: absolute;
            top: 5px;
            right: 5px;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.6rem;
            font-family: 'Orbitron', sans-serif;
            z-index: 20;
        }
        .connection-status.connected { background: rgba(0,255,136,0.3); color: #00ff88; }
        .connection-status.connecting { background: rgba(255,170,0,0.3); color: #ffaa00; }
        .connection-status.disconnected { background: rgba(255,68,68,0.3); color: #ff4444; }
        .name-input {
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(0,255,136,0.4);
            color: #00ff88;
            padding: 8px 12px;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            width: 100%;
            max-width: 200px;
            margin-bottom: 10px;
            text-align: center;
        }
        .name-input:focus { outline: none; border-color: #00ff88; }
        .skin-btn {
            border: 2px solid rgba(255,255,255,0.3);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            min-width: 55px;
            transition: all 0.3s ease;
            font-family: 'Orbitron', sans-serif;
        }
        .skin-btn.selected { border-color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.5); transform: scale(1.08); }
        .legend { font-size: 0.7rem; color: #888; margin-bottom: 12px; line-height: 1.6; }
        .leg-green { color: #00ff88; }
        .leg-blue { color: #00bbff; }
        .leg-yellow { color: #ffdd00; }
        .fx-hud {
            position: absolute;
            top: 8px; left: 8px;
            z-index: 15;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.68rem;
            letter-spacing: 1px;
            padding: 4px 10px;
            border-radius: 14px;
            background: rgba(0,0,0,0.65);
            border: 1px solid currentColor;
            pointer-events: none;
            text-shadow: 0 0 8px currentColor;
            animation: fxPulse 1s ease-in-out infinite;
        }
        @keyframes fxPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.65; } }
    </style>
</head>
<body>
    <div class="top-bar">
        <h1>🐍 SNAKE</h1>
        <span id="tournamentBadge" class="tournament-badge" style="display:none;">🏆 TOURNAMENT</span>
        <button class="mode-btn" id="modeBtn">Solo</button>
        <div class="stats">
            <span>SC:<span class="stat-value" id="score">0</span></span>
            <span>HI:<span class="stat-value" id="highScore">0</span></span>
            <span id="playerCount" style="color:#00bbff;display:none;">👥 1</span>
        </div>
    </div>

    <div class="canvas-wrap" id="canvasWrap">
        <canvas id="c"></canvas>
        <div id="connectionStatus" class="connection-status hidden">●</div>
        <div id="fxHud" class="fx-hud hidden"></div>
        
        <!-- Start Overlay -->
        <div class="overlay" id="startOverlay">
            <h2>🐍 SNAKE</h2>
            <p>Swipe or use D-pad to move</p>
            <div class="legend">
                <span class="leg-green">● Green +1</span> &nbsp;
                <span class="leg-yellow">● Yellow +2</span> &nbsp;
                <span class="leg-blue">● Blue +3</span>
            </div>
            <div style="margin: 14px 0 10px;">
                <label style="display: block; color: #00ff88; font-size: 0.8rem; margin-bottom: 8px;">🎨 SNAKE SKIN</label>
                <div id="skinPicker" style="display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;">
                    <button type="button" class="skin-btn selected" data-skin="neon" style="background: linear-gradient(135deg, #00ff88, #00cc66);">Neon</button>
                    <button type="button" class="skin-btn" data-skin="plasma" style="background: linear-gradient(135deg, #cc44ff, #8800cc);">Plasma</button>
                    <button type="button" class="skin-btn" data-skin="fire" style="background: linear-gradient(135deg, #ff6600, #cc3300);">Fire</button>
                    <button type="button" class="skin-btn" data-skin="ice" style="background: linear-gradient(135deg, #00bbff, #0088cc);">Ice</button>
                </div>
            </div>
            <button class="btn" id="startBtn">▶ SOLO PLAY</button>
            <button class="btn online-btn" id="onlineBtn">🌐 PLAY ONLINE</button>
        </div>
        
        <!-- Online Lobby -->
        <div class="overlay hidden" id="lobbyOverlay">
            <h2>🌐 ONLINE</h2>
            <input type="text" class="name-input" id="playerName" placeholder="Your Name" maxlength="15">
            <div id="onlinePlayers" class="player-list">
                <div style="color:#888;text-align:center;">Connecting...</div>
            </div>
            <button class="btn online-btn" id="joinBtn">JOIN GAME</button>
            <button class="btn spectate-btn" id="spectateBtn">👁 SPECTATE</button>
            <button class="btn" style="background:#333;color:#fff;font-size:0.8rem;padding:8px 16px;" id="backBtn">← BACK</button>
        </div>
        
        <!-- Game Over -->
        <div class="overlay hidden" id="overOverlay">
            <h2>GAME OVER</h2>
            <p class="score-big" id="finalScore">0</p>
            <p style="font-size:0.8rem;color:#888" id="finalStats"></p>
            <div id="onlineScoreboard" class="player-list hidden"></div>
            <button class="btn" id="restartBtn">PLAY AGAIN</button>
            <button class="btn" style="background:#333;color:#fff;font-size:0.8rem;padding:8px 16px;" id="menuBtn">🏠 MENU</button>
        </div>
    </div>

    <div class="controls">
        <div class="dpad">
            <div class="dpad-empty"></div>
            <div class="dpad-btn" data-dir="up">▲</div>
            <div class="dpad-empty"></div>
            <div class="dpad-btn" data-dir="left">◀</div>
            <div class="dpad-btn" data-dir="down">▼</div>
            <div class="dpad-btn" data-dir="right">▶</div>
        </div>
    </div>

    <script src="../js/human-check.js"></script>
    <script src="../js/joystick.js"></script>
    <script>
    (function() {
        const ONLINE_SERVER = 'wss://clawarcade-snake.clawarcade-prod.workers.dev/ws/default';
        
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const wrap = document.getElementById('canvasWrap');
        const dpr = window.devicePixelRatio || 1;

        // Audio
        let audioCtx = null;
        let soundEnabled = true;
        
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        document.addEventListener('click', initAudio, { once: true });
        document.addEventListener('touchstart', initAudio, { once: true });
        
        function playTone(freq, type, duration, volume = 0.3) {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }
        
        function playEat() { playTone(440, 'sine', 0.12, 0.25); setTimeout(() => playTone(660, 'sine', 0.12, 0.2), 60); }
        function playDeath() { playTone(300, 'sawtooth', 0.12, 0.35); setTimeout(() => playTone(100, 'sawtooth', 0.35, 0.25), 250); }
        function playStart() { playTone(440, 'sine', 0.12, 0.25); setTimeout(() => playTone(660, 'sine', 0.18, 0.25), 240); }
        // Power-up sfx (solo specials)
        function playSurge() { [660, 880, 1320].forEach((f, i) => setTimeout(() => playTone(f, 'square', 0.1, 0.2), i * 70)); }
        function playGhost() { playTone(520, 'sine', 0.25, 0.2); setTimeout(() => playTone(390, 'sine', 0.3, 0.16), 130); }
        function playFrenzy() { [880, 1175, 1568].forEach((f, i) => setTimeout(() => playTone(f, 'triangle', 0.12, 0.2), i * 60)); }
        function playGhostSave() { playTone(300, 'sine', 0.15, 0.25); setTimeout(() => playTone(600, 'sine', 0.2, 0.2), 100); }

        // Game State
        const TILES = 20;
        let tileSize, canvasSize;
        let snake, foods, dx, dy, nextDx, nextDy, score, highScore, running, speed;
        let frame = 0;
        let particles = [];
        let currentSkin = 'neon';
        let animationId = null;
        // Visual FX state (rendering only — never touches gameplay)
        const TAU = Math.PI * 2;
        const MAX_PARTICLES = 220;
        let trail = [];            // faint motion trail behind the head
        let gradCache = {};        // cached gradients (unit-space, reused every frame)
        let vnow = performance.now(); // smooth visual clock for pulses/sparkles

        // === Solo power-ups (specials) — solo mode only, never touches online play ===
        const SPECIALS = {
            surge:  { color: '#ffd700', label: '⚡ SURGE ×2 ' },
            ghost:  { color: '#b266ff', label: '👻 GHOST ARMED' },
            frenzy: { color: '#ff00ff', label: '✨ FRENZY' }
        };
        let special = null;           // {x, y, kind, born, expires} — cap: one at a time
        let foodsSinceSpecial = 0;    // spawn roll every ~6 foods
        let surgeUntil = 0;           // performance.now() deadline for double points
        let ghostArmed = false;       // next self-collision forgiven
        let ghostGraceUntil = 0;      // brief pass-through window after a save
        const fxHud = document.getElementById('fxHud');
        let lastHudTxt = null;

        function spawnSpecial(kind) {
            if (special || isOnline) return;
            if (!kind) {
                const ks = ['surge', 'ghost', 'frenzy'];
                kind = ks[Math.floor(Math.random() * ks.length)];
            }
            let pos, tries = 0;
            do {
                pos = {x: Math.floor(Math.random()*TILES), y: Math.floor(Math.random()*TILES)};
                tries++;
            } while (tries < 100 && (snake.some(s => s.x===pos.x && s.y===pos.y) || foods.some(f => f.x===pos.x && f.y===pos.y)));
            const now = performance.now();
            special = { x: pos.x, y: pos.y, kind, born: now, expires: now + 7000 };
            addParticles(pos.x, pos.y, SPECIALS[kind].color, 10, 1.2);
        }

        function burstBonusFoods(n) {
            for (let i = 0; i < n; i++) {
                let pos, tries = 0;
                do {
                    pos = {x: Math.floor(Math.random()*TILES), y: Math.floor(Math.random()*TILES)};
                    tries++;
                } while (tries < 100 && (snake.some(s => s.x===pos.x && s.y===pos.y) || foods.some(f => f.x===pos.x && f.y===pos.y)));
                const type = Math.random() < 0.5 ? 'yellow' : 'blue';
                foods.push({...pos, type, points: type==='yellow' ? 2 : 3, color: type==='yellow' ? '#ffdd00' : '#00bbff'});
                addParticles(pos.x, pos.y, '#ff00ff', 6, 1);
            }
        }

        function updateFxHud() {
            let txt = '', col = '';
            if (!isOnline) {
                if (surgeUntil > vnow) { col = SPECIALS.surge.color; txt = SPECIALS.surge.label + Math.ceil((surgeUntil - vnow)/1000) + 's'; }
                else if (ghostArmed || ghostGraceUntil > vnow) { col = SPECIALS.ghost.color; txt = SPECIALS.ghost.label; }
            }
            if (txt === lastHudTxt) return;
            lastHudTxt = txt;
            if (!txt) { fxHud.classList.add('hidden'); return; }
            fxHud.style.color = col;
            fxHud.textContent = txt;
            fxHud.classList.remove('hidden');
        }
        
        // Online State
        let isOnline = false;
        let ws = null;
        let playerId = null;
        let playerName = '';
        let gameState = null;
        let spectating = false;
        let reconnecting = false;
        
        // Tournament State
        const API_BASE = 'https://clawarcade-api.clawarcade-prod.workers.dev';
        let tournamentId = new URLSearchParams(window.location.search).get('tournament');
        let tournamentMode = !!tournamentId;

        const SKINS = {
            neon:   { head: '#00ff88', body: '#00cc66', glow: '#00ff88' },
            plasma: { head: '#ff00ff', body: '#aa00dd', glow: '#ff00ff' },
            fire:   { head: '#ff6600', body: '#ff4400', glow: '#ff4400' },
            ice:    { head: '#00ddff', body: '#0099cc', glow: '#00bbff' },
        };

        highScore = parseInt(localStorage.getItem('snakeHigh') || '0');
        document.getElementById('highScore').textContent = highScore;
        document.getElementById('playerName').value = localStorage.getItem('snakeName') || '';

        // Skin selection
        document.querySelectorAll('.skin-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.skin-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                currentSkin = btn.dataset.skin;
                if (!running) draw();
            });
        });

        function resize() {
            const w = wrap.clientWidth - 12;
            const h = wrap.clientHeight - 12;
            const s = Math.min(w, h);
            tileSize = Math.floor(s / TILES);
            canvasSize = tileSize * TILES;
            canvas.width = canvasSize * dpr;
            canvas.height = canvasSize * dpr;
            canvas.style.width = canvasSize + 'px';
            canvas.style.height = canvasSize + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            if (!running) draw();
        }
        window.addEventListener('resize', resize);

        function init() {
            snake = [{x:10,y:10}];
            foods = [];
            dx = 0; dy = 0;
            nextDx = 0; nextDy = 0;
            score = 0;
            speed = 150;
            running = false;
            particles = [];
            trail = [];
            special = null;
            foodsSinceSpecial = 0;
            surgeUntil = 0;
            ghostArmed = false;
            ghostGraceUntil = 0;
            document.getElementById('score').textContent = 0;
            document.getElementById('startOverlay').classList.remove('hidden');
            document.getElementById('overOverlay').classList.add('hidden');
            document.getElementById('lobbyOverlay').classList.add('hidden');
            spawnFood();
            resize();
        }

        function spawnFood() {
            while (foods.length < 3) {
                let pos;
                let tries = 0;
                do {
                    pos = {x: Math.floor(Math.random()*TILES), y: Math.floor(Math.random()*TILES)};
                    tries++;
                } while (tries < 100 && (snake.some(s => s.x===pos.x && s.y===pos.y) || foods.some(f => f.x===pos.x && f.y===pos.y)));
                const r = Math.random();
                const type = r < 0.5 ? 'green' : r < 0.8 ? 'yellow' : 'blue';
                const points = type === 'green' ? 1 : type === 'yellow' ? 2 : 3;
                const color = type === 'green' ? '#00ff88' : type === 'yellow' ? '#ffdd00' : '#00bbff';
                foods.push({...pos, type, points, color});
            }
        }

        function startSolo() {
            isOnline = false;
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('modeBtn').textContent = 'Solo';
            document.getElementById('modeBtn').classList.remove('online');
            document.getElementById('playerCount').style.display = 'none';
            dx = 1; dy = 0;
            nextDx = 1; nextDy = 0;
            running = true;
            playStart();
            gameLoop();
        }

        function gameLoop() {
            if (!running || isOnline) return;
            update();
            if (!running) return;
            frame++;
            draw();
            setTimeout(() => requestAnimationFrame(gameLoop), speed);
        }

        function update() {
            dx = nextDx;
            dy = nextDy;
            const head = {x: snake[0].x+dx, y: snake[0].y+dy};
            
            if (head.x<0||head.x>=TILES||head.y<0||head.y>=TILES) return gameOver();
            if (snake.some(s=>s.x===head.x&&s.y===head.y)) {
                const nowMs = performance.now();
                if (ghostGraceUntil > nowMs) {
                    // still phasing through from a ghost save
                } else if (ghostArmed) {
                    ghostArmed = false;
                    ghostGraceUntil = nowMs + 1200; // window to fully pass through
                    playGhostSave();
                    addParticles(head.x, head.y, SPECIALS.ghost.color, 14, 1.5);
                } else {
                    return gameOver();
                }
            }

            snake.unshift(head);

            // Special item lifecycle (solo only)
            if (special) {
                const nowMs = performance.now();
                if (nowMs > special.expires) {
                    addParticles(special.x, special.y, SPECIALS[special.kind].color, 8, 0.8);
                    special = null;
                } else if (head.x === special.x && head.y === special.y) {
                    const sp = special;
                    special = null;
                    addParticles(sp.x, sp.y, SPECIALS[sp.kind].color, 22, 1.8);
                    if (sp.kind === 'surge') { surgeUntil = nowMs + 5000; playSurge(); }
                    else if (sp.kind === 'ghost') { ghostArmed = true; playGhost(); }
                    else { burstBonusFoods(3); playFrenzy(); }
                }
            }

            // Motion trail (visual only)
            trail.push({x: head.x*tileSize + tileSize/2, y: head.y*tileSize + tileSize/2, life: 1});
            if (trail.length > 18) trail.shift();

            let ate = false;
            for (let i = foods.length-1; i >= 0; i--) {
                if (head.x === foods[i].x && head.y === foods[i].y) {
                    score += foods[i].points * (surgeUntil > performance.now() ? 2 : 1);
                    document.getElementById('score').textContent = score;
                    foodsSinceSpecial++;
                    if (foodsSinceSpecial >= 6) {
                        foodsSinceSpecial = 0;
                        if (!special && Math.random() < 0.4) spawnSpecial();
                    }
                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem('snakeHigh', highScore);
                        document.getElementById('highScore').textContent = highScore;
                    }
                    addParticles(foods[i].x, foods[i].y, foods[i].color);
                    playEat();
                    foods.splice(i, 1);
                    ate = true;
                    break;
                }
            }
            if (!ate) snake.pop();
            speed = Math.max(60, 150 - Math.floor(score / 5) * 3);
            if (surgeUntil > performance.now()) speed = Math.max(50, speed - 20); // surge: slight speed up
            spawnFood();
        }

        function addParticles(x, y, color, count, power) {
            count = count || 12;
            power = power || 1;
            if (particles.length > MAX_PARTICLES) return;
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * TAU;
                const spd = (2 + Math.random() * 4) * power;
                const life = (16 + Math.random() * 14) * (power > 1 ? 1.6 : 1);
                particles.push({
                    x: x * tileSize + tileSize/2,
                    y: y * tileSize + tileSize/2,
                    vx: Math.cos(angle) * spd,
                    vy: Math.sin(angle) * spd - power,
                    life: life,
                    maxLife: life,
                    color: color,
                    size: 2 + Math.random()*3
                });
            }
        }

        // Time-based FX stepping (runs at display refresh, independent of game tick)
        function stepEffects(dt) {
            // special despawn is wall-clock based, so it also expires between game ticks
            if (special && !isOnline && vnow > special.expires) {
                addParticles(special.x, special.y, SPECIALS[special.kind].color, 8, 0.8);
                special = null;
            }
            const k = dt / 16.667;
            if (particles.length) {
                particles = particles.filter(p => {
                    p.x += p.vx * k; p.y += p.vy * k;
                    p.vy += 0.15 * k;
                    p.life -= k;
                    return p.life > 0;
                });
            }
            if (trail.length) {
                trail = trail.filter(t => (t.life -= 0.045 * k) > 0);
            }
        }

        // === Pseudo-3D rendering helpers ===
        function shadeColor(hex, amt) {
            if (!/^#[0-9a-f]{6}$/i.test(hex)) return hex;
            const n = parseInt(hex.slice(1), 16);
            const f = c => {
                c = amt >= 0 ? c + (255 - c) * amt : c * (1 + amt);
                return Math.max(0, Math.min(255, Math.round(c))).toString(16).padStart(2, '0');
            };
            return '#' + f((n>>16)&255) + f((n>>8)&255) + f(n&255);
        }

        // Cached unit-space (r=100) glossy sphere gradient — no per-frame gradient allocations
        function sphereGrad(color) {
            let g = gradCache[color];
            if (!g) {
                g = ctx.createRadialGradient(-35, -35, 8, 0, 0, 105);
                g.addColorStop(0, shadeColor(color, 0.85));
                g.addColorStop(0.35, shadeColor(color, 0.25));
                g.addColorStop(0.75, color);
                g.addColorStop(1, shadeColor(color, -0.55));
                gradCache[color] = g;
            }
            return g;
        }

        function drawFoodOrb(fx, fy, color) {
            const cx = fx*tileSize + tileSize/2, cy = fy*tileSize + tileSize/2;
            const ph = vnow*0.005 + fx*1.7 + fy*2.3;
            const pulse = 0.82 + Math.sin(ph)*0.13;
            const r = (tileSize/2 - 2) * pulse;
            // Glowing gradient orb
            ctx.save();
            ctx.shadowColor = color;
            ctx.shadowBlur = 14 + Math.sin(ph)*6;
            ctx.translate(cx, cy);
            ctx.scale(r/100, r/100);
            ctx.fillStyle = sphereGrad(color);
            ctx.beginPath(); ctx.arc(0, 0, 100, 0, TAU); ctx.fill();
            ctx.restore();
            // Rotating sparkle highlight
            const a = vnow*0.003 + fx + fy;
            const sx = cx + Math.cos(a)*r*0.55, sy = cy + Math.sin(a)*r*0.55;
            const sl = Math.max(2, r*0.28);
            ctx.globalAlpha = 0.85;
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(sx - sl, sy); ctx.lineTo(sx + sl, sy);
            ctx.moveTo(sx, sy - sl); ctx.lineTo(sx, sy + sl);
            ctx.stroke();
            ctx.globalAlpha = 1;
        }

        // Pulsing diamond-ring orb with a procedural icon glyph — visually distinct from food.
        // Spawn: 300ms pop-in. Despawn: shrink/fade over final 600ms of its 7s life.
        function drawSpecialOrb(sp) {
            const cx = sp.x*tileSize + tileSize/2, cy = sp.y*tileSize + tileSize/2;
            const info = SPECIALS[sp.kind];
            const lifeIn = Math.min(1, (vnow - sp.born) / 300);
            const lifeOut = Math.max(0, Math.min(1, (sp.expires - vnow) / 600));
            const sc = Math.min(lifeIn, lifeOut);
            if (sc <= 0) return;
            const pulse = 1 + Math.sin(vnow*0.008)*0.12;
            const r = tileSize*0.62 * sc * pulse;
            ctx.save();
            ctx.globalAlpha = Math.max(0.12, sc);
            ctx.translate(cx, cy);
            ctx.rotate(Math.sin(vnow*0.003)*0.3);
            // outer pulsing diamond ring
            ctx.strokeStyle = info.color;
            ctx.lineWidth = 2;
            ctx.shadowColor = info.color;
            ctx.shadowBlur = 16 + Math.sin(vnow*0.008)*8;
            ctx.beginPath();
            ctx.moveTo(0, -r); ctx.lineTo(r, 0); ctx.lineTo(0, r); ctx.lineTo(-r, 0);
            ctx.closePath();
            ctx.stroke();
            ctx.fillStyle = info.color;
            ctx.globalAlpha = Math.max(0.08, sc*0.3);
            ctx.fill();
            ctx.globalAlpha = Math.max(0.12, sc);
            ctx.shadowBlur = 8;
            // icon glyph
            const ir = r*0.58;
            ctx.fillStyle = '#fff';
            if (sp.kind === 'surge') { // lightning bolt
                ctx.beginPath();
                ctx.moveTo(ir*0.35, -ir); ctx.lineTo(-ir*0.4, ir*0.15); ctx.lineTo(-0.02, ir*0.15);
                ctx.lineTo(-ir*0.35, ir); ctx.lineTo(ir*0.4, -ir*0.15); ctx.lineTo(0.02, -ir*0.15);
                ctx.closePath(); ctx.fill();
            } else if (sp.kind === 'ghost') { // little ghost
                ctx.beginPath();
                ctx.arc(0, -ir*0.15, ir*0.72, Math.PI, 0);
                ctx.lineTo(ir*0.72, ir*0.68);
                ctx.lineTo(ir*0.36, ir*0.4); ctx.lineTo(0, ir*0.68);
                ctx.lineTo(-ir*0.36, ir*0.4); ctx.lineTo(-ir*0.72, ir*0.68);
                ctx.closePath(); ctx.fill();
                ctx.fillStyle = info.color;
                ctx.beginPath();
                ctx.arc(-ir*0.28, -ir*0.2, ir*0.14, 0, TAU);
                ctx.arc(ir*0.28, -ir*0.2, ir*0.14, 0, TAU);
                ctx.fill();
            } else { // frenzy: 4-point sparkle
                ctx.beginPath();
                ctx.moveTo(0, -ir);
                ctx.quadraticCurveTo(ir*0.15, -ir*0.15, ir, 0);
                ctx.quadraticCurveTo(ir*0.15, ir*0.15, 0, ir);
                ctx.quadraticCurveTo(-ir*0.15, ir*0.15, -ir, 0);
                ctx.quadraticCurveTo(-ir*0.15, -ir*0.15, 0, -ir);
                ctx.closePath(); ctx.fill();
            }
            ctx.restore();
        }

        function drawEye(x, y, r, ux, uy) {
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(x, y, r, 0, TAU); ctx.fill();
            ctx.fillStyle = '#0a0a1a';
            ctx.beginPath(); ctx.arc(x + ux*r*0.35, y + uy*r*0.35, r*0.55, 0, TAU); ctx.fill();
        }

        // Glossy capsule-chain snake: single glow spine + tapered gradient spheres + facing eyes
        function drawSnakeBody(body, headColor, bodyColor, glowColor, dirX, dirY) {
            const n = body.length;
            if (!n) return;
            const half = tileSize/2;
            // 1) One glow pass for the whole body (single shadowBlur stroke = cheap)
            ctx.save();
            ctx.strokeStyle = glowColor;
            ctx.globalAlpha = 0.5;
            ctx.lineWidth = tileSize * 0.7;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.shadowColor = glowColor;
            ctx.shadowBlur = 18;
            ctx.beginPath();
            ctx.moveTo(body[0].x*tileSize + half, body[0].y*tileSize + half);
            if (n === 1) ctx.lineTo(body[0].x*tileSize + half + 0.01, body[0].y*tileSize + half);
            for (let i = 1; i < n; i++) ctx.lineTo(body[i].x*tileSize + half, body[i].y*tileSize + half);
            ctx.stroke();
            ctx.restore();
            // 2) Tapered glossy segments, tail first so the head sits on top
            for (let i = n - 1; i >= 0; i--) {
                const s = body[i];
                const t = n > 1 ? i / (n - 1) : 0;
                const rad = (half - 1) * (1 - 0.38*t) * (i === 0 ? 1.06 : 1);
                ctx.save();
                ctx.translate(s.x*tileSize + half, s.y*tileSize + half);
                ctx.scale(rad/100, rad/100);
                ctx.fillStyle = sphereGrad(i === 0 ? headColor : bodyColor);
                ctx.beginPath(); ctx.arc(0, 0, 100, 0, TAU); ctx.fill();
                ctx.restore();
            }
            // 3) Eyes facing travel direction
            let ux = dirX, uy = dirY;
            if (!ux && !uy) { ux = 1; uy = 0; }
            const chx = body[0].x*tileSize + half, chy = body[0].y*tileSize + half;
            const px = -uy, py = ux;
            const eo = tileSize*0.22, ef = tileSize*0.14, er = tileSize*0.15;
            drawEye(chx + ux*ef + px*eo, chy + uy*ef + py*eo, er, ux, uy);
            drawEye(chx + ux*ef - px*eo, chy + uy*ef - py*eo, er, ux, uy);
        }

        function draw() {
            const w = canvasSize, h = canvasSize;
            const t = vnow;
            ctx.fillStyle = '#050510';
            ctx.fillRect(0, 0, w, h);

            // Subtle drifting ambient vignette (slow, non-distracting)
            const gx = w*0.5 + Math.sin(t*0.00023)*w*0.22;
            const gy = h*0.5 + Math.cos(t*0.00017)*h*0.22;
            const bg = ctx.createRadialGradient(gx, gy, 0, gx, gy, w*0.75);
            bg.addColorStop(0, 'rgba(0,255,136,0.05)');
            bg.addColorStop(0.6, 'rgba(0,120,255,0.02)');
            bg.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, w, h);

            // Grid with a faint slow pulse (single batched stroke)
            const gridA = 0.03 + 0.02 * (0.5 + 0.5*Math.sin(t*0.0011));
            ctx.strokeStyle = 'rgba(0,255,136,' + gridA.toFixed(3) + ')';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            for (let i=0; i<=TILES; i++) {
                ctx.moveTo(i*tileSize, 0); ctx.lineTo(i*tileSize, h);
                ctx.moveTo(0, i*tileSize); ctx.lineTo(w, i*tileSize);
            }
            ctx.stroke();

            // Faint motion trail behind the head
            if (trail.length) {
                const glow = SKINS[currentSkin].glow;
                ctx.fillStyle = glow;
                for (let i=0; i<trail.length; i++) {
                    const tr = trail[i];
                    ctx.globalAlpha = tr.life * 0.14;
                    ctx.beginPath();
                    ctx.arc(tr.x, tr.y, tileSize*0.1 + tileSize*0.36*tr.life, 0, TAU);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }

            if (isOnline && gameState) {
                drawOnlineState();
            } else {
                drawLocalState();
            }

            // Particles (additive blend for a hot neon burst look)
            if (particles.length) {
                ctx.globalCompositeOperation = 'lighter';
                for (let i=0; i<particles.length; i++) {
                    const p = particles[i];
                    const lf = p.life / p.maxLife;
                    ctx.globalAlpha = lf > 1 ? 1 : lf;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * lf, 0, TAU);
                    ctx.fill();
                }
                ctx.globalCompositeOperation = 'source-over';
                ctx.globalAlpha = 1;
            }
        }

        function drawLocalState() {
            // Food: pulsing glowing orbs with rotating sparkle
            foods.forEach(f => drawFoodOrb(f.x, f.y, f.color));

            // Special power-up orb (solo only, one at a time)
            if (special) drawSpecialOrb(special);

            // Snake: glossy tapered 3D capsule chain with facing eyes
            const skin = SKINS[currentSkin];
            const surging = surgeUntil > vnow;
            const ghosting = ghostArmed || ghostGraceUntil > vnow;
            if (ghosting) ctx.globalAlpha = 0.5; // translucent while ghost is armed
            drawSnakeBody(
                snake,
                surging ? '#ffd700' : skin.head,
                surging ? '#e6b800' : skin.body,
                surging ? '#ffd700' : skin.glow,
                dx, dy
            );
            ctx.globalAlpha = 1;
        }

        function drawOnlineState() {
            if (!gameState) return;
            
            // Food: pulsing glowing orbs with rotating sparkle
            (gameState.food || []).forEach(f => drawFoodOrb(f.x, f.y, f.color));

            // All players
            const allPlayers = [...(gameState.opponents || [])];
            if (gameState.you) allPlayers.push(gameState.you);

            allPlayers.forEach(player => {
                if (!player.alive || !player.body || player.body.length === 0) return;

                const color = player.color || '#00ff88';
                const dir = player.direction;
                const dvx = dir === 'right' ? 1 : dir === 'left' ? -1 : 0;
                const dvy = dir === 'down' ? 1 : dir === 'up' ? -1 : 0;
                drawSnakeBody(player.body, color, shadeColor(color, -0.3), color, dvx, dvy);

                // Name tag on head
                if (player.name) {
                    const hd = player.body[0];
                    ctx.save();
                    ctx.fillStyle = '#fff';
                    ctx.font = `bold ${Math.floor(tileSize*0.4)}px Orbitron, sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.shadowColor = '#000';
                    ctx.shadowBlur = 4;
                    ctx.fillText(player.name.slice(0,8), hd.x*tileSize+tileSize/2, hd.y*tileSize - 4);
                    ctx.restore();
                }
            });
            
            // Spectating indicator
            if (spectating || (gameState.you && !gameState.you.alive)) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, canvasSize - 30, canvasSize, 30);
                ctx.fillStyle = '#ff00ff';
                ctx.font = 'bold 14px Orbitron';
                ctx.textAlign = 'center';
                ctx.fillText(spectating ? '👁 SPECTATING' : '💀 WAITING FOR RESPAWN...', canvasSize/2, canvasSize - 10);
            }
        }

        function gameOver() {
            running = false;
            playDeath();
            wrap.classList.add('shake');
            setTimeout(() => wrap.classList.remove('shake'), 400);
            // Death explosion: burst at the head plus sparks along the body (capped)
            if (snake && snake.length) {
                const skin = SKINS[currentSkin];
                addParticles(snake[0].x, snake[0].y, skin.head, 26, 2.2);
                const step = Math.max(1, Math.floor(snake.length / 8));
                for (let i = step; i < snake.length && i < 40; i += step) {
                    addParticles(snake[i].x, snake[i].y, skin.body, 5, 1.4);
                }
            }
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalStats').textContent = `Length: ${snake.length}`;
            document.getElementById('overOverlay').classList.remove('hidden');
            document.getElementById('onlineScoreboard').classList.add('hidden');
            
            // Submit tournament score if in tournament mode
            if (tournamentMode && score > 0) {
                submitTournamentScore(score);
            }
        }
        
        async function submitTournamentScore(score) {
            const token = localStorage.getItem('clawarcade_token');
            if (!token) {
                console.log('Not logged in, cannot submit tournament score');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/tournaments/${tournamentId}/scores`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        score: score,
                        metadata: { length: snake.length, skin: currentSkin }
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    const msg = data.isNewBest 
                        ? `🏆 NEW TOURNAMENT BEST: ${score}!` 
                        : `Tournament score: ${score}`;
                    showTournamentMessage(msg, data.isNewBest);
                } else {
                    console.error('Tournament score submission failed:', data.error);
                }
            } catch (err) {
                console.error('Failed to submit tournament score:', err);
            }
        }
        
        function showTournamentMessage(msg, isNewBest) {
            const el = document.createElement('div');
            el.style.cssText = `
                position: fixed;
                top: 50px;
                left: 50%;
                transform: translateX(-50%);
                background: ${isNewBest ? 'linear-gradient(135deg, #ffd700, #ff6600)' : 'rgba(0,255,136,0.9)'};
                color: ${isNewBest ? '#000' : '#000'};
                padding: 10px 20px;
                border-radius: 20px;
                font-size: 0.9rem;
                font-weight: bold;
                z-index: 10000;
                animation: slideDown 0.3s ease-out;
                box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            `;
            el.textContent = msg;
            document.body.appendChild(el);
            
            setTimeout(() => {
                el.style.opacity = '0';
                el.style.transition = 'opacity 0.5s';
                setTimeout(() => el.remove(), 500);
            }, 3000);
        }

        // === ONLINE FUNCTIONALITY ===
        
        function updateConnectionStatus(status) {
            const el = document.getElementById('connectionStatus');
            el.classList.remove('hidden', 'connected', 'connecting', 'disconnected');
            el.classList.add(status);
            el.textContent = status === 'connected' ? '● ONLINE' : status === 'connecting' ? '● CONNECTING...' : '● OFFLINE';
        }

        function connectOnline() {
            if (ws && ws.readyState === WebSocket.OPEN) return;
            
            updateConnectionStatus('connecting');
            
            ws = new WebSocket(ONLINE_SERVER);
            
            ws.onopen = () => {
                console.log('Connected to server');
                updateConnectionStatus('connected');
                reconnecting = false;
            };
            
            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    handleServerMessage(msg);
                } catch (e) {
                    console.error('Parse error:', e);
                }
            };
            
            ws.onclose = () => {
                console.log('Disconnected');
                updateConnectionStatus('disconnected');
                if (isOnline && !reconnecting) {
                    reconnecting = true;
                    setTimeout(connectOnline, 2000);
                }
            };
            
            ws.onerror = (err) => {
                console.error('WebSocket error:', err);
            };
        }

        function sendToServer(data) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(data));
            }
        }

        function handleServerMessage(msg) {
            switch (msg.type) {
                case 'welcome':
                    console.log('Server welcome, grid:', msg.grid);
                    break;
                    
                case 'joined':
                    playerId = msg.playerId;
                    console.log('Joined as player', playerId);
                    document.getElementById('lobbyOverlay').classList.add('hidden');
                    running = true;
                    spectating = false;
                    onlineGameLoop();
                    break;
                    
                case 'spectating':
                    console.log('Now spectating');
                    document.getElementById('lobbyOverlay').classList.add('hidden');
                    spectating = true;
                    running = true;
                    onlineGameLoop();
                    break;
                    
                case 'state':
                    gameState = msg;
                    if (msg.you) {
                        score = msg.you.score;
                        document.getElementById('score').textContent = score;
                        if (score > highScore) {
                            highScore = score;
                            localStorage.setItem('snakeHigh', highScore);
                            document.getElementById('highScore').textContent = highScore;
                        }
                    }
                    document.getElementById('playerCount').textContent = '👥 ' + (msg.playerCount || 1);
                    break;
                    
                case 'player_joined':
                    console.log(msg.name, 'joined');
                    break;
                    
                case 'player_left':
                    console.log(msg.name, 'left');
                    break;
                    
                case 'player_died':
                    if (msg.playerId === playerId) {
                        playDeath();
                        wrap.classList.add('shake');
                        setTimeout(() => wrap.classList.remove('shake'), 400);
                    }
                    break;
                    
                case 'food_eaten':
                    if (msg.playerId === playerId) {
                        playEat();
                    }
                    break;
                    
                case 'game_reset':
                    console.log('Game reset');
                    break;
            }
        }

        function onlineGameLoop() {
            if (!running || !isOnline) return;
            frame++;
            draw();
            requestAnimationFrame(onlineGameLoop);
        }

        // Ambient render loop: 60fps visuals (pulses, sparkles, trail, particles).
        // Purely presentational — game ticks stay in gameLoop/onlineGameLoop.
        let lastRT = performance.now();
        function renderLoop(now) {
            const dt = Math.min(50, now - lastRT);
            lastRT = now;
            vnow = now;
            stepEffects(dt);
            updateFxHud();
            if (!(running && isOnline)) draw(); // online loop draws itself
            requestAnimationFrame(renderLoop);
        }
        requestAnimationFrame(renderLoop);

        function setDir(dir) {
            if (!running) return;
            
            if (isOnline) {
                sendToServer({ type: 'move', direction: dir });
            } else {
                if (dir==='up' && dy!==1) { nextDx=0; nextDy=-1; }
                if (dir==='down' && dy!==-1) { nextDx=0; nextDy=1; }
                if (dir==='left' && dx!==1) { nextDx=-1; nextDy=0; }
                if (dir==='right' && dx!==-1) { nextDx=1; nextDy=0; }
            }
        }

        // Controls
        document.querySelectorAll('.dpad-btn').forEach(btn => {
            const handler = e => { e.preventDefault(); setDir(btn.dataset.dir); };
            btn.addEventListener('touchstart', handler, {passive:false});
            btn.addEventListener('mousedown', handler);
        });

        let tx, ty;
        canvas.addEventListener('touchstart', e => { e.preventDefault(); tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, {passive:false});
        canvas.addEventListener('touchend', e => {
            e.preventDefault();
            const ex = e.changedTouches[0].clientX, ey = e.changedTouches[0].clientY;
            const ddx = ex-tx, ddy = ey-ty;
            if (Math.abs(ddx) < 20 && Math.abs(ddy) < 20) return;
            if (Math.abs(ddx) > Math.abs(ddy)) setDir(ddx > 0 ? 'right' : 'left');
            else setDir(ddy > 0 ? 'down' : 'up');
        }, {passive:false});

        document.addEventListener('keydown', e => {
            const map = {ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',w:'up',s:'down',a:'left',d:'right'};
            if (map[e.key]) { e.preventDefault(); setDir(map[e.key]); }
        });

        // Buttons
        document.getElementById('startBtn').addEventListener('click', () => { initAudio(); startSolo(); });
        
        document.getElementById('onlineBtn').addEventListener('click', () => {
            initAudio();
            isOnline = true;
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('lobbyOverlay').classList.remove('hidden');
            document.getElementById('connectionStatus').classList.remove('hidden');
            document.getElementById('modeBtn').textContent = 'Online';
            document.getElementById('modeBtn').classList.add('online');
            document.getElementById('playerCount').style.display = 'inline';
            connectOnline();
        });
        
        document.getElementById('joinBtn').addEventListener('click', () => {
            playerName = document.getElementById('playerName').value.trim() || 'Player';
            localStorage.setItem('snakeName', playerName);
            sendToServer({ type: 'join', name: playerName });
        });
        
        document.getElementById('spectateBtn').addEventListener('click', () => {
            sendToServer({ type: 'spectate' });
        });
        
        document.getElementById('backBtn').addEventListener('click', () => {
            isOnline = false;
            if (ws) ws.close();
            document.getElementById('connectionStatus').classList.add('hidden');
            init();
        });
        
        document.getElementById('restartBtn').addEventListener('click', () => {
            initAudio();
            playStart();
            if (isOnline) {
                document.getElementById('overOverlay').classList.add('hidden');
                sendToServer({ type: 'join', name: playerName });
            } else {
                init();
                startSolo();
            }
        });
        
        document.getElementById('menuBtn').addEventListener('click', () => {
            isOnline = false;
            if (ws) ws.close();
            document.getElementById('connectionStatus').classList.add('hidden');
            init();
        });
        
        document.getElementById('modeBtn').addEventListener('click', () => {
            if (running) return;
            if (isOnline) {
                isOnline = false;
                if (ws) ws.close();
                document.getElementById('connectionStatus').classList.add('hidden');
                document.getElementById('modeBtn').textContent = 'Solo';
                document.getElementById('modeBtn').classList.remove('online');
                document.getElementById('playerCount').style.display = 'none';
                init();
            }
        });

        init();

        // Tiny debug hooks for automated verification (no gameplay impact)
        window.__debug = {
            spawnSpecial: (k, x, y) => {
                spawnSpecial(k);
                if (special && typeof x === 'number') { special.x = x; special.y = y; }
            },
            snapshot: () => ({
                special: special && { x: special.x, y: special.y, kind: special.kind },
                surgeActive: surgeUntil > performance.now(),
                ghostArmed, score, running, isOnline
            })
        };

        // Tournament mode initialization
        if (tournamentMode) {
            document.getElementById('tournamentBadge').style.display = 'inline-block';
            document.getElementById('modeBtn').style.display = 'none'; // Hide online mode in tournament
            console.log('Tournament mode active:', tournamentId);
            
            // Check if user is logged in
            const token = localStorage.getItem('clawarcade_token');
            if (!token) {
                alert('Please login at clawarcade.surge.sh to participate in the tournament!');
                window.location.href = '../tournament.html';
            }
        }
    })();
    </script>
<script>
(function(){
    var stick = window.ArcadeStick && ArcadeStick.create({ mode: 'tap', axes: 4 });
    if (stick) {
        var st = document.createElement('style');
        st.textContent = '.dpad{display:none !important}';
        document.head.appendChild(st);
    }
})();
</script>
</body>
