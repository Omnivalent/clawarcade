<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Claw Storm — ClawArcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100dvh;overflow:hidden;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
        body{font-family:'Orbitron',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#05060a;color:#e8e6e3;display:flex;flex-direction:column;height:100dvh}
        body::before{
            content:'';position:fixed;inset:0;
            background:
                radial-gradient(ellipse at 15% 0%, rgba(0,229,246,0.07) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 100%, rgba(255,42,109,0.06) 0%, transparent 50%);
            pointer-events:none;z-index:-1;
        }
        body::after{
            content:'';position:fixed;inset:0;
            background:repeating-linear-gradient(0deg,rgba(0,0,0,0.08) 0px,rgba(0,0,0,0.08) 1px,transparent 1px,transparent 3px);
            pointer-events:none;z-index:1000;opacity:0.4;
        }
        .top-bar{display:flex;justify-content:space-between;align-items:center;padding:0 10px;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);flex-shrink:0;height:44px;min-height:44px;border-bottom:2px solid rgba(0,229,246,0.4);box-shadow:0 2px 20px rgba(0,229,246,0.2);gap:8px}
        .back-btn{color:#ffd23e;text-decoration:none;font-size:.7rem;letter-spacing:1px;border:1px solid rgba(255,210,62,0.4);padding:4px 8px;border-radius:14px;white-space:nowrap;text-shadow:0 0 8px rgba(255,210,62,0.5);transition:all .2s}
        .back-btn:active{background:rgba(255,210,62,0.2)}
        .top-bar h1{font-size:.85rem;color:#00e5f6;white-space:nowrap;text-shadow:0 0 10px rgba(0,229,246,0.8),0 0 20px rgba(0,229,246,0.4);letter-spacing:2px;animation:neonPulse 2s ease-in-out infinite}
        @keyframes neonPulse{0%,100%{text-shadow:0 0 10px rgba(0,229,246,0.8),0 0 20px rgba(0,229,246,0.4)}50%{text-shadow:0 0 20px rgba(0,229,246,1),0 0 40px rgba(0,229,246,0.6)}}
        .top-stats{display:flex;gap:9px;font-size:.72rem;align-items:center;font-family:'Rajdhani',monospace;font-weight:600}
        .top-stats .lbl{color:#8899aa}
        .stat-value{color:#22e59a;font-weight:700;text-shadow:0 0 8px rgba(34,229,154,0.6);font-size:.9rem}
        #lives{color:#ff2a6d;text-shadow:0 0 8px rgba(255,42,109,0.6)}
        #bombs{color:#ffd23e;text-shadow:0 0 8px rgba(255,210,62,0.6)}
        .top-btn{background:rgba(0,229,246,0.1);border:2px solid rgba(0,229,246,0.4);color:#00e5f6;padding:4px 9px;border-radius:20px;font-size:.7rem;cursor:pointer;min-height:26px;font-family:'Orbitron',sans-serif;transition:all .2s}
        .top-btn:active{background:rgba(0,229,246,0.3);transform:scale(0.95)}
        .game-area{flex:1;position:relative;min-height:0;overflow:hidden}
        canvas#game{position:absolute;inset:0;display:block}
        .game-area::after{
            content:'';position:absolute;inset:0;pointer-events:none;
            background:radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(0,0,6,0.5) 100%);
        }
        .hidden{display:none!important}
        .overlay{position:fixed;inset:0;background:rgba(4,4,14,0.9);display:flex;align-items:center;justify-content:center;z-index:20;animation:fadeIn .3s ease;backdrop-filter:blur(8px)}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .overlay .inner{text-align:center;padding:30px;max-width:92vw}
        .overlay h2{color:#ff2a6d;margin-bottom:14px;text-shadow:0 0 18px rgba(255,42,109,0.9),0 0 40px rgba(255,42,109,0.4);font-size:1.9rem;letter-spacing:4px;animation:neonPulse2 1.6s ease-in-out infinite}
        @keyframes neonPulse2{0%,100%{opacity:1}50%{opacity:.75}}
        .overlay h2.title-cyan{color:#00e5f6;text-shadow:0 0 18px rgba(0,229,246,0.9),0 0 40px rgba(0,229,246,0.4)}
        .overlay p{color:#aab;margin-bottom:14px;font-size:.92rem;font-family:'Rajdhani',sans-serif;font-weight:600;line-height:1.7;letter-spacing:.5px}
        .overlay .score-line{color:#22e59a;font-size:1.25rem;text-shadow:0 0 12px rgba(34,229,154,0.7)}
        .overlay .btn{display:block;margin:12px auto 0;background:linear-gradient(135deg,#00e5f6 0%,#0088a8 100%);color:#05060a;border:none;padding:14px 38px;font-size:1rem;font-weight:700;border-radius:26px;cursor:pointer;min-height:50px;box-shadow:0 0 22px rgba(0,229,246,0.5);transition:all .2s;font-family:'Orbitron',sans-serif;letter-spacing:1px}
        .overlay .btn:active{transform:scale(0.95)}
        .newhigh{color:#ffd23e!important;text-shadow:0 0 14px rgba(255,210,62,0.8)!important;animation:neonPulse2 .8s ease-in-out infinite}
        .keycap{display:inline-block;border:1px solid rgba(0,229,246,0.5);border-radius:5px;padding:0 7px;color:#00e5f6;font-family:'Rajdhani',sans-serif;font-weight:700}
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="../index.html" class="back-btn">← MENU</a>
        <h1>CLAW STORM</h1>
        <div class="top-stats">
            <span><span class="lbl">SC </span><span class="stat-value" id="score">0</span></span>
            <span><span class="lbl">HI </span><span class="stat-value" id="high">0</span></span>
            <span><span class="lbl">WV </span><span class="stat-value" id="wave">1</span></span>
            <span class="stat-value" id="lives">▲▲▲</span>
            <span class="stat-value" id="bombs">◉◉</span>
            <button class="top-btn" id="muteBtn">🔊</button>
        </div>
    </div>
    <div class="game-area" id="gameArea">
        <canvas id="game"></canvas>
    </div>
    <div class="overlay" id="overlay">
        <div class="inner">
            <h2 id="ovTitle" class="title-cyan">CLAW STORM</h2>
            <p id="ovMsg">Move: <span class="keycap">WASD</span> / <span class="keycap">↑↓←→</span> &nbsp;·&nbsp; Bomb: <span class="keycap">SPACE</span><br>
            The turret aims itself — you just have to survive.<br>Chain kills fast to grow the multiplier.</p>
            <button class="btn" id="ovBtn">START</button>
        </div>
    </div>
    <script src="../js/human-check.js"></script>
    <script src="../js/joystick.js"></script>
<script>
(function(){
'use strict';
const dpr = Math.min(window.devicePixelRatio || 1, 2);
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const gameArea = document.getElementById('gameArea');

/* ===== palette ===== */
const CYAN = '#00e5f6', MAG = '#ff2a6d', GOLD = '#ffd23e', GREEN = '#22e59a', WHITE = '#ffffff';
function hexA(hex, a){
    const n = parseInt(hex.slice(1), 16);
    return 'rgba(' + ((n>>16)&255) + ',' + ((n>>8)&255) + ',' + (n&255) + ',' + a + ')';
}

/* ===== audio ===== */
let audioCtx = null, soundEnabled = true, audioInitialized = false;
function initAudio(){
    if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){ return; } }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    audioInitialized = true;
}
function initAudioOnce(){ if (!audioInitialized) initAudio(); }
document.addEventListener('click', initAudioOnce, {once:true});
document.addEventListener('touchstart', initAudioOnce, {once:true});
document.addEventListener('keydown', initAudioOnce, {once:true});

function playTone(freq, type, dur, vol=0.18, slideTo){
    if (!soundEnabled || !audioCtx) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1, slideTo), audioCtx.currentTime + dur);
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
}
function playNoise(dur, vol=0.25){
    if (!soundEnabled || !audioCtx) return;
    const len = Math.floor(audioCtx.sampleRate * dur);
    const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * (1 - i/len);
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    src.connect(g); g.connect(audioCtx.destination); src.start();
}
let shotTick = 0;
const sfxShot = () => { if (++shotTick % 2 === 0) playTone(1300 + Math.random()*300, 'triangle', 0.045, 0.035, 500); };
const sfxPop = (type) => {
    if (type === 'chaser') { playTone(340, 'sawtooth', 0.14, 0.12, 70); }
    else if (type === 'weaver') { playTone(560, 'square', 0.11, 0.09, 160); }
    else if (type === 'splitter') { playTone(210, 'sawtooth', 0.2, 0.14, 55); playNoise(0.12, 0.08); }
    else if (type === 'mini') { playTone(760, 'square', 0.08, 0.08, 240); }
    else { playTone(150, 'sawtooth', 0.32, 0.16, 36); playNoise(0.25, 0.14); }
};
const sfxChain = (m) => { playTone(500 + m*70, 'sine', 0.1, 0.14); setTimeout(()=>playTone(700 + m*90, 'sine', 0.12, 0.14), 70); };
const sfxBomb = () => { playNoise(0.75, 0.42); playTone(72, 'sine', 0.85, 0.32, 22); playTone(420, 'sawtooth', 0.5, 0.16, 40); };
let spawnSndT = 0;
const sfxSpawn = () => { const now = performance.now(); if (now - spawnSndT > 160){ spawnSndT = now; playTone(200, 'sine', 0.2, 0.045, 820); } };
const sfxDeath = () => { playNoise(0.8, 0.35); [220,160,110,70].forEach((f,i)=>setTimeout(()=>playTone(f,'sawtooth',0.3,0.2),i*140)); };
const sfxWave = () => [440,554,659].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.14,0.15),i*90));
const sfxBombUp = () => [660,880,1320].forEach((f,i)=>setTimeout(()=>playTone(f,'triangle',0.12,0.16),i*80));

document.getElementById('muteBtn').onclick = () => {
    initAudio(); soundEnabled = !soundEnabled;
    document.getElementById('muteBtn').textContent = soundEnabled ? '🔊' : '🔇';
};

/* ===== state ===== */
let W = 0, H = 0;            // viewport
let AW = 0, AH = 0;          // arena (world) size
let cam = { x: 0, y: 0, zoom: 1 };
let player = null;
let bullets = [], enemies = [], particles = [], popups = [], shockwaves = [];
let score = 0, lives = 3, wave = 0, bombs = 2, nextBombScore = 5000;
let chainKills = 0, mult = 1, chainT = 0;
const CHAIN_WINDOW = 1.9;
let running = false, gameOver = false;
let shake = 0, flash = 0, chroma = 0;
let waveT = 0, spawnQueue = [], betweenT = 0, bannerT = 0, bannerText = '', bannerColor = CYAN, frenzy = false;
let lastTime = 0, gameTime = 0;
let high = 0;
try { high = parseInt(localStorage.getItem('clawStormHigh') || '0') || 0; } catch(e){}
document.getElementById('high').textContent = high;

const keys = { up:false, down:false, left:false, right:false };

/* ===== spring grid (the geometry-wars warp) ===== */
const GRID_C = 28, GRID_R = 18;
let grid = [];               // {ox,oy,vx,vy} offsets from home; homes computed from index
let gsx = 0, gsy = 0;        // grid spacing
function buildGrid(){
    grid = new Array(GRID_C * GRID_R);
    for (let i = 0; i < grid.length; i++) grid[i] = { ox:0, oy:0, vx:0, vy:0 };
    gsx = AW / (GRID_C - 1);
    gsy = AH / (GRID_R - 1);
}
function gridImpulse(x, y, radius, power){
    const c0 = Math.max(0, Math.floor((x - radius) / gsx)), c1 = Math.min(GRID_C - 1, Math.ceil((x + radius) / gsx));
    const r0 = Math.max(0, Math.floor((y - radius) / gsy)), r1 = Math.min(GRID_R - 1, Math.ceil((y + radius) / gsy));
    for (let r = r0; r <= r1; r++){
        for (let c = c0; c <= c1; c++){
            const hx = c * gsx, hy = r * gsy;
            const dx = hx - x, dy = hy - y;
            const d = Math.sqrt(dx*dx + dy*dy);
            if (d > radius || d < 0.001) continue;
            const f = power * (1 - d/radius) / d;
            const p = grid[r * GRID_C + c];
            p.vx += dx * f; p.vy += dy * f;
        }
    }
}
function updateGrid(dt){
    const K = 78, S = 46;
    const damp = Math.pow(0.028, dt);
    for (let r = 0; r < GRID_R; r++){
        for (let c = 0; c < GRID_C; c++){
            const i = r * GRID_C + c;
            const p = grid[i];
            // neighbor coupling → wave propagation
            let nx = 0, ny = 0, n = 0;
            if (c > 0){ const q = grid[i-1]; nx += q.ox; ny += q.oy; n++; }
            if (c < GRID_C-1){ const q = grid[i+1]; nx += q.ox; ny += q.oy; n++; }
            if (r > 0){ const q = grid[i-GRID_C]; nx += q.ox; ny += q.oy; n++; }
            if (r < GRID_R-1){ const q = grid[i+GRID_C]; nx += q.ox; ny += q.oy; n++; }
            nx /= n; ny /= n;
            p.vx += (-p.ox * K + (nx - p.ox) * S) * dt;
            p.vy += (-p.oy * K + (ny - p.oy) * S) * dt;
            p.vx *= damp; p.vy *= damp;
            p.ox += p.vx * dt; p.oy += p.vy * dt;
        }
    }
}

/* ===== resize / arena ===== */
function resize(){
    W = gameArea.clientWidth; H = gameArea.clientHeight;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    AW = Math.max(Math.round(W * 1.4), 860);
    AH = Math.max(Math.round(H * 1.4), 680);
    buildGrid();
    if (player){
        player.x = Math.min(Math.max(player.x, 40), AW - 40);
        player.y = Math.min(Math.max(player.y, 40), AH - 40);
    }
    cam.x = AW/2; cam.y = AH/2;
}

/* ===== player ===== */
function newPlayer(){
    return { x: AW/2, y: AH/2, vx: 0, vy: 0, r: 10, angle: -Math.PI/2, turret: 0,
             invuln: 2, dead: false, respawnT: 0, fireCd: 0, trailT: 0 };
}

/* ===== particles (pooled, capped) ===== */
const MAX_PARTICLES = 450;
const pool = [];
function getP(){
    if (particles.length >= MAX_PARTICLES) return null;
    const p = pool.pop() || {};
    particles.push(p);
    return p;
}
function burst(x, y, color, count, spd, life, size){
    for (let i = 0; i < count; i++){
        const p = getP(); if (!p) return;
        const a = Math.random()*Math.PI*2, s = (0.25 + Math.random()) * spd;
        p.x = x; p.y = y;
        p.vx = Math.cos(a)*s; p.vy = Math.sin(a)*s;
        p.life = p.maxLife = life*(0.5+Math.random()*0.7);
        p.color = color;
        p.size = (size||2) * (0.6 + Math.random()*0.9);
        p.streak = Math.random() < 0.5;
    }
}
function updateParticles(dt){
    const fr = Math.pow(0.3, dt);
    for (let i = particles.length - 1; i >= 0; i--){
        const p = particles[i];
        p.x += p.vx * dt; p.y += p.vy * dt;
        p.vx *= fr; p.vy *= fr;
        p.life -= dt;
        if (p.life <= 0){ pool.push(p); particles[i] = particles[particles.length-1]; particles.pop(); }
    }
}

/* ===== popups ===== */
function popup(x, y, text, color, size){
    popups.push({ x, y, text, color, size: size || 14, life: 0.9, maxLife: 0.9 });
    if (popups.length > 40) popups.shift();
}

/* ===== enemies ===== */
const CAP_ALIVE = 78;
function edgePoint(){
    const m = 34;
    const side = Math.floor(Math.random()*4);
    if (side === 0) return { x: m + Math.random()*(AW-2*m), y: m };
    if (side === 1) return { x: m + Math.random()*(AW-2*m), y: AH - m };
    if (side === 2) return { x: m, y: m + Math.random()*(AH-2*m) };
    return { x: AW - m, y: m + Math.random()*(AH-2*m) };
}
function spawnEnemy(type){
    const pt = edgePoint();
    const e = { type, x: pt.x, y: pt.y, vx: 0, vy: 0, t: 0, warm: 0.75, rot: Math.random()*Math.PI*2 };
    const sc = 1 + wave * 0.045;
    if (type === 'chaser'){ e.r = 13; e.hp = 1; e.spd = (105 + Math.random()*40) * sc * (frenzy ? 1.3 : 1); e.color = MAG; e.pts = 50; }
    else if (type === 'weaver'){
        e.r = 13; e.hp = 1; e.spd = (120 + Math.random()*40) * sc; e.color = CYAN; e.pts = 80;
        e.dir = Math.atan2(AH/2 - pt.y, AW/2 - pt.x) + (Math.random()-0.5)*1.1;
        e.ph = Math.random()*Math.PI*2; e.freq = 4 + Math.random()*3; e.amp = 90 + Math.random()*70;
    }
    else if (type === 'splitter'){ e.r = 18; e.hp = 2; e.spd = 52 * sc; e.color = GOLD; e.pts = 100; }
    else if (type === 'mini'){ e.r = 8; e.hp = 1; e.spd = (170 + Math.random()*60) * sc; e.color = GOLD; e.pts = 30; e.warm = 0.22; }
    else if (type === 'snake'){
        e.r = 11; e.hp = 5; e.spd = (135 + Math.random()*20) * sc; e.color = GREEN; e.pts = 400;
        e.heading = Math.atan2(AH/2 - pt.y, AW/2 - pt.x);
        e.segs = [];
        for (let i = 1; i <= 11; i++) e.segs.push({ x: pt.x - Math.cos(e.heading)*i*14, y: pt.y - Math.sin(e.heading)*i*14 });
    }
    enemies.push(e);
    sfxSpawn();
    return e;
}
function spawnMini(x, y){
    if (enemies.length >= CAP_ALIVE) return;
    const e = spawnEnemy('mini');
    e.x = x + (Math.random()-0.5)*22; e.y = y + (Math.random()-0.5)*22;
    const a = Math.random()*Math.PI*2;
    e.vx = Math.cos(a)*230; e.vy = Math.sin(a)*230;
}

function buildWave(w){
    frenzy = (w % 5 === 0);
    spawnQueue = [];
    waveT = 0;
    const dur = Math.min(4 + w * 1.1, 18);
    function add(type, count, from, to){
        for (let i = 0; i < count; i++) spawnQueue.push({ type, t: from + Math.random()*(to-from) });
    }
    add('chaser', Math.min(5 + w*2, 26), 0.2, dur);
    if (w >= 2) add('weaver', Math.min(2 + w, 14), 0.8, dur);
    if (w >= 3) add('splitter', Math.min(1 + Math.floor(w/2), 8), 1.5, dur);
    if (w >= 4) add('snake', Math.min(1 + Math.floor((w-4)/3), 4), 2, dur * 0.8);
    if (frenzy){
        add('chaser', 12, 0.1, 2.2);
        bannerText = '⚡ FRENZY WAVE ' + w + ' ⚡'; bannerColor = MAG;
    } else {
        bannerText = 'WAVE ' + w; bannerColor = CYAN;
    }
    spawnQueue.sort((a,b) => a.t - b.t);
    bannerT = 1.8;
    sfxWave();
}

/* ===== kill / score ===== */
function addScore(pts, x, y, useMult){
    const gain = useMult ? pts * mult : pts;
    score += gain;
    if (useMult){
        chainKills++;
        chainT = CHAIN_WINDOW;
        const newMult = Math.min(1 + Math.floor(chainKills / 4), 12);
        if (newMult > mult){
            mult = newMult;
            sfxChain(mult);
            popup(x, y - 22, '×' + mult + ' CHAIN', GOLD, 17);
        }
    }
    popup(x, y, '+' + gain, useMult && mult > 1 ? GOLD : WHITE, 13 + Math.min(6, gain/120));
    if (score >= nextBombScore){
        bombs++; nextBombScore += 5000;
        sfxBombUp();
        popup(player.x, player.y - 30, '◉ BOMB +1', GOLD, 18);
    }
    if (score > high){ high = score; try { localStorage.setItem('clawStormHigh', String(high)); } catch(e){} }
    updateUI();
}
function killEnemy(i, useMult, quiet){
    const e = enemies[i];
    enemies.splice(i, 1);
    const big = e.type === 'snake' || e.type === 'splitter';
    burst(e.x, e.y, e.color, big ? 26 : 14, big ? 240 : 190, big ? 0.85 : 0.6, big ? 2.6 : 2);
    burst(e.x, e.y, WHITE, 4, 260, 0.3, 1.6);
    gridImpulse(e.x, e.y, big ? 220 : 150, big ? 130 : 70);
    if (e.type === 'snake'){
        for (const s of e.segs){ burst(s.x, s.y, GREEN, 3, 160, 0.5, 1.8); }
        gridImpulse(e.x, e.y, 300, 160);
    }
    if (!quiet) sfxPop(e.type);
    shake = Math.max(shake, big ? 6 : 2.5);
    if (e.type === 'splitter'){ for (let k = 0; k < 3; k++) spawnMini(e.x, e.y); }
    if (useMult !== null) addScore(e.pts, e.x, e.y, useMult);
}

/* ===== bombs ===== */
function fireBomb(){
    if (!running || gameOver || bombs <= 0 || !player || player.dead) return;
    if (shockwaves.some(s => s.player)) return;
    bombs--;
    updateUI();
    shockwaves.push({ x: player.x, y: player.y, r: 20, maxR: Math.max(AW, AH) * 0.85, speed: 1450, player: true });
    flash = 1; chroma = 1; shake = Math.max(shake, 22);
    gridImpulse(player.x, player.y, 620, 620);
    sfxBomb();
}
function updateShockwaves(dt){
    for (let i = shockwaves.length - 1; i >= 0; i--){
        const s = shockwaves[i];
        const prevR = s.r;
        s.r += s.speed * dt;
        gridImpulse(s.x, s.y, s.r + 60, 34);
        if (s.player){
            for (let j = enemies.length - 1; j >= 0; j--){
                const e = enemies[j];
                const d = Math.hypot(e.x - s.x, e.y - s.y);
                if (d < s.r && d >= prevR - 90){
                    killEnemy(j, false, enemies.length % 3 !== 0);
                }
            }
        }
        if (s.r > s.maxR) shockwaves.splice(i, 1);
    }
}

/* ===== firing (auto) ===== */
function nearestEnemy(){
    let best = null, bd = Infinity;
    for (const e of enemies){
        if (e.warm > 0) continue;
        const d = (e.x - player.x)*(e.x - player.x) + (e.y - player.y)*(e.y - player.y);
        if (d < bd){ bd = d; best = e; }
    }
    return best;
}
let shotSide = 1;
function autoFire(dt){
    player.fireCd -= dt;
    const t = nearestEnemy();
    if (t){
        const aim = Math.atan2(t.y - player.y, t.x - player.x);
        let da = aim - player.turret;
        while (da > Math.PI) da -= Math.PI*2;
        while (da < -Math.PI) da += Math.PI*2;
        player.turret += da * Math.min(1, dt * 14);
        if (player.fireCd <= 0 && bullets.length < 42){
            player.fireCd = 0.115;
            shotSide = -shotSide;
            const a = player.turret;
            const px = Math.cos(a + Math.PI/2) * 4 * shotSide, py = Math.sin(a + Math.PI/2) * 4 * shotSide;
            bullets.push({
                x: player.x + Math.cos(a)*14 + px, y: player.y + Math.sin(a)*14 + py,
                vx: Math.cos(a)*640 + player.vx*0.3, vy: Math.sin(a)*640 + player.vy*0.3
            });
            sfxShot();
        }
    }
}

/* ===== player death / respawn ===== */
function killPlayer(){
    if (player.dead || player.invuln > 0) return;
    player.dead = true;
    player.respawnT = 1.4;
    lives--;
    chainKills = 0; mult = 1; chainT = 0;
    sfxDeath();
    shake = 20; flash = Math.max(flash, 0.5); chroma = Math.max(chroma, 0.7);
    burst(player.x, player.y, CYAN, 34, 320, 1.0, 2.6);
    burst(player.x, player.y, WHITE, 14, 380, 0.5, 2);
    burst(player.x, player.y, MAG, 18, 240, 0.8, 2.2);
    gridImpulse(player.x, player.y, 420, 380);
    updateUI();
    if (lives <= 0) setTimeout(endGame, 1200);
}
function respawn(){
    const px = player.x, py = player.y;
    player = newPlayer();
    player.x = px; player.y = py;
    player.invuln = 2;
    // clear radius
    for (let i = enemies.length - 1; i >= 0; i--){
        const e = enemies[i];
        if (Math.hypot(e.x - player.x, e.y - player.y) < 270) killEnemy(i, null, true);
    }
    shockwaves.push({ x: player.x, y: player.y, r: 8, maxR: 290, speed: 900, player: false });
    gridImpulse(player.x, player.y, 320, 240);
}

/* ===== game flow ===== */
function startGame(){
    score = 0; lives = 3; wave = 1; bombs = 2; nextBombScore = 5000;
    chainKills = 0; mult = 1; chainT = 0;
    bullets = []; enemies = []; popups = []; shockwaves = [];
    particles.length = 0;
    player = newPlayer();
    cam.x = player.x; cam.y = player.y; cam.zoom = 1;
    gameOver = false; running = true;
    betweenT = 0; gameTime = 0;
    buildWave(wave);
    hideOverlay();
    updateUI();
}
function endGame(){
    if (gameOver) return;
    gameOver = true; running = false;
    const isHigh = score >= high && score > 0;
    showOverlay('STORM OVER',
        '<span class="score-line' + (isHigh ? ' newhigh' : '') + '">SCORE: ' + score + (isHigh ? ' — NEW HIGH!' : '') + '</span><br>WAVE ' + wave + ' · HIGH: ' + high,
        'PLAY AGAIN', startGame);
}
function showOverlay(title, msg, btnText, action){
    document.getElementById('ovTitle').textContent = title;
    document.getElementById('ovTitle').classList.toggle('title-cyan', title !== 'STORM OVER');
    document.getElementById('ovMsg').innerHTML = msg;
    const b = document.getElementById('ovBtn');
    b.textContent = btnText; b.onclick = () => { initAudio(); action(); };
    document.getElementById('overlay').classList.remove('hidden');
}
function hideOverlay(){ document.getElementById('overlay').classList.add('hidden'); }
function updateUI(){
    document.getElementById('score').textContent = score;
    document.getElementById('wave').textContent = wave;
    document.getElementById('high').textContent = high;
    document.getElementById('lives').textContent = '▲'.repeat(Math.max(0, lives));
    document.getElementById('bombs').textContent = bombs > 5 ? '◉×' + bombs : '◉'.repeat(Math.max(0, bombs));
}

/* ===== update ===== */
function update(dt){
    gameTime += dt;

    /* --- spawn queue --- */
    waveT += dt;
    while (spawnQueue.length && spawnQueue[0].t <= waveT && enemies.length < CAP_ALIVE){
        spawnEnemy(spawnQueue.shift().type);
    }
    if (!spawnQueue.length && enemies.length === 0 && !gameOver){
        betweenT += dt;
        if (betweenT > 1.4){
            betweenT = 0; wave++;
            buildWave(wave);
            updateUI();
        }
    } else betweenT = 0;

    /* --- player --- */
    if (player.dead){
        player.respawnT -= dt;
        if (player.respawnT <= 0 && lives > 0) respawn();
    } else {
        let ix = (keys.right?1:0) - (keys.left?1:0);
        let iy = (keys.down?1:0) - (keys.up?1:0);
        if (ix || iy){
            const il = Math.hypot(ix, iy);
            ix /= il; iy /= il;
            player.vx += ix * 1500 * dt;
            player.vy += iy * 1500 * dt;
            player.angle = Math.atan2(player.vy, player.vx);
            // engine trail
            player.trailT -= dt;
            if (player.trailT <= 0){
                player.trailT = 0.02;
                const p = getP();
                if (p){
                    p.x = player.x - Math.cos(player.angle)*10; p.y = player.y - Math.sin(player.angle)*10;
                    p.vx = -Math.cos(player.angle)*70 + (Math.random()-0.5)*40;
                    p.vy = -Math.sin(player.angle)*70 + (Math.random()-0.5)*40;
                    p.life = p.maxLife = 0.3; p.color = Math.random()<0.6 ? CYAN : WHITE; p.size = 1.7; p.streak = false;
                }
            }
        }
        const fr = Math.pow(0.16, dt);
        player.vx *= fr; player.vy *= fr;
        const spd = Math.hypot(player.vx, player.vy), maxSpd = 350;
        if (spd > maxSpd){ player.vx *= maxSpd/spd; player.vy *= maxSpd/spd; }
        player.x += player.vx * dt; player.y += player.vy * dt;
        const m = 22;
        if (player.x < m){ player.x = m; player.vx *= -0.4; }
        if (player.x > AW - m){ player.x = AW - m; player.vx *= -0.4; }
        if (player.y < m){ player.y = m; player.vy *= -0.4; }
        if (player.y > AH - m){ player.y = AH - m; player.vy *= -0.4; }
        if (player.invuln > 0) player.invuln -= dt;
        // gentle grid suction toward the ship
        gridImpulse(player.x, player.y, 110, -60 * dt);
        autoFire(dt);
    }

    /* --- chain decay --- */
    if (chainT > 0){
        chainT -= dt;
        if (chainT <= 0){ chainKills = 0; mult = 1; }
    }

    /* --- bullets --- */
    for (let i = bullets.length - 1; i >= 0; i--){
        const b = bullets[i];
        b.x += b.vx * dt; b.y += b.vy * dt;
        if (b.x < 14 || b.x > AW - 14 || b.y < 14 || b.y > AH - 14){
            burst(b.x, b.y, GOLD, 3, 130, 0.25, 1.4);
            gridImpulse(b.x, b.y, 60, 26);
            bullets.splice(i, 1);
            continue;
        }
        let hit = false;
        for (let j = enemies.length - 1; j >= 0; j--){
            const e = enemies[j];
            if (e.warm > 0) continue;
            if (e.type === 'snake'){
                // armored body: bullet sparks off segments
                let blocked = false;
                for (const s of e.segs){
                    if (Math.abs(b.x - s.x) < 10 && Math.abs(b.y - s.y) < 10){
                        burst(b.x, b.y, GREEN, 3, 120, 0.22, 1.3);
                        blocked = true; break;
                    }
                }
                if (blocked){ bullets.splice(i, 1); hit = true; break; }
            }
            const rr = e.r + 4;
            if (Math.abs(b.x - e.x) < rr && Math.abs(b.y - e.y) < rr && Math.hypot(b.x - e.x, b.y - e.y) < rr){
                e.hp--;
                bullets.splice(i, 1); hit = true;
                if (e.hp <= 0) killEnemy(j, true);
                else {
                    burst(b.x, b.y, e.color, 5, 160, 0.3, 1.6);
                    gridImpulse(b.x, b.y, 70, 34);
                    playTone(900, 'square', 0.04, 0.04, 300);
                }
                break;
            }
        }
        if (hit) continue;
    }

    /* --- enemies --- */
    for (let i = enemies.length - 1; i >= 0; i--){
        const e = enemies[i];
        e.t += dt;
        if (e.warm > 0){ e.warm -= dt; continue; }
        if (e.type === 'chaser' || e.type === 'mini'){
            const a = Math.atan2(player.y - e.y, player.x - e.x);
            const acc = e.type === 'mini' ? 900 : 620;
            e.vx += Math.cos(a) * acc * dt;
            e.vy += Math.sin(a) * acc * dt;
            const s = Math.hypot(e.vx, e.vy);
            if (s > e.spd){ e.vx *= e.spd/s; e.vy *= e.spd/s; }
            e.rot += dt * (e.type === 'mini' ? 7 : 3.2);
        } else if (e.type === 'weaver'){
            const sway = Math.cos(e.t * e.freq + e.ph) * e.amp;
            e.vx = Math.cos(e.dir) * e.spd + Math.cos(e.dir + Math.PI/2) * sway;
            e.vy = Math.sin(e.dir) * e.spd + Math.sin(e.dir + Math.PI/2) * sway;
            e.rot += dt * 9;
            const m = 26;
            if ((e.x < m && Math.cos(e.dir) < 0) || (e.x > AW - m && Math.cos(e.dir) > 0)) e.dir = Math.PI - e.dir;
            if ((e.y < m && Math.sin(e.dir) < 0) || (e.y > AH - m && Math.sin(e.dir) > 0)) e.dir = -e.dir;
        } else if (e.type === 'splitter'){
            const a = Math.atan2(player.y - e.y, player.x - e.x);
            e.vx += (Math.cos(a) * e.spd - e.vx) * dt * 1.6;
            e.vy += (Math.sin(a) * e.spd - e.vy) * dt * 1.6;
            e.rot += dt * 1.1;
        } else if (e.type === 'snake'){
            const want = Math.atan2(player.y - e.y, player.x - e.x);
            let da = want - e.heading;
            while (da > Math.PI) da -= Math.PI*2;
            while (da < -Math.PI) da += Math.PI*2;
            e.heading += Math.max(-2.2*dt, Math.min(2.2*dt, da)) ;
            const wig = Math.sin(e.t * 6) * 0.55;
            e.vx = Math.cos(e.heading + wig) * e.spd;
            e.vy = Math.sin(e.heading + wig) * e.spd;
            // segments follow
            let prev = e;
            for (const s of e.segs){
                const dx = prev.x - s.x, dy = prev.y - s.y;
                const d = Math.hypot(dx, dy) || 1;
                if (d > 14){ s.x = prev.x - dx/d*14; s.y = prev.y - dy/d*14; }
                prev = s;
            }
        }
        e.x += e.vx * dt; e.y += e.vy * dt;
        const em = 18;
        e.x = Math.min(Math.max(e.x, em), AW - em);
        e.y = Math.min(Math.max(e.y, em), AH - em);
        // touch player
        if (!player.dead && player.invuln <= 0){
            if (Math.hypot(e.x - player.x, e.y - player.y) < e.r + player.r * 0.8) killPlayer();
            else if (e.type === 'snake'){
                for (const s of e.segs){
                    if (Math.hypot(s.x - player.x, s.y - player.y) < 9 + player.r * 0.8){ killPlayer(); break; }
                }
            }
        }
    }

    updateShockwaves(dt);

    /* --- popups --- */
    for (let i = popups.length - 1; i >= 0; i--){
        const p = popups[i];
        p.life -= dt;
        if (p.life <= 0) popups.splice(i, 1);
    }

    /* --- camera --- */
    const crowd = Math.min(enemies.length, 60);
    const targetZoom = 1 - crowd * 0.0038 - (shockwaves.length ? 0.03 : 0);
    cam.zoom += (targetZoom - cam.zoom) * Math.min(1, dt * 3);
    const lookX = player.x + player.vx * 0.22, lookY = player.y + player.vy * 0.22;
    cam.x += (lookX - cam.x) * Math.min(1, dt * 5);
    cam.y += (lookY - cam.y) * Math.min(1, dt * 5);
    const hw = W / (2 * cam.zoom), hh = H / (2 * cam.zoom);
    cam.x = AW < 2*hw ? AW/2 : Math.min(Math.max(cam.x, hw - 14), AW - hw + 14);
    cam.y = AH < 2*hh ? AH/2 : Math.min(Math.max(cam.y, hh - 14), AH - hh + 14);
}

/* ===== draw ===== */
function drawGrid(){
    // world-space glowing grid, deformed by offsets
    ctx.lineWidth = 1;
    for (let r = 0; r < GRID_R; r++){
        const major = r % 4 === 0;
        ctx.strokeStyle = major ? 'rgba(0,229,246,0.22)' : 'rgba(0,229,246,0.10)';
        ctx.beginPath();
        let i = r * GRID_C;
        let px = grid[i].ox, py = r * gsy + grid[i].oy;
        ctx.moveTo(px, py);
        for (let c = 1; c < GRID_C; c++){
            const p = grid[i + c];
            const nx = c * gsx + p.ox, ny = r * gsy + p.oy;
            ctx.quadraticCurveTo(px, py, (px + nx)/2, (py + ny)/2);
            px = nx; py = ny;
        }
        ctx.lineTo(px, py);
        ctx.stroke();
    }
    for (let c = 0; c < GRID_C; c++){
        const major = c % 4 === 0;
        ctx.strokeStyle = major ? 'rgba(0,229,246,0.22)' : 'rgba(0,229,246,0.10)';
        ctx.beginPath();
        let p = grid[c];
        let px = c * gsx + p.ox, py = p.oy;
        ctx.moveTo(px, py);
        for (let r = 1; r < GRID_R; r++){
            p = grid[r * GRID_C + c];
            const nx = c * gsx + p.ox, ny = r * gsy + p.oy;
            ctx.quadraticCurveTo(px, py, (px + nx)/2, (py + ny)/2);
            px = nx; py = ny;
        }
        ctx.lineTo(px, py);
        ctx.stroke();
    }
    // energized nodes where the grid is disturbed
    ctx.fillStyle = CYAN;
    for (let r = 0; r < GRID_R; r++){
        for (let c = 0; c < GRID_C; c++){
            const p = grid[r * GRID_C + c];
            const d2 = p.ox*p.ox + p.oy*p.oy;
            if (d2 > 30){
                const a = Math.min(0.75, d2 / 2400);
                ctx.globalAlpha = a;
                const x = c * gsx + p.ox, y = r * gsy + p.oy;
                ctx.fillRect(x - 1.5, y - 1.5, 3, 3);
            }
        }
    }
    ctx.globalAlpha = 1;
}

function drawArena(){
    ctx.lineWidth = 6;
    ctx.strokeStyle = 'rgba(0,229,246,0.12)';
    ctx.beginPath(); ctx.roundRect(6, 6, AW - 12, AH - 12, 26); ctx.stroke();
    ctx.lineWidth = 2;
    ctx.strokeStyle = 'rgba(0,229,246,0.55)';
    ctx.beginPath(); ctx.roundRect(6, 6, AW - 12, AH - 12, 26); ctx.stroke();
}

function glowShape(color, lw){
    ctx.strokeStyle = color;
    ctx.globalAlpha = 0.28;
    ctx.lineWidth = lw * 3.2;
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.lineWidth = lw;
    ctx.stroke();
}

function drawEnemy(e){
    const t = performance.now() * 0.001;
    if (e.warm > 0){
        // spawn portal
        const p = 1 - e.warm / 0.75;
        ctx.save();
        ctx.translate(e.x, e.y);
        ctx.rotate(t * 5);
        ctx.strokeStyle = e.color;
        ctx.globalAlpha = 0.25 + p * 0.6;
        ctx.lineWidth = 2;
        const rr = 6 + p * 24;
        for (let k = 0; k < 3; k++){
            ctx.beginPath();
            ctx.arc(0, 0, rr, k * 2.1, k * 2.1 + 1.4);
            ctx.stroke();
        }
        ctx.globalAlpha = (0.5 + p * 0.5) * (Math.sin(t*22) > 0 ? 1 : 0.4);
        ctx.beginPath(); ctx.arc(0, 0, 3 + p*3, 0, Math.PI*2);
        ctx.fillStyle = WHITE; ctx.fill();
        ctx.globalAlpha = 1;
        ctx.restore();
        return;
    }
    ctx.save();
    ctx.translate(e.x, e.y);
    if (e.type === 'chaser' || e.type === 'mini'){
        ctx.rotate(Math.atan2(e.vy, e.vx) + Math.PI/4);
        const s = e.r * (1 + Math.sin(e.t * 8) * 0.08);
        ctx.beginPath();
        ctx.moveTo(0, -s); ctx.lineTo(s, 0); ctx.lineTo(0, s); ctx.lineTo(-s, 0);
        ctx.closePath();
        ctx.fillStyle = hexA(e.color, 0.16); ctx.fill();
        glowShape(e.color, e.type === 'mini' ? 1.5 : 2);
    } else if (e.type === 'weaver'){
        ctx.rotate(e.rot);
        const s = e.r + 3;
        ctx.beginPath();
        for (let k = 0; k < 4; k++){
            const a = k * Math.PI/2;
            ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(Math.cos(a + 0.6)*s*0.8, Math.sin(a + 0.6)*s*0.8, Math.cos(a)*s, Math.sin(a)*s);
        }
        glowShape(e.color, 2);
        ctx.fillStyle = WHITE;
        ctx.globalAlpha = 0.9;
        ctx.fillRect(-2, -2, 4, 4);
        ctx.globalAlpha = 1;
    } else if (e.type === 'splitter'){
        ctx.rotate(e.rot);
        const s = e.r * (1 + Math.sin(e.t * 5) * 0.06);
        ctx.beginPath();
        for (let k = 0; k < 6; k++){
            const a = k * Math.PI/3;
            if (k === 0) ctx.moveTo(Math.cos(a)*s, Math.sin(a)*s);
            else ctx.lineTo(Math.cos(a)*s, Math.sin(a)*s);
        }
        ctx.closePath();
        ctx.fillStyle = hexA(e.color, 0.14); ctx.fill();
        glowShape(e.color, 2.2);
        // inner core showing 3 children
        ctx.fillStyle = e.color;
        ctx.globalAlpha = 0.85;
        for (let k = 0; k < 3; k++){
            const a = k * Math.PI*2/3 + e.rot;
            ctx.beginPath(); ctx.arc(Math.cos(a)*6, Math.sin(a)*6, 2.4, 0, Math.PI*2); ctx.fill();
        }
        ctx.globalAlpha = 1;
    }
    ctx.restore();
    if (e.type === 'snake'){
        // body
        ctx.beginPath();
        ctx.moveTo(e.x, e.y);
        for (const s of e.segs) ctx.lineTo(s.x, s.y);
        ctx.strokeStyle = GREEN;
        ctx.globalAlpha = 0.25; ctx.lineWidth = 9; ctx.stroke();
        ctx.globalAlpha = 0.9; ctx.lineWidth = 2.5; ctx.stroke();
        ctx.globalAlpha = 1;
        for (let k = 0; k < e.segs.length; k += 2){
            const s = e.segs[k];
            ctx.fillStyle = hexA(GREEN, 0.75 - k * 0.04);
            ctx.beginPath(); ctx.arc(s.x, s.y, 4.5 - k * 0.18, 0, Math.PI*2); ctx.fill();
        }
        // head (only vulnerable part) — bright arrow
        ctx.save();
        ctx.translate(e.x, e.y);
        ctx.rotate(Math.atan2(e.vy, e.vx));
        ctx.beginPath();
        ctx.moveTo(13, 0); ctx.lineTo(-7, 8); ctx.lineTo(-3, 0); ctx.lineTo(-7, -8);
        ctx.closePath();
        ctx.fillStyle = hexA(GREEN, 0.3); ctx.fill();
        glowShape(GREEN, 2.4);
        ctx.fillStyle = WHITE;
        ctx.beginPath(); ctx.arc(4, 0, 2.2, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
}

function drawPlayer(){
    if (player.dead) return;
    const blink = player.invuln > 0 && Math.floor(player.invuln * 10) % 2 === 0;
    ctx.save();
    ctx.translate(player.x, player.y);
    if (player.invuln > 0){
        ctx.globalAlpha = 0.3 + Math.sin(performance.now()*0.014)*0.15;
        ctx.strokeStyle = GREEN;
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(0, 0, 20 + Math.sin(performance.now()*0.008)*2, 0, Math.PI*2); ctx.stroke();
        ctx.globalAlpha = 1;
    }
    if (blink) ctx.globalAlpha = 0.35;
    // turret aim line
    ctx.save();
    ctx.rotate(player.turret);
    const grad = ctx.createLinearGradient(0, 0, 34, 0);
    grad.addColorStop(0, 'rgba(255,210,62,0.9)');
    grad.addColorStop(1, 'rgba(255,210,62,0)');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(10, 0); ctx.lineTo(34, 0); ctx.stroke();
    ctx.fillStyle = GOLD;
    ctx.beginPath(); ctx.arc(13, 0, 2, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    // hull
    ctx.rotate(player.angle);
    ctx.beginPath();
    ctx.moveTo(14, 0);
    ctx.lineTo(-8, 9); ctx.lineTo(-4, 0); ctx.lineTo(-8, -9);
    ctx.closePath();
    const hull = ctx.createLinearGradient(-8, 0, 14, 0);
    hull.addColorStop(0, 'rgba(0,229,246,0.1)');
    hull.addColorStop(1, 'rgba(0,229,246,0.5)');
    ctx.fillStyle = hull; ctx.fill();
    glowShape(CYAN, 2);
    ctx.fillStyle = WHITE;
    ctx.beginPath(); ctx.arc(3, 0, 2.4, 0, Math.PI*2); ctx.fill();
    ctx.restore();
}

function drawHUDChips(){
    // multiplier meter (screen space)
    if (running && !gameOver){
        ctx.save();
        const mx = 12, my = 16, mw = 120;
        ctx.font = '700 15px Orbitron, sans-serif';
        ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        const hot = mult > 1;
        const col = hot ? GOLD : 'rgba(136,153,170,0.9)';
        ctx.fillStyle = hexA(hot ? GOLD : CYAN, 0.10);
        ctx.strokeStyle = hexA(hot ? GOLD : CYAN, 0.5);
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.roundRect(mx, my - 13, mw, 26, 13); ctx.fill(); ctx.stroke();
        ctx.fillStyle = col;
        ctx.fillText('×' + mult, mx + 12, my + 1);
        // chain time bar
        ctx.fillStyle = hexA(hot ? GOLD : CYAN, 0.28);
        const frac = Math.max(0, chainT / CHAIN_WINDOW);
        ctx.beginPath(); ctx.roundRect(mx + 48, my - 4, (mw - 60) * frac, 8, 4); ctx.fill();
        ctx.restore();
    }
    // wave banner
    if (bannerT > 0){
        const a = Math.min(1, bannerT / 0.5);
        const sc = 1 + Math.max(0, bannerT - 1.4) * 2.4;
        ctx.save();
        ctx.globalAlpha = a;
        ctx.translate(W/2, H * 0.3);
        ctx.scale(sc, sc);
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.font = '900 34px Orbitron, sans-serif';
        ctx.fillStyle = bannerColor;
        ctx.shadowColor = bannerColor; ctx.shadowBlur = 26;
        ctx.fillText(bannerText, 0, 0);
        ctx.shadowBlur = 0;
        ctx.restore();
    }
}

function draw(){
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    // void background
    const bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.8);
    bg.addColorStop(0, '#080a14');
    bg.addColorStop(1, '#05060a');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // camera transform (+ shake in screen space)
    ctx.save();
    if (shake > 0) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
    ctx.translate(W/2, H/2);
    ctx.scale(cam.zoom, cam.zoom);
    ctx.translate(-cam.x, -cam.y);

    drawGrid();
    drawArena();

    /* additive layer: particles, bullets, shockwaves */
    ctx.globalCompositeOperation = 'lighter';

    for (let i = 0; i < particles.length; i++){
        const p = particles[i];
        const a = Math.max(0, p.life / p.maxLife);
        ctx.globalAlpha = a;
        ctx.fillStyle = p.color;
        if (p.streak){
            ctx.strokeStyle = p.color;
            ctx.lineWidth = p.size * a + 0.4;
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(p.x - p.vx * 0.035, p.y - p.vy * 0.035);
            ctx.stroke();
        } else {
            const s = p.size * a + 0.4;
            ctx.fillRect(p.x - s, p.y - s, s*2, s*2);
        }
    }
    ctx.globalAlpha = 1;

    // bullets: tracer + hot core
    for (const b of bullets){
        const bl = Math.hypot(b.vx, b.vy) || 1;
        const tx = b.vx / bl, ty = b.vy / bl;
        ctx.strokeStyle = 'rgba(255,210,62,0.45)';
        ctx.lineWidth = 4.5;
        ctx.beginPath(); ctx.moveTo(b.x, b.y); ctx.lineTo(b.x - tx*16, b.y - ty*16); ctx.stroke();
        ctx.strokeStyle = WHITE;
        ctx.lineWidth = 1.8;
        ctx.beginPath(); ctx.moveTo(b.x, b.y); ctx.lineTo(b.x - tx*10, b.y - ty*10); ctx.stroke();
        ctx.fillStyle = WHITE;
        ctx.beginPath(); ctx.arc(b.x, b.y, 2.4, 0, Math.PI*2); ctx.fill();
    }

    // shockwaves
    for (const s of shockwaves){
        const fade = 1 - s.r / s.maxR;
        ctx.globalAlpha = Math.max(0, fade) * 0.9;
        ctx.strokeStyle = WHITE;
        ctx.lineWidth = 10 * fade + 2;
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.stroke();
        ctx.strokeStyle = CYAN;
        ctx.globalAlpha = Math.max(0, fade) * 0.5;
        ctx.lineWidth = 22 * fade + 4;
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r * 0.94, 0, Math.PI*2); ctx.stroke();
        ctx.strokeStyle = MAG;
        ctx.globalAlpha = Math.max(0, fade) * 0.35;
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r * 1.05, 0, Math.PI*2); ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // enemies + player also on additive for hot neon look
    for (const e of enemies) drawEnemy(e);
    if (player) drawPlayer();

    // score popups (world space, ease-out rise)
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    for (const p of popups){
        const k = 1 - p.life / p.maxLife;          // 0→1
        const ease = 1 - (1-k)*(1-k);              // easeOutQuad
        ctx.globalAlpha = Math.min(1, p.life * 3);
        ctx.font = '700 ' + Math.round(p.size * (0.8 + ease*0.3)) + 'px Rajdhani, sans-serif';
        ctx.fillStyle = p.color;
        ctx.fillText(p.text, p.x, p.y - ease * 34);
    }
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';

    ctx.restore(); // end camera

    /* screen-space effects */
    if (flash > 0){
        ctx.fillStyle = 'rgba(255,255,255,' + (flash * 0.55) + ')';
        ctx.fillRect(0, 0, W, H);
    }
    if (chroma > 0.02){
        // chromatic aberration: offset color fringes at edges
        ctx.globalCompositeOperation = 'lighter';
        const off = chroma * 7;
        ctx.globalAlpha = chroma * 0.35;
        ctx.strokeStyle = CYAN; ctx.lineWidth = 3;
        ctx.strokeRect(-off, -off, W + off*2, H + off*2);
        ctx.strokeStyle = MAG;
        ctx.strokeRect(off - 3, off - 3, W - off*2 + 6, H - off*2 + 6);
        const g1 = ctx.createRadialGradient(W/2 - off, H/2, H*0.3, W/2 - off, H/2, H*0.75);
        g1.addColorStop(0, 'rgba(0,0,0,0)'); g1.addColorStop(1, hexA(CYAN, chroma * 0.18));
        ctx.fillStyle = g1; ctx.fillRect(0, 0, W, H);
        const g2 = ctx.createRadialGradient(W/2 + off, H/2, H*0.3, W/2 + off, H/2, H*0.75);
        g2.addColorStop(0, 'rgba(0,0,0,0)'); g2.addColorStop(1, hexA(MAG, chroma * 0.18));
        ctx.fillStyle = g2; ctx.fillRect(0, 0, W, H);
        ctx.globalAlpha = 1;
        ctx.globalCompositeOperation = 'source-over';
    }

    drawHUDChips();
}

/* ===== loop ===== */
function loop(now){
    requestAnimationFrame(loop);
    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;
    if (shake > 0) shake = Math.max(0, shake - dt * 40);
    if (flash > 0) flash = Math.max(0, flash - dt * 3.2);
    if (chroma > 0) chroma = Math.max(0, chroma - dt * 1.6);
    if (bannerT > 0) bannerT -= dt;
    if (running && !gameOver) update(dt);
    else {
        // attract mode: idle ripples
        if (Math.random() < 0.012) gridImpulse(Math.random()*AW, Math.random()*AH, 260, 200);
        updateShockwaves(dt);
    }
    updateGrid(dt);
    updateParticles(dt);
    draw();
}

/* ===== input ===== */
function keyFlag(e, on){
    const k = (e.key || '').toLowerCase();
    if (k === 'arrowup' || k === 'w'){ keys.up = on; return true; }
    if (k === 'arrowdown' || k === 's'){ keys.down = on; return true; }
    if (k === 'arrowleft' || k === 'a'){ keys.left = on; return true; }
    if (k === 'arrowright' || k === 'd'){ keys.right = on; return true; }
    return false;
}
document.addEventListener('keydown', e => {
    if (keyFlag(e, true)){ e.preventDefault(); return; }
    if (e.key === ' '){
        e.preventDefault();
        if (!running && !gameOver && document.getElementById('overlay').classList.contains('hidden') === false){
            initAudio(); startGame();
        } else if (!e.repeat) fireBomb();
    }
});
document.addEventListener('keyup', e => { keyFlag(e, false); });
window.addEventListener('blur', () => { keys.up = keys.down = keys.left = keys.right = false; });
window.addEventListener('resize', resize);

/* tiny debug hooks (headless verification) */
window.__debug = {
    start: () => { initAudio(); startGame(); },
    bomb: () => { bombs = Math.max(bombs, 1); fireBomb(); },
    die: () => { lives = 1; if (player){ player.invuln = 0; killPlayer(); } },
    state: () => ({ running, gameOver, wave, score, lives, bombs, mult,
                    enemies: enemies.length, bullets: bullets.length, particles: particles.length })
};

/* init */
document.getElementById('ovBtn').onclick = () => { initAudio(); startGame(); };
resize();
player = newPlayer();
cam.x = AW/2; cam.y = AH/2;
lastTime = performance.now();
requestAnimationFrame(loop);
})();
</script>

(function(){
    window.ArcadeStick && ArcadeStick.create({
        mode: 'hold', axes: 8,
        buttons: [ { label: 'BOMB', key: ' ' } ]
    });
})();
</script>
