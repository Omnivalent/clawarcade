<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      viewport-fit=cover + user-scalable=no: the game canvas handles its own
      pinch-zoom, so we disable the browser's page zoom on mobile to avoid the
      two fighting each other.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Wildkin — Creature Sanctuary</title>
    <style>
      /* Full-viewport dark stage for the game canvas. */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #101c22;
        overflow: hidden;
        /* Stops mobile browsers from doing pull-to-refresh / rubber-banding
           while the player drags the map around. */
        overscroll-behavior: none;
        touch-action: none;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      }

      /* Phaser injects its <canvas> into this div. */
      #game-root {
        width: 100%;
        height: 100%;
      }

      /* Simple loading message shown until Phaser boots. */
      #loading {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #9fd8c8;
        font-size: 18px;
        letter-spacing: 2px;
        pointer-events: none;
      }

      /*
        "Rotate your phone" hint. Shown by src/main.ts when the screen is a
        small portrait phone. It's a soft suggestion, not a blocker — there is
        a "Continue anyway" button so nobody is ever locked out.
      */
      #rotate-hint {
        position: absolute;
        inset: 0;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: rgba(10, 18, 22, 0.94);
        color: #e8f6f0;
        text-align: center;
        z-index: 10;
        padding: 24px;
      }
      #rotate-hint .icon {
        font-size: 56px;
        animation: tilt 1.6s ease-in-out infinite;
      }
      @keyframes tilt {
        0%,
        100% {
          transform: rotate(0deg);
        }
        50% {
          transform: rotate(90deg);
        }
      }
      #rotate-hint button {
        margin-top: 10px;
        padding: 12px 26px;
        font-size: 16px;
        border: 1px solid #3f7a68;
        border-radius: 10px;
        background: #1d3a33;
        color: #cdeee2;
        cursor: pointer;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-BDbI3YIv.js"></script>
  </head>
  <body>
    <div id="game-root"></div>
    <div id="loading">GROWING THE SANCTUARY…</div>

    <!-- Rotate-device suggestion for small portrait screens (see main.ts). -->
    <div id="rotate-hint">
      <div class="icon">📱↻</div>
      <div style="font-size: 20px; font-weight: 600">
        Rotate your phone for the best experience
      </div>
      <div style="font-size: 14px; opacity: 0.75; max-width: 320px">
        Wildkin works in portrait too, but landscape gives you a much better
        view of your sanctuary.
      </div>
      <button id="rotate-dismiss">Continue anyway</button>
    </div>

  </body>
</html>
