<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Neon Minesweeper</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100dvh;overflow:hidden;background:#0a0a1a;color:#fff;font-family:'Segoe UI',sans-serif;touch-action:none;user-select:none}
#app{display:flex;flex-direction:column;height:100dvh}
#top{height:36px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:#0d0d2b;border-bottom:1px solid #1a1a3a;font-size:14px}
.title{color:#0ff;text-shadow:0 0 8px #0ff;animation:neonPulse 2s ease-in-out infinite}
@keyframes neonPulse{0%,100%{text-shadow:0 0 8px #0ff}50%{text-shadow:0 0 15px #0ff,0 0 25px #0ff}}
.info span{margin:0 6px;font-size:13px;transition:transform 0.2s}
.info span.pop{transform:scale(1.2)}
.mines{color:#f44;text-shadow:0 0 6px #f44}
.timer{color:#0f0;text-shadow:0 0 6px #0f0}
#grid-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:4px;position:relative;transition:transform 0.05s}
#grid-wrap.shake{animation:shake 0.4s ease-out}
@keyframes shake{0%,100%{transform:translate(0,0)}10%{transform:translate(-8px,4px)}20%{transform:translate(8px,-4px)}30%{transform:translate(-6px,6px)}40%{transform:translate(6px,-6px)}50%{transform:translate(-4px,4px)}60%{transform:translate(4px,-4px)}70%{transform:translate(-2px,2px)}80%{transform:translate(2px,-2px)}90%{transform:translate(-1px,1px)}}
#grid{display:inline-grid;gap:2px;border:2px solid #0ff;border-radius:4px;padding:3px;background:linear-gradient(160deg,#101030,#08081c);box-shadow:0 0 20px rgba(0,255,255,0.2),inset 0 0 15px rgba(0,255,255,0.05);transition:box-shadow 0.3s,border-color 0.3s;perspective:600px}
#grid.win{border-color:#0f0;box-shadow:0 0 35px rgba(0,255,0,0.55),0 0 70px rgba(0,255,0,0.25),inset 0 0 20px rgba(0,255,0,0.15);animation:winGlow 1.2s ease-in-out infinite}
@keyframes winGlow{0%,100%{box-shadow:0 0 25px rgba(0,255,0,0.4),inset 0 0 15px rgba(0,255,0,0.1)}50%{box-shadow:0 0 45px rgba(0,255,0,0.7),0 0 90px rgba(0,255,0,0.3),inset 0 0 25px rgba(0,255,0,0.2)}}
.cell{display:flex;align-items:center;justify-content:center;border-radius:3px;font-weight:bold;font-size:14px;cursor:pointer;transition:transform 0.1s ease,filter 0.15s ease}
/* raised 3D bevel — light top-left, dark bottom-right */
.cell.hidden{background:linear-gradient(145deg,#2e2e60 0%,#22224c 45%,#161638 100%);border:1px solid #2a2a5a;border-top-color:#5a5aa8;border-left-color:#46468c;border-bottom-color:#0c0c22;border-right-color:#101028;box-shadow:inset 1px 1px 1px rgba(255,255,255,0.14),inset -2px -2px 3px rgba(0,0,0,0.5),0 2px 3px rgba(0,0,0,0.55)}
.cell.hidden:hover{filter:brightness(1.25)}
.cell.hidden:active{background:linear-gradient(145deg,#191940,#242452);border-top-color:#101028;border-left-color:#141430;border-bottom-color:#46468c;border-right-color:#3a3a7c;box-shadow:inset 2px 2px 4px rgba(0,0,0,0.6);transform:scale(0.95)}
/* pressed / inset look for revealed cells */
.cell.revealed{background:linear-gradient(145deg,#08081a 0%,#0e0e26 60%,#12122e 100%);border:1px solid #1a1a3a;border-top-color:#060614;border-left-color:#0a0a1e;border-bottom-color:#26264e;border-right-color:#202044;box-shadow:inset 2px 2px 5px rgba(0,0,0,0.65),inset -1px -1px 1px rgba(255,255,255,0.05);animation:revealFlip 0.28s ease-out}
@keyframes revealFlip{0%{transform:rotateX(70deg) scale(0.85);opacity:0.2;filter:brightness(2)}60%{transform:rotateX(-12deg) scale(1.04);opacity:1}100%{transform:rotateX(0) scale(1);filter:brightness(1)}}
.cell.flagged{background:linear-gradient(145deg,#3a2040 0%,#241a3e 50%,#160f2e 100%);border:1px solid #f44;border-top-color:#ff8a8a;border-left-color:#f66;border-bottom-color:#611;border-right-color:#822;box-shadow:inset 1px 1px 1px rgba(255,180,180,0.2),inset -2px -2px 3px rgba(0,0,0,0.5),0 0 8px rgba(255,68,68,0.35),0 2px 3px rgba(0,0,0,0.5);animation:flagPlant 0.3s cubic-bezier(.34,1.56,.64,1)}
@keyframes flagPlant{0%{transform:translateY(-10px) scale(0.5) rotate(-18deg);opacity:0}55%{transform:translateY(2px) scale(1.15) rotate(6deg);opacity:1}80%{transform:translateY(-1px) scale(0.96) rotate(-2deg)}100%{transform:translateY(0) scale(1) rotate(0)}}
.cell.mine{background:radial-gradient(circle at 40% 35%,#ff5a5a 0%,#a00 35%,#400 80%);border:1px solid #f44;box-shadow:inset 1px 1px 2px rgba(255,150,150,0.4),inset -2px -2px 4px rgba(0,0,0,0.6),0 0 14px rgba(255,60,60,0.6);animation:explode 0.35s cubic-bezier(.34,1.56,.64,1)}
@keyframes explode{0%{transform:scale(0.2) rotate(-20deg);background:#fff;box-shadow:0 0 30px #fff}45%{transform:scale(1.35) rotate(8deg);background:#f44;box-shadow:0 0 25px rgba(255,80,80,0.9)}100%{transform:scale(1) rotate(0)}}
.n1{color:#0ff;text-shadow:0 0 6px #0ff,0 0 14px rgba(0,255,255,0.5)}
.n2{color:#0f0;text-shadow:0 0 6px #0f0,0 0 14px rgba(0,255,0,0.5)}
.n3{color:#f44;text-shadow:0 0 6px #f44,0 0 14px rgba(255,68,68,0.5)}
.n4{color:#66f;text-shadow:0 0 6px #44f,0 0 14px rgba(68,68,255,0.6)}
.n5{color:#f80;text-shadow:0 0 6px #f80,0 0 14px rgba(255,136,0,0.5)}
.n6{color:#0ff;text-shadow:0 0 6px #0ff,0 0 14px rgba(0,255,255,0.5)}
.n7{color:#f0f;text-shadow:0 0 6px #f0f,0 0 14px rgba(255,0,255,0.5)}
.n8{color:#fff;text-shadow:0 0 6px #fff,0 0 14px rgba(255,255,255,0.5)}
.confetti{position:absolute;top:-12px;pointer-events:none;border-radius:2px;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}80%{opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
#controls{height:80px;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;background:#0d0d2b;border-top:1px solid #1a1a3a;padding:4px}
#controls button{min-width:44px;min-height:44px;padding:6px 12px;border:1px solid #0ff;background:transparent;color:#0ff;border-radius:8px;font-size:13px;cursor:pointer;transition:all 0.2s}
#controls button:active,#controls button.active{background:#0ff3;transform:scale(0.95)}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a1aee;z-index:10;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
#overlay.hidden{display:none}
#overlay h2{color:#0ff;text-shadow:0 0 12px #0ff,0 0 30px #0ff;font-size:24px;margin-bottom:16px;animation:neonPulse 2s ease-in-out infinite}
#overlay .diffs{display:flex;gap:10px;margin-bottom:16px}
#overlay .diffs button{min-height:44px;padding:10px 18px;border:2px solid #0ff;background:transparent;color:#0ff;border-radius:8px;font-size:14px;cursor:pointer;transition:all 0.2s}
#overlay .diffs button:active{background:#0ff2;transform:scale(0.95)}
#overlay p{color:#aaa;font-size:13px;text-align:center;padding:0 20px}
#particles{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.particle{position:absolute;border-radius:50%;pointer-events:none;animation:particleFade 0.8s ease-out forwards}
@keyframes particleFade{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(0)}}
</style>
</head>
<body>
<div id="app">
<div id="top">
<span class="title">💣 MINESWEEPER</span>
<div class="info"><span class="mines" id="mc">💣 10</span><span class="timer" id="tm">⏱ 0s</span></div>
</div>
<div id="grid-wrap">
    <div id="grid"></div>
    <div id="particles"></div>
</div>
<div id="controls">
<button id="btnFlag">🚩 Flag</button>
<button id="btnNew">🔄 New</button>
<button id="btnMute">🔊</button>
</div>
</div>
<div id="overlay">
<h2>💣 NEON MINESWEEPER</h2>
<p style="margin-bottom:12px">Tap to reveal · Long-press or Flag mode to flag</p>
<div class="diffs">
<button onclick="startGame(8,8,10)">Easy</button>
<button onclick="startGame(12,12,30)">Medium</button>
<button onclick="startGame(16,16,60)">Hard</button>
</div>
<p id="endMsg"></p>
</div>
    <script src="../js/human-check.js"></script>
<script>
// === WEB AUDIO API SOUND SYSTEM ===
let audioCtx = null;
let soundEnabled = true;
let audioInitialized = false;

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    audioInitialized = true;
}

// Initialize audio on FIRST user interaction
function initAudioOnce() {
    if (!audioInitialized) initAudio();
}
document.addEventListener('click', initAudioOnce, { once: true });
document.addEventListener('touchstart', initAudioOnce, { once: true });

function playTone(freq, type, duration, vol = 0.2) {
    if (!soundEnabled || !audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function playReveal() { playTone(300, 'sine', 0.05, 0.1); }
function playFlag() { playTone(500, 'sine', 0.08, 0.15); }
function playUnflag() { playTone(350, 'sine', 0.06, 0.1); }
function playNumber(n) { playTone(300 + n * 50, 'sine', 0.08, 0.15); }
function playExplosion() {
    playTone(100, 'sawtooth', 0.3, 0.3);
    setTimeout(() => playTone(60, 'sawtooth', 0.4, 0.25), 100);
    setTimeout(() => playTone(40, 'sawtooth', 0.5, 0.2), 200);
}
function playWin() {
    [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, 'sine', 0.2, 0.25), i * 100));
}
function playClick() { playTone(600, 'sine', 0.05, 0.1); }

document.getElementById('btnMute').onclick = () => {
    initAudio();
    soundEnabled = !soundEnabled;
    document.getElementById('btnMute').textContent = soundEnabled ? '🔊' : '🔇';
    playClick();
};

const gridEl=document.getElementById('grid'),overlay=document.getElementById('overlay');
const mcEl=document.getElementById('mc'),tmEl=document.getElementById('tm'),endMsg=document.getElementById('endMsg');
const btnFlag=document.getElementById('btnFlag');
const particlesEl=document.getElementById('particles');
const gridWrap=document.getElementById('grid-wrap');
let rows,cols,mines,board,revealed,flagged,gameOver,firstClick,timer,seconds,flagMode=false;
let borderPhase=0;
let animFrame=null;

btnFlag.onclick=()=>{
    initAudio();playClick();
    flagMode=!flagMode;
    btnFlag.classList.toggle('active',flagMode);
};
document.getElementById('btnNew').onclick=()=>{
    playClick();
    clearInterval(timer);
    if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
    overlay.classList.remove('hidden');
    endMsg.textContent='';
};

function addParticle(x,y,color){
    const el=document.createElement('div');
    el.className='particle';
    el.style.left=(x+Math.random()*20-10)+'px';
    el.style.top=(y+Math.random()*20-10)+'px';
    el.style.width=el.style.height=(4+Math.random()*6)+'px';
    el.style.background=color;
    el.style.boxShadow='0 0 6px '+color;
    particlesEl.appendChild(el);
    setTimeout(()=>el.remove(),800);
}

function addExplosionParticles(x,y){
    for(let i=0;i<20;i++){
        const el=document.createElement('div');
        el.className='particle';
        const angle=Math.random()*Math.PI*2;
        const dist=20+Math.random()*40;
        el.style.left=(x+Math.cos(angle)*dist)+'px';
        el.style.top=(y+Math.sin(angle)*dist)+'px';
        el.style.width=el.style.height=(4+Math.random()*8)+'px';
        el.style.background=Math.random()>0.5?'#f44':'#ff0';
        el.style.boxShadow='0 0 8px #f44';
        particlesEl.appendChild(el);
        setTimeout(()=>el.remove(),800);
    }
}

function triggerShake(){
    gridWrap.classList.remove('shake');
    void gridWrap.offsetWidth;
    gridWrap.classList.add('shake');
}

function popMineCount(){
    mcEl.classList.add('pop');
    setTimeout(()=>mcEl.classList.remove('pop'),200);
}

window.startGame=function(r,c,m){
    initAudio();playClick();
    rows=r;cols=c;mines=m;
    board=[];revealed=[];flagged=[];gameOver=false;firstClick=true;seconds=0;
    clearInterval(timer);
    if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
    tmEl.textContent='⏱ 0s';
    for(let i=0;i<rows;i++){board[i]=[];revealed[i]=[];flagged[i]=[];for(let j=0;j<cols;j++){board[i][j]=0;revealed[i][j]=false;flagged[i][j]=false;}}
    overlay.classList.add('hidden');
    particlesEl.innerHTML='';
    gridEl.classList.remove('win');
    updateMineCount();
    renderGrid();
    animFrame=requestAnimationFrame(animLoop);
};

function animLoop(){
    borderPhase+=0.03;
    const glow=12+Math.sin(borderPhase)*8;
    gridEl.style.boxShadow=`0 0 ${glow}px rgba(0,255,255,${0.2+Math.sin(borderPhase)*0.1}),inset 0 0 ${glow}px rgba(0,255,255,0.05)`;
    if(!gameOver)animFrame=requestAnimationFrame(animLoop);
}

function placeMines(sr,sc){
    let placed=0;
    while(placed<mines){
        const r=Math.floor(Math.random()*rows),c=Math.floor(Math.random()*cols);
        if(board[r][c]===-1)continue;
        if(Math.abs(r-sr)<=1&&Math.abs(c-sc)<=1)continue;
        board[r][c]=-1;placed++;
        for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
            const nr=r+dr,nc=c+dc;
            if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&board[nr][nc]!==-1)board[nr][nc]++;
        }
    }
}

function renderGrid(){
    const wrap=document.getElementById('grid-wrap');
    const maxW=wrap.clientWidth-12,maxH=wrap.clientHeight-12;
    const cellSize=Math.min(Math.floor(maxW/cols),Math.floor(maxH/rows),44);
    gridEl.style.gridTemplateColumns=`repeat(${cols},${cellSize}px)`;
    gridEl.style.gridTemplateRows=`repeat(${rows},${cellSize}px)`;
    gridEl.innerHTML='';
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
        const cell=document.createElement('div');
        cell.className='cell hidden';
        cell.dataset.r=r;cell.dataset.c=c;
        cell.style.fontSize=Math.max(10,cellSize*0.45)+'px';
        let longTimer;
        cell.addEventListener('touchstart',e=>{e.preventDefault();longTimer=setTimeout(()=>{toggleFlag(r,c);longTimer=null;},400);},{passive:false});
        cell.addEventListener('touchend',e=>{e.preventDefault();if(longTimer){clearTimeout(longTimer);if(flagMode)toggleFlag(r,c);else reveal(r,c);}},{passive:false});
        cell.addEventListener('touchmove',()=>{clearTimeout(longTimer);longTimer=null;});
        cell.addEventListener('click',e=>{if(flagMode)toggleFlag(r,c);else reveal(r,c);});
        cell.addEventListener('contextmenu',e=>{e.preventDefault();toggleFlag(r,c);});
        gridEl.appendChild(cell);
    }
}

function getCell(r,c){return gridEl.children[r*cols+c];}

function updateMineCount(){
    const f=flagged.flat().filter(Boolean).length;
    mcEl.textContent='💣 '+(mines-f);
}

function toggleFlag(r,c){
    if(gameOver||revealed[r][c])return;
    const wasFlag=flagged[r][c];
    flagged[r][c]=!flagged[r][c];
    if(flagged[r][c])playFlag();else playUnflag();
    const cell=getCell(r,c);
    cell.classList.toggle('flagged',flagged[r][c]);
    cell.classList.toggle('hidden',!flagged[r][c]);
    cell.textContent=flagged[r][c]?'🚩':'';
    updateMineCount();popMineCount();
    
    const rect=cell.getBoundingClientRect();
    const wrapRect=gridWrap.getBoundingClientRect();
    if(flagged[r][c]){
        addParticle(rect.left-wrapRect.left+rect.width/2,rect.top-wrapRect.top+rect.height/2,'#f44');
    }
}

function reveal(r,c,depth){
    depth=depth||0;
    if(gameOver||flagged[r][c]||revealed[r][c])return;
    if(firstClick){
        firstClick=false;
        placeMines(r,c);
        timer=setInterval(()=>{seconds++;tmEl.textContent='⏱ '+seconds+'s';},1000);
    }
    revealed[r][c]=true;
    const cell=getCell(r,c);
    const val=board[r][c];

    if(val===-1){
        cell.classList.remove('hidden','flagged');
        cell.classList.add('revealed','mine');cell.textContent='💥';
        gameOver=true;clearInterval(timer);
        playExplosion();
        triggerShake();
        const rect=cell.getBoundingClientRect();
        const wrapRect=gridWrap.getBoundingClientRect();
        addExplosionParticles(rect.left-wrapRect.left+rect.width/2,rect.top-wrapRect.top+rect.height/2);
        const lastPop=revealAll();
        setTimeout(()=>{overlay.classList.remove('hidden');endMsg.textContent='💥 Game Over! Time: '+seconds+'s';},Math.max(500,lastPop+400));
        return;
    }

    // visual reveal ripples outward: DOM update staggered by flood depth
    const applyReveal=()=>{
        cell.classList.remove('hidden','flagged');
        cell.classList.add('revealed');
        if(val>0){
            cell.textContent=val;cell.classList.add('n'+val);
            if(depth===0){
                playNumber(val);
                const rect=cell.getBoundingClientRect();
                const wrapRect=gridWrap.getBoundingClientRect();
                for(let i=0;i<val;i++){
                    addParticle(rect.left-wrapRect.left+rect.width/2,rect.top-wrapRect.top+rect.height/2,'#0ff');
                }
            }else if(depth%2===0){playNumber(val);}
        }else{playReveal();}
    };
    if(depth>0)setTimeout(applyReveal,Math.min(depth*18,650));else applyReveal();

    if(val===0){
        for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
            const nr=r+dr,nc=c+dc;
            if(nr>=0&&nr<rows&&nc>=0&&nc<cols)reveal(nr,nc,depth+1);
        }
    }
    checkWin();
}

function checkWin(){
    let unrevealed=0;
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(!revealed[r][c])unrevealed++;
    if(unrevealed===mines){
        gameOver=true;clearInterval(timer);
        playWin();
        winCelebration();
        setTimeout(()=>{overlay.classList.remove('hidden');endMsg.textContent='🎉 You Win! Time: '+seconds+'s';},1400);
    }
}

function winCelebration(){
    gridEl.classList.add('win');
    const wrapRect=gridWrap.getBoundingClientRect();
    const colors=['#0ff','#0f0','#ff0','#f0f','#f80','#fff'];
    for(let i=0;i<50;i++){
        const el=document.createElement('div');
        el.className='confetti';
        const color=colors[Math.floor(Math.random()*colors.length)];
        el.style.left=(Math.random()*wrapRect.width)+'px';
        el.style.width=(4+Math.random()*5)+'px';
        el.style.height=(6+Math.random()*7)+'px';
        el.style.background=color;
        el.style.boxShadow='0 0 6px '+color;
        el.style.animationDuration=(1.2+Math.random()*1.4)+'s';
        el.style.animationDelay=(Math.random()*0.5)+'s';
        particlesEl.appendChild(el);
        setTimeout(()=>el.remove(),3500);
    }
}

function revealAll(){
    // staggered mine pops rippling across the board
    let i=0,last=0;
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
        if(board[r][c]===-1&&!revealed[r][c]){
            const cell=getCell(r,c);
            const idx=i;
            const delay=150+idx*45;
            last=delay;
            setTimeout(()=>{
                cell.classList.remove('hidden');cell.classList.add('mine');cell.textContent='💣';
                if(idx%3===0)playTone(80+Math.random()*60,'sawtooth',0.15,0.08);
            },Math.min(delay,1800));
            i++;
        }
    }
    return Math.min(last,1800);
}
</script>
</body>
</html>
