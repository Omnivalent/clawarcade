<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Claw Jump — ClawArcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100dvh;overflow:hidden;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
        body{font-family:'Orbitron',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#05060a;color:#e8e6e3;display:flex;flex-direction:column;height:100dvh}
        body::after{
            content:'';position:fixed;inset:0;
            background:repeating-linear-gradient(0deg,rgba(0,0,0,0.08) 0px,rgba(0,0,0,0.08) 1px,transparent 1px,transparent 3px);
            pointer-events:none;z-index:1000;opacity:0.4;
        }
        .top-bar{display:flex;justify-content:space-between;align-items:center;padding:0 10px;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);flex-shrink:0;height:44px;min-height:44px;border-bottom:2px solid rgba(0,229,246,0.4);box-shadow:0 2px 20px rgba(0,229,246,0.2);gap:8px}
        .back-btn{color:#ffd23e;text-decoration:none;font-size:.7rem;letter-spacing:1px;border:1px solid rgba(255,210,62,0.4);padding:4px 8px;border-radius:14px;white-space:nowrap;text-shadow:0 0 8px rgba(255,210,62,0.5)}
        .back-btn:active{background:rgba(255,210,62,0.2)}
        .top-bar h1{font-size:.9rem;color:#00e5f6;white-space:nowrap;text-shadow:0 0 10px rgba(0,229,246,0.8),0 0 20px rgba(0,229,246,0.4);letter-spacing:2px;animation:neonPulse 2s ease-in-out infinite}
        @keyframes neonPulse{0%,100%{text-shadow:0 0 10px rgba(0,229,246,0.8),0 0 20px rgba(0,229,246,0.4)}50%{text-shadow:0 0 20px rgba(0,229,246,1),0 0 40px rgba(0,229,246,0.6)}}
        .top-stats{display:flex;gap:10px;font-size:.72rem;align-items:center;font-family:'Rajdhani',sans-serif;font-weight:600}
        .top-stats .lbl{color:#8899aa}
        .stat-value{color:#22e59a;font-weight:bold;text-shadow:0 0 8px rgba(34,229,154,0.6);font-size:.9rem}
        .top-btn{background:rgba(0,229,246,0.1);border:2px solid rgba(0,229,246,0.4);color:#00e5f6;padding:4px 9px;border-radius:20px;font-size:.7rem;cursor:pointer;min-height:26px;font-family:'Orbitron',sans-serif;transition:all .2s}
        .top-btn:active{background:rgba(0,229,246,0.3);transform:scale(0.95)}
        .game-area{flex:1;position:relative;min-height:0;overflow:hidden}
        canvas#game{position:absolute;inset:0;display:block;cursor:pointer}
        .hidden{display:none!important}
        .overlay{position:fixed;inset:0;background:rgba(4,4,14,0.9);display:flex;align-items:center;justify-content:center;z-index:20;animation:fadeIn .3s ease;backdrop-filter:blur(8px)}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .overlay .inner{text-align:center;padding:30px;max-width:92vw}
        .overlay h2{color:#ff2a6d;margin-bottom:14px;text-shadow:0 0 18px rgba(255,42,109,0.9),0 0 40px rgba(255,42,109,0.4);font-size:1.9rem;letter-spacing:4px}
        .overlay p{color:#aab;margin-bottom:12px;font-size:.95rem;font-family:'Rajdhani',sans-serif;font-weight:600;line-height:1.7}
        .overlay .score-line{color:#22e59a;font-size:1.25rem;text-shadow:0 0 12px rgba(34,229,154,0.7)}
        .overlay .btn{display:block;margin:12px auto 0;background:linear-gradient(135deg,#00e5f6 0%,#0090b8 100%);color:#05060a;border:none;padding:14px 38px;font-size:1rem;font-weight:700;border-radius:26px;cursor:pointer;min-height:50px;box-shadow:0 0 22px rgba(0,229,246,0.5);transition:all .2s;font-family:'Orbitron',sans-serif;letter-spacing:1px}
        .overlay .btn:active{transform:scale(0.95)}
        .newhigh{color:#ffd23e!important;text-shadow:0 0 14px rgba(255,210,62,0.8)!important}
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="../index.html" class="back-btn">← MENU</a>
        <h1>CLAW JUMP</h1>
        <div class="top-stats">
            <span><span class="lbl">BEST </span><span class="stat-value" id="best">0</span></span>
            <button class="top-btn" id="muteBtn">🔊</button>
        </div>
    </div>
    <div class="game-area" id="gameArea">
        <canvas id="game"></canvas>
    </div>
    <div class="overlay hidden" id="overlay">
        <div class="inner">
            <h2 id="ovTitle">GAME OVER</h2>
            <p id="ovMsg"></p>
            <button class="btn" id="ovBtn">JUMP AGAIN</button>
        </div>
    </div>
    <script src="../js/human-check.js"></script>
    <script src="../js/joystick.js"></script>
<script>
(function(){
'use strict';
const dpr = window.devicePixelRatio || 1;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const gameArea = document.getElementById('gameArea');

const CYAN = '#00e5f6', MAG = '#ff2a6d', GOLD = '#ffd23e', GRN = '#22e59a';

/* ===== audio ===== */
let audioCtx = null, soundEnabled = true, audioInitialized = false;
function initAudio(){
    if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){ return; } }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    audioInitialized = true;
}
function initAudioOnce(){ if (!audioInitialized) initAudio(); }
document.addEventListener('click', initAudioOnce, {once:true});
document.addEventListener('touchstart', initAudioOnce, {once:true});
document.addEventListener('keydown', initAudioOnce, {once:true});
function playTone(freq, type, dur, vol=0.15, slideTo){
    if (!soundEnabled || !audioCtx) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1, slideTo), audioCtx.currentTime + dur);
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
}
function playNoise(dur, vol=0.25){
    if (!soundEnabled || !audioCtx) return;
    const len = Math.floor(audioCtx.sampleRate * dur);
    const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * (1 - i/len);
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    src.connect(g); g.connect(audioCtx.destination); src.start();
}
const sfxBoing = alt => {
    const p = 200 + Math.min(220, alt * 0.04) + Math.random()*30;
    playTone(p * 0.65, 'triangle', 0.16, 0.14, p * 1.7);
};
const sfxSpring = () => { playTone(180, 'sawtooth', 0.28, 0.14, 980); playTone(360, 'sine', 0.24, 0.1, 1400); };
const sfxPickup = () => [660, 880, 1320, 1760].forEach((f,i)=>setTimeout(()=>playTone(f,'square',0.1,0.11),i*70));
const sfxBop = () => { playNoise(0.1, 0.18); playTone(220, 'square', 0.12, 0.15, 90); };
const sfxFall = () => { playNoise(0.5, 0.28); playTone(420, 'sawtooth', 0.7, 0.16, 55); };
const sfxMilestone = () => [880, 1175].forEach((f,i)=>setTimeout(()=>playTone(f,'square',0.11,0.11),i*90));
document.getElementById('muteBtn').onclick = e => {
    e.stopPropagation();
    initAudio(); soundEnabled = !soundEnabled;
    document.getElementById('muteBtn').textContent = soundEnabled ? '🔊' : '🔇';
};

/* ===== state ===== */
let W = 0, H = 0, S = 1;
let state = 'ready'; // ready | play | dead
let player, platforms, drones, pickups, particles, stars, cityFar, cityNear;
let camY = 0, camY0 = 0, genY = 0;
let meters = 0, best = 0, milestone = 1000;
let msgText = '', msgT = 0, flashT = 0, shake = 0;
let lastTime = 0;
const keys = { left: false, right: false };
try { best = parseInt(localStorage.getItem('clawJumpHigh') || '0') || 0; } catch(e){}
document.getElementById('best').textContent = best;

const GRAV = () => 1500 * S;
const JUMP = () => 620 * S;
const SPRING_V = () => 1060 * S;
const MAXVX = () => 440 * S;
const diff = () => Math.min(1, meters / 4000);

function resize(){
    W = gameArea.clientWidth; H = gameArea.clientHeight;
    S = H / 640;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    makeBackdrop();
}
function makeBackdrop(){
    stars = [];
    for (let i = 0; i < 90; i++) stars.push({
        x: Math.random()*W, y: Math.random()*H,
        depth: 0.04 + Math.random()*0.2, size: 0.6 + Math.random()*1.7,
        tw: Math.random()*Math.PI*2
    });
    cityFar = genSkyline(0.30, '#0d1030');
    cityNear = genSkyline(0.46, '#12163e');
}
function genSkyline(hFrac, color){
    const arr = []; let x = -20;
    while (x < W + 60){
        const bw = 26 + Math.random()*54;
        const bh = H * hFrac * (0.35 + Math.random()*0.65);
        const windows = [];
        const cols = Math.max(1, Math.floor(bw / 13)), rows = Math.max(2, Math.floor(bh / 24));
        for (let c = 0; c < cols; c++) for (let r = 0; r < rows; r++)
            if (Math.random() < 0.26) windows.push([c, r, Math.random() < 0.6 ? CYAN : MAG]);
        arr.push({ x, w: bw, h: bh, color, windows, cols, rows });
        x += bw + 4 + Math.random()*18;
    }
    return arr;
}

function reset(){
    player = { x: W/2, y: 0, vx: 0, vy: 0, r: 14*S, sq: 0, jetT: 0, dir: 1 };
    platforms = []; drones = []; pickups = []; particles = [];
    camY0 = -H * 0.72;
    camY = camY0;
    meters = 0; milestone = 1000;
    msgText = ''; msgT = 0; flashT = 0; shake = 0;
    // base platform under player
    platforms.push({ x: W/2 - 55*S, y: 30*S, w: 110*S, h: 12*S, type: 'solid', vx: 0, crumbleT: -1, springT: 0, fallV: 0 });
    genY = 30*S;
    genUntil();
    state = 'ready';
    document.getElementById('overlay').classList.add('hidden');
}

function genUntil(){
    while (genY > camY - 320*S){
        const d = diff();
        const gap = (56 + Math.random()*28 + d*24) * S;
        genY -= gap;
        spawnPlatform(genY, gap);
    }
}
function spawnPlatform(y, gap){
    const d = diff();
    const w = (88 - d*24 + Math.random()*22) * S;
    const x = Math.random() * (W - w);
    const r = Math.random();
    let type = 'solid';
    if (r < 0.12 + d*0.13) type = 'moving';
    else if (r < 0.24 + d*0.24) type = 'crumble';
    else if (r < 0.32 + d*0.24) type = 'spring';
    platforms.push({
        x, y, w, h: 12*S, type,
        vx: type === 'moving' ? (70 + Math.random()*70 + d*90) * S * (Math.random() < 0.5 ? -1 : 1) : 0,
        crumbleT: -1, springT: 0, fallV: 0
    });
    // jetpack pickup
    if (meters > 250 && Math.random() < 0.022){
        pickups.push({ x: x + w/2, y: y - 26*S, taken: false, bob: Math.random()*6 });
    }
    // drones after 1000m
    if (meters > 1000 && Math.random() < 0.05 + d*0.07){
        drones.push({
            x: Math.random()*W, y: y - gap*0.55, y0: y - gap*0.55,
            vx: (70 + Math.random()*90 + d*60) * S * (Math.random() < 0.5 ? -1 : 1),
            r: 16*S, ph: Math.random()*6, dead: false, deadV: 0
        });
    }
}

function bounce(v, alt){
    player.vy = -v;
    player.sq = 1;
    for (let i = 0; i < 7; i++){
        particles.push({
            x: player.x + (Math.random()-0.5)*22*S, y: player.y + player.r,
            vx: (Math.random()-0.5)*140, vy: 40 + Math.random()*90,
            life: 0.25 + Math.random()*0.25, maxLife: 0.5,
            color: Math.random() < 0.5 ? CYAN : '#8be9ff', size: 1.4 + Math.random()*2.2
        });
    }
}

function die(){
    if (state !== 'play') return;
    state = 'dead';
    flashT = 1; shake = 14;
    sfxFall();
    if (meters > best){ best = meters; try { localStorage.setItem('clawJumpHigh', String(best)); } catch(e){} }
    document.getElementById('best').textContent = best;
    setTimeout(showGameOver, 900);
}
function showGameOver(){
    if (state !== 'dead') return;
    const isBest = meters >= best && meters > 0;
    document.getElementById('ovMsg').innerHTML =
        '<span class="score-line' + (isBest ? ' newhigh' : '') + '">ALTITUDE: ' + meters + 'm' + (isBest ? ' — NEW BEST!' : '') + '</span><br>BEST: ' + best + 'm';
    document.getElementById('ovBtn').onclick = e => { e.stopPropagation(); initAudio(); reset(); };
    document.getElementById('overlay').classList.remove('hidden');
}

/* ===== update ===== */
function update(dt){
    if (state === 'dead' && player.y - camY > H + 400) return;

    // steering
    const ax = (keys.right ? 1 : 0) - (keys.left ? 1 : 0);
    if (ax !== 0){
        player.vx += ax * 2500 * S * dt;
        player.dir = ax;
    } else {
        player.vx -= player.vx * Math.min(1, dt * 5.5);
    }
    player.vx = Math.max(-MAXVX(), Math.min(MAXVX(), player.vx));
    player.x += player.vx * dt;
    // screen wrap
    if (player.x < -player.r) player.x += W + player.r*2;
    if (player.x > W + player.r) player.x -= W + player.r*2;

    // vertical physics
    if (player.jetT > 0){
        player.jetT -= dt;
        player.vy += (-760*S - player.vy) * Math.min(1, dt * 5);
        for (let i = 0; i < 3; i++) particles.push({
            x: player.x + (Math.random()-0.5)*10*S, y: player.y + player.r,
            vx: (Math.random()-0.5)*90, vy: 220 + Math.random()*160,
            life: 0.3 + Math.random()*0.25, maxLife: 0.55,
            color: Math.random() < 0.55 ? GOLD : MAG, size: 2 + Math.random()*3
        });
    } else {
        player.vy += GRAV() * dt;
    }
    const prevY = player.y;
    player.y += player.vy * dt;
    if (player.sq > 0) player.sq -= dt * 4;

    // speed trail
    if (player.vy < -500*S && Math.random() < 0.6) particles.push({
        x: player.x + (Math.random()-0.5)*16*S, y: player.y + player.r*0.6,
        vx: (Math.random()-0.5)*40, vy: 120 + Math.random()*80,
        life: 0.25 + Math.random()*0.2, maxLife: 0.45,
        color: player.jetT > 0 ? GOLD : CYAN, size: 1.2 + Math.random()*2
    });

    // platforms
    for (let i = platforms.length - 1; i >= 0; i--){
        const p = platforms[i];
        if (p.type === 'moving'){
            p.x += p.vx * dt;
            if (p.x < 0){ p.x = 0; p.vx = Math.abs(p.vx); }
            if (p.x + p.w > W){ p.x = W - p.w; p.vx = -Math.abs(p.vx); }
        }
        if (p.springT > 0) p.springT -= dt;
        if (p.crumbleT >= 0){
            p.crumbleT += dt;
            if (p.crumbleT > 0.28){ p.fallV += GRAV() * dt; p.y += p.fallV * dt; }
        }
        // landing (only falling, not jetting, not fully crumbled)
        if (state !== 'dead' && player.vy > 0 && player.jetT <= 0 && p.crumbleT < 0.28 &&
            player.x + player.r*0.7 > p.x && player.x - player.r*0.7 < p.x + p.w &&
            prevY + player.r <= p.y + 2 && player.y + player.r >= p.y){
            player.y = p.y - player.r;
            const alt = -player.y / S;
            if (p.type === 'spring'){
                bounce(SPRING_V(), alt);
                p.springT = 0.3;
                sfxSpring();
                msgText = 'BOING!'; msgT = 0.7;
            } else {
                bounce(JUMP(), alt);
                sfxBoing(alt);
            }
            if (p.type === 'crumble' && p.crumbleT < 0) p.crumbleT = 0;
        }
        if (p.y - camY > H + 120) platforms.splice(i, 1);
    }

    // pickups
    for (let i = pickups.length - 1; i >= 0; i--){
        const pk = pickups[i];
        pk.bob += dt * 3;
        const dx = player.x - pk.x, dy = player.y - (pk.y + Math.sin(pk.bob)*5*S);
        if (!pk.taken && state === 'play' && dx*dx + dy*dy < (player.r + 13*S)*(player.r + 13*S)){
            pk.taken = true;
            player.jetT = 5;
            sfxPickup();
            msgText = 'JETPACK!'; msgT = 1.2;
            for (let j = 0; j < 14; j++){
                const a = Math.random()*Math.PI*2, s = 60 + Math.random()*180;
                particles.push({ x: pk.x, y: pk.y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
                    life: 0.4 + Math.random()*0.4, maxLife: 0.8, color: GOLD, size: 2 + Math.random()*2.5 });
            }
        }
        if (pk.taken || pk.y - camY > H + 80) pickups.splice(i, 1);
    }

    // drones
    for (let i = drones.length - 1; i >= 0; i--){
        const d = drones[i];
        if (d.dead){
            d.deadV += GRAV() * dt;
            d.y += d.deadV * dt;
            if (d.y - camY > H + 80) drones.splice(i, 1);
            continue;
        }
        d.ph += dt * 3;
        d.x += d.vx * dt;
        d.y = d.y0 + Math.sin(d.ph) * 8 * S;
        if (d.x < d.r){ d.x = d.r; d.vx = Math.abs(d.vx); }
        if (d.x > W - d.r){ d.x = W - d.r; d.vx = -Math.abs(d.vx); }
        if (state === 'play'){
            const dx = player.x - d.x, dy = player.y - d.y;
            const rr = player.r + d.r;
            if (dx*dx + dy*dy < rr*rr){
                if (player.vy > 0 && player.y < d.y - 4*S){
                    d.dead = true; d.deadV = 120;
                    bounce(JUMP(), -player.y/S);
                    sfxBop();
                    msgText = 'BOP!'; msgT = 0.7;
                    for (let j = 0; j < 12; j++){
                        const a = Math.random()*Math.PI*2, s = 80 + Math.random()*200;
                        particles.push({ x: d.x, y: d.y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
                            life: 0.35 + Math.random()*0.4, maxLife: 0.75, color: Math.random()<0.5?MAG:'#ffffff', size: 1.8 + Math.random()*2.6 });
                    }
                } else if (player.jetT <= 0){
                    die();
                }
            }
        }
        if (d.y0 - camY > H + 120) drones.splice(i, 1);
    }

    // camera follows upward only
    const target = player.y - H * 0.38;
    if (target < camY) camY += (target - camY) * Math.min(1, dt * 7);
    genUntil();

    // score (only once playing)
    const m = Math.floor(Math.max(0, -player.y) / (4 * S));
    if (state !== 'ready' && m > meters) meters = m;
    if (meters >= milestone){
        msgText = milestone + 'm!'; msgT = 1.6;
        sfxMilestone();
        milestone += 1000;
    }

    // fall off bottom
    if (state === 'play' && player.y - camY > H + 60) die();

    // particles
    for (let i = particles.length - 1; i >= 0; i--){
        const p = particles[i];
        p.x += p.vx * dt; p.y += p.vy * dt;
        p.vy += 250 * dt;
        p.life -= dt;
        if (p.life <= 0) particles.splice(i, 1);
    }
    if (msgT > 0) msgT -= dt;
    if (flashT > 0) flashT -= dt * 2.4;
    if (shake > 0) shake = Math.max(0, shake - dt * 30);
}

/* ===== draw ===== */
function lerp(a, b, t){ return a + (b - a) * t; }
function draw(){
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    // sky darkens with altitude into space
    const t = Math.min(1, meters / 3000);
    const top = [lerp(8, 2, t), lerp(9, 2, t), lerp(26, 8, t)];
    const bot = [lerp(26, 5, t), lerp(16, 6, t), lerp(64, 14, t)];
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, 'rgb(' + top.map(Math.round).join(',') + ')');
    g.addColorStop(1, 'rgb(' + bot.map(Math.round).join(',') + ')');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    if (shake > 0) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);

    // stars (parallax, brighter in space)
    const now = performance.now() * 0.002;
    for (const s of stars){
        const sy = (((s.y - camY * s.depth) % H) + H) % H;
        const tw = 0.35 + 0.35 * Math.sin(now * 2 + s.tw);
        ctx.fillStyle = 'rgba(190,235,255,' + (tw * (0.35 + t * 0.65)) + ')';
        ctx.fillRect(s.x, sy, s.size, s.size);
    }
    // nebula glow high up
    if (t > 0.4){
        const ng = ctx.createRadialGradient(W*0.72, H*0.24, 0, W*0.72, H*0.24, W*0.5);
        ng.addColorStop(0, 'rgba(255,42,109,' + (0.10*(t-0.4)/0.6) + ')');
        ng.addColorStop(0.6, 'rgba(0,229,246,' + (0.05*(t-0.4)/0.6) + ')');
        ng.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = ng;
        ctx.fillRect(0, 0, W, H);
    }

    // city skylines scroll away below as you climb
    const rise = (camY0 - camY);
    drawSkyline(cityFar, rise * 0.10, 0.55);
    drawSkyline(cityNear, rise * 0.18, 0.9);

    drawPlatforms();
    drawPickups();
    drawDrones();

    // particles (additive)
    ctx.globalCompositeOperation = 'lighter';
    for (const p of particles){
        const a = Math.max(0, p.life / p.maxLife);
        ctx.globalAlpha = a;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color; ctx.shadowBlur = 10;
        ctx.beginPath(); ctx.arc(p.x, p.y - camY, p.size * a + 0.4, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    ctx.globalCompositeOperation = 'source-over';

    drawPlayer();
    ctx.restore();

    // HUD
    ctx.textAlign = 'center';
    ctx.font = '900 ' + Math.round(40 * S) + 'px Orbitron, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    ctx.shadowColor = CYAN; ctx.shadowBlur = 22;
    ctx.fillText(meters + 'm', W/2, 58 * S);
    ctx.shadowBlur = 0;

    if (player.jetT > 0){
        const w = 90 * S;
        ctx.fillStyle = 'rgba(255,210,62,0.25)';
        ctx.fillRect(W/2 - w/2, 72*S, w, 6*S);
        ctx.fillStyle = GOLD;
        ctx.shadowColor = GOLD; ctx.shadowBlur = 8;
        ctx.fillRect(W/2 - w/2, 72*S, w * Math.max(0, player.jetT/5), 6*S);
        ctx.shadowBlur = 0;
    }

    if (msgT > 0){
        ctx.globalAlpha = Math.min(1, msgT * 2);
        ctx.font = '900 ' + Math.round(30 * S) + 'px Orbitron, sans-serif';
        ctx.fillStyle = GOLD;
        ctx.shadowColor = GOLD; ctx.shadowBlur = 24;
        ctx.fillText(msgText, W/2, H * 0.30);
        ctx.shadowBlur = 0; ctx.globalAlpha = 1;
    }

    if (state === 'ready'){
        ctx.font = '700 ' + Math.round(19 * S) + 'px Orbitron, sans-serif';
        ctx.fillStyle = CYAN;
        ctx.shadowColor = CYAN; ctx.shadowBlur = 18;
        ctx.fillText('← → STEER · BOUNCE HIGH', W/2, H * 0.24);
        ctx.font = '600 ' + Math.round(13 * S) + 'px Rajdhani, sans-serif';
        ctx.fillStyle = '#8899aa';
        ctx.shadowBlur = 0;
        ctx.fillText('gold slides · magenta crumbles · green springs', W/2, H * 0.24 + 26 * S);
        ctx.fillText('bop drones from above — never from the side', W/2, H * 0.24 + 44 * S);
    }

    if (flashT > 0){
        ctx.fillStyle = 'rgba(255,255,255,' + Math.max(0, flashT * 0.55) + ')';
        ctx.fillRect(0, 0, W, H);
    }
}
function drawSkyline(arr, offset, alpha){
    const baseY = H - 4*S + offset;
    if (baseY - H*0.5 > H) return; // fully below view
    for (const b of arr){
        const by = baseY - b.h;
        if (by > H) continue;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = b.color;
        ctx.fillRect(b.x, by, b.w, b.h);
        ctx.strokeStyle = 'rgba(0,229,246,0.16)';
        ctx.lineWidth = 1;
        ctx.strokeRect(b.x, by, b.w, b.h);
        for (const [c, r, col] of b.windows){
            const wx = b.x + 4 + c * (b.w - 8) / b.cols;
            const wy = by + 6 + r * (b.h - 12) / b.rows;
            if (wy > H) continue;
            ctx.fillStyle = col;
            ctx.globalAlpha = alpha * 0.7;
            ctx.fillRect(wx, wy, 3.5, 5.5);
        }
        ctx.globalAlpha = 1;
    }
}
function roundRect(x, y, w, h, r){
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
}
function drawPlatforms(){
    for (const p of platforms){
        const sy = p.y - camY;
        if (sy < -30 || sy > H + 30) continue;
        let col = CYAN, ca = 'rgba(0,229,246,';
        if (p.type === 'moving'){ col = GOLD; ca = 'rgba(255,210,62,'; }
        else if (p.type === 'crumble'){ col = MAG; ca = 'rgba(255,42,109,'; }
        else if (p.type === 'spring'){ col = GRN; ca = 'rgba(34,229,154,'; }
        let ox = 0;
        if (p.crumbleT >= 0 && p.crumbleT < 0.28) ox = (Math.random()-0.5) * 5 * S;
        const alpha = p.crumbleT > 0.28 ? Math.max(0.2, 1 - (p.crumbleT - 0.28)*2) : 1;
        ctx.globalAlpha = alpha;
        const gr = ctx.createLinearGradient(0, sy, 0, sy + p.h);
        gr.addColorStop(0, ca + '0.45)');
        gr.addColorStop(1, ca + '0.10)');
        ctx.fillStyle = gr;
        ctx.strokeStyle = col;
        ctx.lineWidth = 1.6;
        ctx.shadowColor = col; ctx.shadowBlur = 14;
        roundRect(p.x + ox, sy, p.w, p.h, 5*S);
        ctx.fill(); ctx.stroke();
        ctx.shadowBlur = 0;
        // crumble cracks
        if (p.type === 'crumble'){
            ctx.strokeStyle = ca + '0.8)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(p.x + ox + p.w*0.3, sy); ctx.lineTo(p.x + ox + p.w*0.42, sy + p.h);
            ctx.moveTo(p.x + ox + p.w*0.68, sy); ctx.lineTo(p.x + ox + p.w*0.6, sy + p.h);
            ctx.stroke();
        }
        // spring coil
        if (p.type === 'spring'){
            const cx = p.x + p.w/2;
            const ext = p.springT > 0 ? 4*S : 10*S;
            ctx.strokeStyle = GRN;
            ctx.lineWidth = 2;
            ctx.shadowColor = GRN; ctx.shadowBlur = 10;
            ctx.beginPath();
            for (let i = 0; i <= 4; i++){
                const yy = sy - (ext * i / 4);
                const xx = cx + (i % 2 === 0 ? -7*S : 7*S);
                if (i === 0) ctx.moveTo(cx - 7*S, sy); else ctx.lineTo(xx, yy);
            }
            ctx.stroke();
            ctx.fillStyle = 'rgba(34,229,154,0.5)';
            ctx.fillRect(cx - 11*S, sy - ext - 4*S, 22*S, 4*S);
            ctx.shadowBlur = 0;
        }
        ctx.globalAlpha = 1;
    }
}
function drawPickups(){
    for (const pk of pickups){
        const sy = pk.y + Math.sin(pk.bob)*5*S - camY;
        if (sy < -40 || sy > H + 40) continue;
        ctx.save();
        ctx.translate(pk.x, sy);
        ctx.strokeStyle = GOLD;
        ctx.fillStyle = 'rgba(255,210,62,0.22)';
        ctx.lineWidth = 1.8;
        ctx.shadowColor = GOLD; ctx.shadowBlur = 14;
        roundRect(-8*S, -11*S, 16*S, 22*S, 5*S);
        ctx.fill(); ctx.stroke();
        roundRect(-4*S, -14*S, 8*S, 4*S, 2*S);
        ctx.stroke();
        // flame glyph
        ctx.fillStyle = MAG;
        ctx.beginPath();
        ctx.moveTo(0, 13*S); ctx.lineTo(-4*S, 18*S + Math.sin(pk.bob*4)*2*S); ctx.lineTo(0, 16*S); ctx.lineTo(4*S, 18*S + Math.cos(pk.bob*4)*2*S);
        ctx.closePath(); ctx.fill();
        ctx.shadowBlur = 0;
        ctx.restore();
    }
}
function drawDrones(){
    for (const d of drones){
        const sy = d.y - camY;
        if (sy < -40 || sy > H + 40) continue;
        ctx.save();
        ctx.translate(d.x, sy);
        if (d.dead) ctx.rotate(d.deadV * 0.002);
        const r = d.r;
        // rotor shimmer
        ctx.strokeStyle = 'rgba(255,255,255,' + (0.2 + 0.25*Math.abs(Math.sin(performance.now()*0.03))) + ')';
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(-r*1.15, -r*0.75); ctx.lineTo(r*1.15, -r*0.75); ctx.stroke();
        // saucer body
        const bg = ctx.createLinearGradient(0, -r*0.6, 0, r*0.6);
        bg.addColorStop(0, '#3a1030');
        bg.addColorStop(1, '#160a1e');
        ctx.fillStyle = bg;
        ctx.strokeStyle = MAG;
        ctx.lineWidth = 2;
        ctx.shadowColor = MAG; ctx.shadowBlur = 14;
        ctx.beginPath(); ctx.ellipse(0, 0, r, r*0.58, 0, 0, Math.PI*2);
        ctx.fill(); ctx.stroke();
        ctx.shadowBlur = 0;
        // eye
        ctx.fillStyle = CYAN;
        ctx.shadowColor = CYAN; ctx.shadowBlur = 10;
        ctx.beginPath(); ctx.arc(d.vx > 0 ? r*0.3 : -r*0.3, 0, r*0.22, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
        ctx.restore();
    }
}
function drawPlayer(){
    const sy = player.y - camY;
    const r = player.r;
    // squash on land, stretch when rising fast
    const stretch = Math.min(0.4, Math.max(0, -player.vy / (2400*S)));
    const squash = Math.max(0, player.sq) * 0.4;
    const sxv = 1 + squash - stretch, syv = 1 - squash + stretch;
    ctx.save();
    ctx.translate(player.x, sy);
    ctx.rotate(player.vx / MAXVX() * 0.18);
    ctx.scale(sxv, syv);

    // jet flame when boosted
    if (player.jetT > 0){
        const jl = r * (2 + Math.random()*1.2);
        const jg = ctx.createLinearGradient(0, r, 0, r + jl);
        jg.addColorStop(0, 'rgba(255,210,62,0.95)');
        jg.addColorStop(0.5, 'rgba(255,42,109,0.6)');
        jg.addColorStop(1, 'rgba(255,42,109,0)');
        ctx.fillStyle = jg;
        ctx.shadowColor = GOLD; ctx.shadowBlur = 16;
        ctx.beginPath();
        ctx.moveTo(-r*0.45, r*0.8); ctx.lineTo(0, r + jl); ctx.lineTo(r*0.45, r*0.8);
        ctx.closePath(); ctx.fill();
        ctx.shadowBlur = 0;
    }

    // body
    const bodyG = ctx.createLinearGradient(0, -r, 0, r);
    bodyG.addColorStop(0, '#1b2a4a');
    bodyG.addColorStop(1, '#0b1226');
    ctx.fillStyle = bodyG;
    ctx.strokeStyle = CYAN;
    ctx.lineWidth = 2;
    ctx.shadowColor = CYAN; ctx.shadowBlur = 16;
    roundRect(-r, -r*0.95, r*2, r*1.7, r*0.55);
    ctx.fill(); ctx.stroke();
    ctx.shadowBlur = 0;

    // visor
    ctx.fillStyle = GRN;
    ctx.shadowColor = GRN; ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.ellipse(player.dir * r*0.22, -r*0.3, r*0.5, r*0.3, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#05060a';
    ctx.beginPath(); ctx.arc(player.dir * r*0.38, -r*0.3, r*0.12, 0, Math.PI*2); ctx.fill();

    // claw legs (it bounces on its pincers)
    ctx.strokeStyle = GOLD;
    ctx.lineWidth = 2.2;
    ctx.lineCap = 'round';
    ctx.shadowColor = GOLD; ctx.shadowBlur = 8;
    const open = 0.5 + squash * 1.4;
    for (const side of [-1, 1]){
        ctx.beginPath();
        ctx.moveTo(side * r*0.45, r*0.7);
        ctx.quadraticCurveTo(side * r*(0.55 + open*0.3), r*1.25, side * r*(0.3 + open*0.35), r*1.55);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(side * r*0.45, r*0.7);
        ctx.quadraticCurveTo(side * r*(0.35 - open*0.12), r*1.3, side * r*(0.55 - open*0.28), r*1.5);
        ctx.stroke();
    }
    ctx.shadowBlur = 0;

    // antenna
    ctx.strokeStyle = CYAN;
    ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.moveTo(0, -r*0.95); ctx.lineTo(-player.dir * r*0.2, -r*1.45); ctx.stroke();
    ctx.fillStyle = MAG;
    ctx.shadowColor = MAG; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(-player.dir * r*0.2, -r*1.5, r*0.14, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;

    ctx.restore();
}

/* ===== loop ===== */
function loop(now){
    requestAnimationFrame(loop);
    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;
    update(dt);
    draw();
}

/* ===== input ===== */
function startPlay(){
    if (state === 'ready') state = 'play';
}
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A'){ e.preventDefault(); keys.left = true; startPlay(); }
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D'){ e.preventDefault(); keys.right = true; startPlay(); }
    if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === ' ') e.preventDefault();
});
document.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
});
// touch/click halves of the canvas steer too
function pointerSteer(e){
    if (e.cancelable) e.preventDefault();
    initAudio();
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX !== undefined ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : 0)) - rect.left;
    keys.left = x < rect.width / 2;
    keys.right = !keys.left;
    startPlay();
}
function pointerStop(){ keys.left = false; keys.right = false; }
canvas.addEventListener('pointerdown', pointerSteer);
canvas.addEventListener('pointermove', e => { if (e.buttons) pointerSteer(e); });
canvas.addEventListener('pointerup', pointerStop);
canvas.addEventListener('pointercancel', pointerStop);
canvas.addEventListener('pointerleave', pointerStop);

window.addEventListener('resize', resize);

/* mobile analog stick (dispatches synthetic Arrow key events) */
if (window.ArcadeStick) ArcadeStick.create({ mode: 'hold', axes: 4, lockY: true });

/* init */
resize();
reset();
lastTime = performance.now();
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
