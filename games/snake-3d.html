<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake 3D - ClawArcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    width: 100%; height: 100%;
    background: #05060a;
    overflow: hidden;
    font-family: 'Rajdhani', 'Segoe UI', sans-serif;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
}
#game { display: block; position: fixed; inset: 0; }

#vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 5;
    background: radial-gradient(ellipse at center, transparent 52%, rgba(0,0,0,0.55) 100%);
}
#flash {
    position: fixed; inset: 0; pointer-events: none; z-index: 6;
    background: #ff2a6d; opacity: 0; transition: opacity 0.7s ease-out;
}

#back {
    position: fixed; top: 14px; left: 16px; z-index: 20;
    font-family: 'Orbitron', sans-serif; font-size: 12px; letter-spacing: 2px;
    color: #00e5f6; text-decoration: none; text-shadow: 0 0 12px rgba(0,229,246,0.8);
    border: 1px solid rgba(0,229,246,0.35); border-radius: 6px; padding: 6px 12px;
    background: rgba(5,6,10,0.55); backdrop-filter: blur(3px);
}
#back:hover { background: rgba(0,229,246,0.12); box-shadow: 0 0 18px rgba(0,229,246,0.35); }

#mute {
    position: fixed; top: 14px; right: 16px; z-index: 20;
    width: 40px; height: 34px; cursor: pointer;
    font-size: 16px; line-height: 1;
    color: #00e5f6; border: 1px solid rgba(0,229,246,0.35); border-radius: 6px;
    background: rgba(5,6,10,0.55);
}
#mute:hover { background: rgba(0,229,246,0.12); }

#hud {
    position: fixed; top: 58px; left: 16px; z-index: 20;
    pointer-events: none;
    background: rgba(5,6,10,0.5); border: 1px solid rgba(0,229,246,0.2);
    border-radius: 8px; padding: 10px 14px; min-width: 148px;
    backdrop-filter: blur(3px);
}
.hud-row { display: flex; justify-content: space-between; align-items: baseline; gap: 14px; }
.hud-label { font-size: 11px; letter-spacing: 2px; color: rgba(200,210,230,0.65); text-transform: uppercase; font-weight: 600; }
.hud-val { font-family: 'Orbitron', sans-serif; font-size: 17px; font-weight: 700; }
#hud-score { color: #00e5f6; text-shadow: 0 0 12px rgba(0,229,246,0.8); }
#hud-len   { color: #22e59a; text-shadow: 0 0 12px rgba(34,229,154,0.8); font-size: 14px; }
#hud-speed { color: #ff2a6d; text-shadow: 0 0 12px rgba(255,42,109,0.8); font-size: 14px; }
#hud-high  { color: #ffd23e; text-shadow: 0 0 12px rgba(255,210,62,0.8); font-size: 14px; }

#minimap {
    position: fixed; bottom: 18px; right: 18px; z-index: 20;
    width: 160px; height: 160px; pointer-events: none;
    border: 2px solid rgba(0,229,246,0.55); border-radius: 10px;
    background: rgba(4,5,10,0.75);
    box-shadow: 0 0 24px rgba(0,229,246,0.25), inset 0 0 18px rgba(0,229,246,0.06);
}

.overlay {
    position: fixed; inset: 0; z-index: 30;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, rgba(10,8,24,0.88) 0%, rgba(3,4,8,0.96) 100%);
    text-align: center; padding: 20px;
}
.overlay h1 {
    font-family: 'Orbitron', sans-serif; font-weight: 900;
    font-size: clamp(34px, 7vw, 62px); letter-spacing: 10px; color: #00e5f6;
    text-shadow: 0 0 30px rgba(0,229,246,0.9), 0 0 80px rgba(0,229,246,0.45);
    margin-bottom: 8px;
}
.overlay .sub {
    font-family: 'Orbitron', sans-serif; font-size: clamp(12px, 2.4vw, 17px);
    letter-spacing: 6px; color: #ff2a6d; text-shadow: 0 0 16px rgba(255,42,109,0.8);
    margin-bottom: 28px;
}
.overlay .info {
    font-size: 16px; line-height: 2; color: rgba(205,215,235,0.8); margin-bottom: 26px; letter-spacing: 1px;
}
.overlay .info b { color: #00e5f6; text-shadow: 0 0 10px rgba(0,229,246,0.7); font-weight: 700; }
.overlay .info .gold { color: #ffd23e; text-shadow: 0 0 10px rgba(255,210,62,0.7); }
.btn {
    font-family: 'Orbitron', sans-serif; font-size: 17px; font-weight: 700;
    letter-spacing: 4px; text-transform: uppercase; cursor: pointer;
    color: #00e5f6; padding: 15px 44px; border-radius: 8px;
    background: linear-gradient(135deg, rgba(0,229,246,0.16), rgba(255,42,109,0.14));
    border: 2px solid #00e5f6;
    text-shadow: 0 0 12px rgba(0,229,246,0.8);
    box-shadow: 0 0 26px rgba(0,229,246,0.35), inset 0 0 18px rgba(0,229,246,0.08);
    transition: transform 0.15s, box-shadow 0.15s;
}
.btn:hover { transform: scale(1.05); box-shadow: 0 0 44px rgba(0,229,246,0.6), inset 0 0 26px rgba(0,229,246,0.15); }
#go-title { color: #ff2a6d; text-shadow: 0 0 30px rgba(255,42,109,0.9), 0 0 80px rgba(255,42,109,0.45); }
#final-score {
    font-family: 'Orbitron', sans-serif; font-size: clamp(30px, 5vw, 46px); font-weight: 900;
    color: #ffd23e; text-shadow: 0 0 26px rgba(255,210,62,0.8); margin: 6px 0 4px;
}
#go-high { font-size: 15px; letter-spacing: 2px; color: rgba(205,215,235,0.75); margin-bottom: 24px; }
#go-high.newhigh { color: #ffd23e; text-shadow: 0 0 14px rgba(255,210,62,0.9); }
.hint { margin-top: 20px; font-size: 13px; letter-spacing: 3px; color: rgba(205,215,235,0.5); text-transform: uppercase; }
#game-over { display: none; }

@media (max-width: 640px) {
    #minimap { width: 110px; height: 110px; bottom: 12px; right: 12px; }
    #hud { min-width: 120px; padding: 8px 10px; }
    .hud-val { font-size: 15px; }
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<canvas id="minimap" width="320" height="320"></canvas>
<div id="vignette"></div>
<div id="flash"></div>

<a id="back" href="../index.html">&#9664; ARCADE</a>
<button id="mute" type="button" aria-label="Toggle sound">&#128266;</button>

<div id="hud">
    <div class="hud-row"><span class="hud-label">Score</span><span class="hud-val" id="hud-score">0</span></div>
    <div class="hud-row"><span class="hud-label">Length</span><span class="hud-val" id="hud-len">4</span></div>
    <div class="hud-row"><span class="hud-label">Speed</span><span class="hud-val" id="hud-speed">1.00x</span></div>
    <div class="hud-row"><span class="hud-label">High</span><span class="hud-val" id="hud-high">0</span></div>
</div>

<div class="overlay" id="start-screen">
    <h1>SNAKE 3D</h1>
    <div class="sub">NEON CHASE CAM</div>
    <div class="info">
        <b>&#9664; &#9654;</b> or <b>A / D</b> &mdash; turn left / right<br>
        Hunt the <span class="gold">gold beacon</span> &middot; don't hit the walls or yourself
    </div>
    <button class="btn" id="start-btn" type="button">Start Game</button>
    <div class="hint">or press space</div>
</div>

<div class="overlay" id="game-over">
    <h1 id="go-title">CRASHED</h1>
    <div class="sub" id="go-reason">INTO THE WALL</div>
    <div id="final-score">0</div>
    <div id="go-high">HIGH SCORE 0</div>
    <button class="btn" id="restart-btn" type="button">Restart</button>
    <div class="hint">press space to restart</div>
</div>

<script src="../js/human-check.js"></script>
<script src="../js/joystick.js"></script>
<script>
(function () {
'use strict';

/* ============================================================
   SNAKE 3D — dependency-free pseudo-3D chase-cam snake.
   Custom perspective projection onto 2D canvas, painter's-
   algorithm depth sorting. No external libraries.
   ============================================================ */

var GRID = 30;          // 30x30 arena
var WALL_H = 1.15;      // wall height (world units, 1 unit = 1 cell)
var NEAR = 0.25;        // near clip plane (camera space z)
var CAM_BACK = 9;       // chase cam distance behind head
var CAM_UP = 6;         // chase cam height
var CAM_AHEAD = 3.6;    // look-at point ahead of head
var BASE_STEP = 200;    // ms per grid step at start
var MIN_STEP = 88;

var canvas = document.getElementById('game');
var ctx = canvas.getContext('2d');
var mm = document.getElementById('minimap');
var mctx = mm.getContext('2d');

var W = 0, H = 0, DPR = 1, FOCAL = 1;
function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = Math.round(W * DPR);
    canvas.height = Math.round(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    FOCAL = (H * 0.5) / Math.tan(Math.PI / 6); // ~60 deg vertical FOV
}
window.addEventListener('resize', resize);
resize();

/* ---------------- camera & projection ---------------- */
var cam = { x: 15, y: 12, z: -10 };   // smoothed camera position
var rc = { x: 15, y: 12, z: -10 };    // render camera (cam + shake)
var camYaw = 0;
// basis vectors (right, up, forward), rebuilt by lookAt each frame
var fX = 0, fY = 0, fZ = 1, rX = 1, rZ = 0, uX = 0, uY = 1, uZ = 0;

function lookAt(tx, ty, tz) {
    var dx = tx - rc.x, dy = ty - rc.y, dz = tz - rc.z;
    var l = Math.sqrt(dx * dx + dy * dy + dz * dz) || 1;
    fX = dx / l; fY = dy / l; fZ = dz / l;
    var rl = Math.sqrt(fX * fX + fZ * fZ);
    if (rl < 1e-4) return;                 // degenerate: keep last basis
    rX = fZ / rl; rZ = -fX / rl;           // horizontal right vector
    uX = fY * rZ;                          // up = cross(forward, right)
    uY = fZ * rX - fX * rZ;
    uZ = -fY * rX;
}

// world -> camera space, writes into out[0..2], returns out
function toCam(x, y, z, out) {
    var dx = x - rc.x, dy = y - rc.y, dz = z - rc.z;
    out[0] = dx * rX + dz * rZ;
    out[1] = dx * uX + dy * uY + dz * uZ;
    out[2] = dx * fX + dy * fY + dz * fZ;
    return out;
}

// Sutherland-Hodgman clip of camera-space polygon against z > NEAR
function clipNear(pts) {
    var out = [];
    for (var i = 0; i < pts.length; i++) {
        var a = pts[i], b = pts[(i + 1) % pts.length];
        var ain = a[2] > NEAR, bin = b[2] > NEAR;
        if (ain) out.push(a);
        if (ain !== bin) {
            var t = (NEAR - a[2]) / (b[2] - a[2]);
            out.push([a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, NEAR]);
        }
    }
    return out;
}

// project world quad/poly -> screen path; returns false if fully clipped
var polyCS = [];
function pathPoly(worldPts) {
    polyCS.length = 0;
    for (var i = 0; i < worldPts.length; i++) {
        var p = worldPts[i];
        polyCS.push(toCam(p[0], p[1], p[2], [0, 0, 0]));
    }
    var cl = (polyCS[0][2] > NEAR && polyCS[1][2] > NEAR && polyCS[2][2] > NEAR &&
              (polyCS.length < 4 || polyCS[3][2] > NEAR)) ? polyCS : clipNear(polyCS);
    if (cl.length < 3) return false;
    ctx.beginPath();
    for (var j = 0; j < cl.length; j++) {
        var c = cl[j], s = FOCAL / c[2];
        var sx = W * 0.5 + c[0] * s, sy = H * 0.5 - c[1] * s;
        if (j === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
    }
    ctx.closePath();
    return true;
}

/* ---------------- fog & shading ---------------- */
var VOID_R = 5, VOID_G = 6, VOID_B = 10;
function fogAt(d) { // 0 near .. ~0.95 far
    var f = 1 - Math.exp(-Math.max(0, d - 5) * 0.062);
    return f > 0.95 ? 0.95 : f;
}
function shade(r, g, b, br, fog) {
    var inv = 1 - fog;
    return 'rgb(' + ((r * br * inv + VOID_R * fog) | 0) + ',' +
                    ((g * br * inv + VOID_G * fog) | 0) + ',' +
                    ((b * br * inv + VOID_B * fog) | 0) + ')';
}
// light direction (normalized-ish)
var LX = 0.45, LY = 0.78, LZ = 0.43;
function faceBr(nx, ny, nz) {
    var d = nx * LX + ny * LY + nz * LZ;
    return 0.42 + 0.58 * (d > 0 ? d : 0);
}

/* ---------------- game state ---------------- */
var DIRS = [[0, 1], [1, 0], [0, -1], [-1, 0]]; // +1 index = right turn
var YAWS = [0, Math.PI / 2, Math.PI, -Math.PI / 2];

var state = 'menu';   // menu | play | dying | dead
var snake = [];       // [{x,z}] head first
var prev = [];        // previous grid cells, for interpolation
var dirIdx = 0;
var turnQueue = [];
var food = { x: 22, z: 22 };
var score = 0, eaten = 0, growPending = 0;
var stepMs = BASE_STEP, lastStep = 0, stepT = 0;
var shake = 0, dyingAt = 0;
var high = 0;
try { high = parseInt(localStorage.getItem('snake3dHigh') || '0', 10) || 0; } catch (e) {}

function spawnFood() {
    for (var tries = 0; tries < 500; tries++) {
        var x = (Math.random() * GRID) | 0, z = (Math.random() * GRID) | 0;
        var hit = false;
        for (var i = 0; i < snake.length; i++) {
            if (snake[i].x === x && snake[i].z === z) { hit = true; break; }
        }
        if (!hit) { food.x = x; food.z = z; return; }
    }
}

function resetGame() {
    snake.length = 0;
    snake.push({ x: 15, z: 15 }, { x: 15, z: 14 }, { x: 15, z: 13 }, { x: 15, z: 12 });
    prev.length = 0;
    dirIdx = 0;
    turnQueue.length = 0;
    score = 0; eaten = 0; growPending = 0;
    stepMs = BASE_STEP; stepT = 0;
    shake = 0;
    spawnFood();
    camYaw = YAWS[dirIdx];
    cam.x = snake[0].x + 0.5 - Math.sin(camYaw) * CAM_BACK;
    cam.z = snake[0].z + 0.5 - Math.cos(camYaw) * CAM_BACK;
    cam.y = CAM_UP;
    hudDirty = true;
}

function startGame() {
    resetGame();
    state = 'play';
    lastStep = performance.now();
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('game-over').style.display = 'none';
}

function die(ix, iz, reason) {
    state = 'dying';
    dyingAt = performance.now();
    shake = 1;
    deathReason = reason;
    var px = Math.min(GRID - 0.2, Math.max(0.2, ix + 0.5));
    var pz = Math.min(GRID - 0.2, Math.max(0.2, iz + 0.5));
    burst(px, 0.6, pz, 46, true);
    sfxDeath();
    var fl = document.getElementById('flash');
    fl.style.transition = 'none'; fl.style.opacity = '0.45';
    // force reflow then fade
    void fl.offsetWidth;
    fl.style.transition = 'opacity 0.7s ease-out'; fl.style.opacity = '0';
}
var deathReason = 'INTO THE WALL';

function showGameOver() {
    state = 'dead';
    var isNew = score > high;
    if (isNew) {
        high = score;
        try { localStorage.setItem('snake3dHigh', String(high)); } catch (e) {}
    }
    document.getElementById('final-score').textContent = score;
    var gh = document.getElementById('go-high');
    gh.textContent = isNew ? 'NEW HIGH SCORE!' : 'HIGH SCORE ' + high;
    gh.className = isNew ? 'newhigh' : '';
    document.getElementById('go-reason').textContent = deathReason;
    document.getElementById('game-over').style.display = 'flex';
    hudDirty = true;
}

function step() {
    if (turnQueue.length) dirIdx = turnQueue.shift();
    var d = DIRS[dirIdx];
    var head = snake[0];
    var nx = head.x + d[0], nz = head.z + d[1];

    // snapshot previous positions for interpolation
    prev.length = snake.length;
    for (var i = 0; i < snake.length; i++) {
        var pv = prev[i] || (prev[i] = { x: 0, z: 0 });
        pv.x = snake[i].x; pv.z = snake[i].z;
    }

    if (nx < 0 || nx >= GRID || nz < 0 || nz >= GRID) { die(nx, nz, 'INTO THE WALL'); return; }
    var willGrow = growPending > 0;
    var checkLen = snake.length - (willGrow ? 0 : 1); // tail vacates unless growing
    for (var j = 0; j < checkLen; j++) {
        if (snake[j].x === nx && snake[j].z === nz) { die(nx, nz, 'ATE YOURSELF'); return; }
    }

    snake.unshift({ x: nx, z: nz });
    if (willGrow) growPending--;
    else snake.pop();

    if (nx === food.x && nz === food.z) {
        score += 10;
        eaten++;
        growPending += 1;
        stepMs = Math.max(MIN_STEP, BASE_STEP - eaten * 3.5);
        burst(nx + 0.5, 0.8, nz + 0.5, 14, false);
        spawnFood();
        sfxEat();
        hudDirty = true;
    }
}

// interpolated render position of segment i (grid coords, cell origin)
function rpX(i) { var p = prev[i], c = snake[i]; return p ? p.x + (c.x - p.x) * stepT : c.x; }
function rpZ(i) { var p = prev[i], c = snake[i]; return p ? p.z + (c.z - p.z) * stepT : c.z; }

/* ---------------- input ---------------- */
function queueTurn(sgn) {
    if (state !== 'play') return;
    if (turnQueue.length >= 2) return;
    var base = turnQueue.length ? turnQueue[turnQueue.length - 1] : dirIdx;
    turnQueue.push((base + (sgn > 0 ? 1 : 3)) % 4);
    sfxTurn();
}
function startOrRestart() {
    if (state === 'menu' || state === 'dead') startGame();
}
document.addEventListener('keydown', function (e) {
    var k = e.key;
    if (k === 'ArrowLeft' || k === 'a' || k === 'A') { ensureAudio(); queueTurn(-1); e.preventDefault(); }
    else if (k === 'ArrowRight' || k === 'd' || k === 'D') { ensureAudio(); queueTurn(1); e.preventDefault(); }
    else if (k === ' ' || k === 'Spacebar') { ensureAudio(); startOrRestart(); e.preventDefault(); }
    else if (k === 'ArrowUp' || k === 'ArrowDown') { e.preventDefault(); }
});
canvas.addEventListener('pointerdown', function () { ensureAudio(); startOrRestart(); });
document.getElementById('start-btn').addEventListener('click', function () { ensureAudio(); startGame(); });
document.getElementById('restart-btn').addEventListener('click', function () { ensureAudio(); startGame(); });

/* ---------------- audio ---------------- */
var AC = null, master = null, muted = false;
function ensureAudio() {
    try {
        if (!AC) {
            var Ctor = window.AudioContext || window.webkitAudioContext;
            if (!Ctor) return;
            AC = new Ctor();
            master = AC.createGain();
            master.gain.value = 0.32;
            master.connect(AC.destination);
        }
        if (AC.state === 'suspended') AC.resume();
    } catch (e) {}
}
function tone(type, f0, f1, dur, vol, when) {
    if (!AC || muted) return;
    try {
        var t0 = AC.currentTime + (when || 0);
        var o = AC.createOscillator(), g = AC.createGain();
        o.type = type;
        o.frequency.setValueAtTime(f0, t0);
        o.frequency.exponentialRampToValueAtTime(Math.max(20, f1), t0 + dur);
        g.gain.setValueAtTime(vol, t0);
        g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
        o.connect(g); g.connect(master);
        o.start(t0); o.stop(t0 + dur + 0.02);
    } catch (e) {}
}
function sfxEat()  { tone('sine', 520, 1040, 0.12, 0.5); tone('square', 780, 1560, 0.1, 0.15, 0.05); }
function sfxTurn() { tone('square', 300, 300, 0.03, 0.06); }
function sfxDeath() {
    tone('sawtooth', 300, 40, 0.55, 0.5);
    tone('square', 180, 30, 0.5, 0.25, 0.04);
}
var muteBtn = document.getElementById('mute');
muteBtn.addEventListener('click', function () {
    muted = !muted;
    muteBtn.innerHTML = muted ? '&#128263;' : '&#128266;';
});

/* ---------------- particles ---------------- */
var MAXP = 140;
var pX = new Float32Array(MAXP), pY = new Float32Array(MAXP), pZ = new Float32Array(MAXP);
var vX = new Float32Array(MAXP), vY = new Float32Array(MAXP), vZ = new Float32Array(MAXP);
var pLife = new Float32Array(MAXP), pCol = new Uint8Array(MAXP);
var PCOLS = [[255, 210, 62], [34, 229, 154], [255, 42, 109], [240, 250, 255]];
function burst(x, y, z, n, deadly) {
    var placed = 0;
    for (var i = 0; i < MAXP && placed < n; i++) {
        if (pLife[i] > 0) continue;
        var a = Math.random() * Math.PI * 2, r = 1.5 + Math.random() * 5;
        pX[i] = x; pY[i] = y; pZ[i] = z;
        vX[i] = Math.cos(a) * r;
        vZ[i] = Math.sin(a) * r;
        vY[i] = 2 + Math.random() * 6;
        pLife[i] = 0.6 + Math.random() * 0.7;
        pCol[i] = deadly ? (Math.random() < 0.45 ? 2 : (Math.random() < 0.5 ? 1 : 3))
                         : (Math.random() < 0.7 ? 0 : 3);
        placed++;
    }
}
function updateParticles(dt) {
    for (var i = 0; i < MAXP; i++) {
        if (pLife[i] <= 0) continue;
        pLife[i] -= dt;
        vY[i] -= 14 * dt;
        pX[i] += vX[i] * dt; pY[i] += vY[i] * dt; pZ[i] += vZ[i] * dt;
        if (pY[i] < 0.04) { pY[i] = 0.04; vY[i] *= -0.45; vX[i] *= 0.8; vZ[i] *= 0.8; }
    }
}
var PP = [0, 0, 0];
function drawParticles() {
    for (var i = 0; i < MAXP; i++) {
        if (pLife[i] <= 0) continue;
        toCam(pX[i], pY[i], pZ[i], PP);
        if (PP[2] <= NEAR) continue;
        var s = FOCAL / PP[2];

        cam.y += (12 - cam.y) * Math.min(1, dt * 3);
        rc.x = cam.x; rc.y = cam.y; rc.z = cam.z;
        lookAt(15, 0, 15);
        return;
    }
    var hx = rpX(0) + 0.5, hz = rpZ(0) + 0.5;
    camYaw = angLerp(camYaw, YAWS[dirIdx], 1 - Math.exp(-dt * 4.5));
    var sn = Math.sin(camYaw), cs = Math.cos(camYaw);
    var dxp = hx - sn * CAM_BACK, dzp = hz - cs * CAM_BACK;
    var k = 1 - Math.exp(-dt * 10);
    cam.x += (dxp - cam.x) * k;
    cam.z += (dzp - cam.z) * k;
    cam.y += (CAM_UP - cam.y) * k;
    rc.x = cam.x; rc.y = cam.y; rc.z = cam.z;
    if (shake > 0.001) {
        rc.x += (Math.random() - 0.5) * shake * 1.1;
        rc.y += (Math.random() - 0.5) * shake * 0.8;
        rc.z += (Math.random() - 0.5) * shake * 1.1;
        shake *= Math.exp(-dt * 3.2);
    }
    lookAt(hx + sn * CAM_AHEAD, 0.55, hz + cs * CAM_AHEAD);
}

/* ---------------- main loop ---------------- */
var lastFrame = 0;
function frame(now) {
    requestAnimationFrame(frame);
    var dt = Math.min(0.05, (now - lastFrame) / 1000 || 0.016);
    lastFrame = now;

    if (state === 'play') {
        if (now - lastStep > stepMs * 5) lastStep = now - stepMs; // tab was hidden
        while (state === 'play' && now - lastStep >= stepMs) {
            lastStep += stepMs;
            step();
        }
        if (state === 'play') stepT = (now - lastStep) / stepMs;
    } else if (state === 'dying' && now - dyingAt > 950) {
        showGameOver();
    }

    updateCamera(now, dt);
    updateParticles(dt);

    /* ---- render ---- */
    ctx.fillStyle = '#05060a';
    ctx.fillRect(0, 0, W, H);
    drawSky(now);
    drawFloor();
    floorGlow(food.x + 0.5, food.z + 0.5, 2.2, 255, 210, 62, 0.24);
    if (state !== 'menu') floorGlow(rpX(0) + 0.5, rpZ(0) + 0.5, 1.7, 34, 229, 154, 0.16);

    // build depth-sorted item list
    itemCount = 0;
    var i, cxx, czz;
    for (i = 0; i < GRID; i++) {
        pushItem(1, distTo(i + 0.5, WALL_H * 0.5, 0), 0, i);
        pushItem(1, distTo(GRID, WALL_H * 0.5, i + 0.5), 1, i);
        pushItem(1, distTo(i + 0.5, WALL_H * 0.5, GRID), 2, i);
        pushItem(1, distTo(0, WALL_H * 0.5, i + 0.5), 3, i);
    }
    pushItem(2, distTo(0, 0.5, 0), 0, 0);
    pushItem(2, distTo(GRID, 0.5, 0), GRID, 0);
    pushItem(2, distTo(GRID, 0.5, GRID), GRID, GRID);
    pushItem(2, distTo(0, 0.5, GRID), 0, GRID);
    for (i = 0; i < snake.length; i++) {
        cxx = rpX(i) + 0.5; czz = rpZ(i) + 0.5;
        pushItem(3, distTo(cxx, 0.35, czz), i, 0);
    }
    var fd = distTo(food.x + 0.5, 0.7, food.z + 0.5);
    pushItem(4, fd + 0.01, 0, 0);
    pushItem(5, fd, 0, 0);

    items.length = itemCount;
    items.sort(byDepthDesc);
    for (i = 0; i < items.length; i++) {
        var it = items[i];
        if (it.kind === 1) drawWallSeg(it.a, it.b, it.d);
        else if (it.kind === 2) drawPost(it.a, it.b, it.d);
        else if (it.kind === 3) drawSnakeSeg(it.a, it.d);
        else if (it.kind === 4) drawFoodPillar(now, it.d);
        else drawFoodOrb(now);
    }

    drawParticles();
    if (state === 'play') drawFoodArrow(now);
    drawMinimap();
    updateHUD();
}

/* ---------------- boot ---------------- */
resetGame();
hudHigh.textContent = high;
requestAnimationFrame(frame);

// tiny debug hook for automated verification (harmless in production)
window.SNAKE3D_DEBUG = {
    getState: function () {
        return { state: state, score: score, len: snake.length,
                 head: { x: snake[0].x, z: snake[0].z }, dir: dirIdx,
                 food: { x: food.x, z: food.z } };
    },
    placeFood: function (x, z) { food.x = x | 0; food.z = z | 0; }
};
})();
</script>

if (window.ArcadeStick) {
    ArcadeStick.create({ mode: 'tap', axes: 4, lockY: true, buttons: [] });
}
</script>
