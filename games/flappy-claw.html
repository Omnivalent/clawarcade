<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Flappy Claw — ClawArcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100dvh;overflow:hidden;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
        body{font-family:'Orbitron',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#06060c;color:#e8e6e3;display:flex;flex-direction:column;height:100dvh}
        body::after{
            content:'';position:fixed;inset:0;
            background:repeating-linear-gradient(0deg,rgba(0,0,0,0.08) 0px,rgba(0,0,0,0.08) 1px,transparent 1px,transparent 3px);
            pointer-events:none;z-index:1000;opacity:0.4;
        }
        .top-bar{display:flex;justify-content:space-between;align-items:center;padding:0 10px;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);flex-shrink:0;height:44px;min-height:44px;border-bottom:2px solid rgba(0,240,255,0.4);box-shadow:0 2px 20px rgba(0,240,255,0.2);gap:8px}
        .back-btn{color:#f0e010;text-decoration:none;font-size:.7rem;letter-spacing:1px;border:1px solid rgba(240,224,16,0.4);padding:4px 8px;border-radius:14px;white-space:nowrap;text-shadow:0 0 8px rgba(240,224,16,0.5)}
        .back-btn:active{background:rgba(240,224,16,0.2)}
        .top-bar h1{font-size:.9rem;color:#00f0ff;white-space:nowrap;text-shadow:0 0 10px rgba(0,240,255,0.8),0 0 20px rgba(0,240,255,0.4);letter-spacing:2px;animation:neonPulse 2s ease-in-out infinite}
        @keyframes neonPulse{0%,100%{text-shadow:0 0 10px rgba(0,240,255,0.8),0 0 20px rgba(0,240,255,0.4)}50%{text-shadow:0 0 20px rgba(0,240,255,1),0 0 40px rgba(0,240,255,0.6)}}
        .top-stats{display:flex;gap:10px;font-size:.68rem;align-items:center;font-family:'Share Tech Mono',monospace}
        .top-stats .lbl{color:#8899aa}
        .stat-value{color:#05ffa1;font-weight:bold;text-shadow:0 0 8px rgba(5,255,161,0.6);font-size:.85rem}
        .top-btn{background:rgba(0,240,255,0.1);border:2px solid rgba(0,240,255,0.4);color:#00f0ff;padding:4px 9px;border-radius:20px;font-size:.7rem;cursor:pointer;min-height:26px;font-family:'Orbitron',sans-serif;transition:all .2s}
        .top-btn:active{background:rgba(0,240,255,0.3);transform:scale(0.95)}
        .game-area{flex:1;position:relative;min-height:0;overflow:hidden}
        canvas#game{position:absolute;inset:0;display:block;cursor:pointer}
        .hidden{display:none!important}
        .overlay{position:fixed;inset:0;background:rgba(4,4,14,0.9);display:flex;align-items:center;justify-content:center;z-index:20;animation:fadeIn .3s ease;backdrop-filter:blur(8px)}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .overlay .inner{text-align:center;padding:30px;max-width:92vw}
        .overlay h2{color:#ff2a6d;margin-bottom:14px;text-shadow:0 0 18px rgba(255,42,109,0.9),0 0 40px rgba(255,42,109,0.4);font-size:1.9rem;letter-spacing:4px}
        .overlay h2.title-cyan{color:#00f0ff;text-shadow:0 0 18px rgba(0,240,255,0.9),0 0 40px rgba(0,240,255,0.4)}
        .overlay p{color:#aab;margin-bottom:12px;font-size:.9rem;font-family:'Share Tech Mono',monospace;line-height:1.7}
        .overlay .score-line{color:#05ffa1;font-size:1.25rem;text-shadow:0 0 12px rgba(5,255,161,0.7)}
        .medal{width:74px;height:74px;border-radius:50%;margin:6px auto 12px;display:flex;align-items:center;justify-content:center;font-size:.6rem;letter-spacing:2px;font-weight:700;color:rgba(0,0,0,0.75);position:relative;animation:medalSpin 3s ease-in-out infinite}
        @keyframes medalSpin{0%,100%{transform:rotateY(0)}50%{transform:rotateY(28deg) scale(1.05)}}
        .medal::before{content:'';position:absolute;inset:6px;border-radius:50%;border:2px dashed rgba(0,0,0,0.28)}
        .medal.bronze{background:radial-gradient(circle at 32% 30%,#ffc9a3,#cd7f32 50%,#7a4a1d);box-shadow:0 0 24px rgba(205,127,50,0.8)}
        .medal.silver{background:radial-gradient(circle at 32% 30%,#ffffff,#c0c0cc 50%,#70707e);box-shadow:0 0 24px rgba(200,200,215,0.8)}
        .medal.gold{background:radial-gradient(circle at 32% 30%,#fff7b0,#f0e010 48%,#a8860b);box-shadow:0 0 28px rgba(240,224,16,0.9)}
        .overlay .btn{display:block;margin:12px auto 0;background:linear-gradient(135deg,#00f0ff 0%,#0090b8 100%);color:#06060c;border:none;padding:14px 38px;font-size:1rem;font-weight:700;border-radius:26px;cursor:pointer;min-height:50px;box-shadow:0 0 22px rgba(0,240,255,0.5);transition:all .2s;font-family:'Orbitron',sans-serif;letter-spacing:1px}
        .overlay .btn:active{transform:scale(0.95)}
        .newhigh{color:#f0e010!important;text-shadow:0 0 14px rgba(240,224,16,0.8)!important}
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="../index.html" class="back-btn">← MENU</a>
        <h1>FLAPPY CLAW</h1>
        <div class="top-stats">
            <span><span class="lbl">BEST </span><span class="stat-value" id="best">0</span></span>
            <button class="top-btn" id="muteBtn">🔊</button>
        </div>
    </div>
    <div class="game-area" id="gameArea">
        <canvas id="game"></canvas>
    </div>
    <div class="overlay hidden" id="overlay">
        <div class="inner">
            <h2 id="ovTitle">GAME OVER</h2>
            <div class="medal hidden" id="medal">MEDAL</div>
            <p id="ovMsg"></p>
            <button class="btn" id="ovBtn">PLAY AGAIN</button>
        </div>
    </div>
    <script src="../js/human-check.js"></script>
<script>
(function(){
'use strict';
const dpr = window.devicePixelRatio || 1;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const gameArea = document.getElementById('gameArea');

/* ===== audio ===== */
let audioCtx = null, soundEnabled = true, audioInitialized = false;
function initAudio(){
    if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){ return; } }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    audioInitialized = true;
}
function initAudioOnce(){ if (!audioInitialized) initAudio(); }
document.addEventListener('click', initAudioOnce, {once:true});
document.addEventListener('touchstart', initAudioOnce, {once:true});
document.addEventListener('keydown', initAudioOnce, {once:true});
function playTone(freq, type, dur, vol=0.15, slideTo){
    if (!soundEnabled || !audioCtx) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1, slideTo), audioCtx.currentTime + dur);
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
}
function playNoise(dur, vol=0.25){
    if (!soundEnabled || !audioCtx) return;
    const len = Math.floor(audioCtx.sampleRate * dur);
    const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * (1 - i/len);
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    src.connect(g); g.connect(audioCtx.destination); src.start();
}
const sfxFlap = () => playTone(420, 'sine', 0.1, 0.12, 640);
const sfxScore = () => { playTone(880, 'square', 0.08, 0.1); setTimeout(()=>playTone(1175,'square',0.1,0.1), 70); };
const sfxDie = () => { playNoise(0.5, 0.3); [300,220,150,90].forEach((f,i)=>setTimeout(()=>playTone(f,'sawtooth',0.25,0.18),i*110)); };
const sfxCoin = () => [988,1319].forEach((f,i)=>setTimeout(()=>playTone(f,'square',0.12,0.14),i*90));
document.getElementById('muteBtn').onclick = e => {
    e.stopPropagation();
    initAudio(); soundEnabled = !soundEnabled;
    document.getElementById('muteBtn').textContent = soundEnabled ? '🔊' : '🔇';
};

/* ===== state ===== */
let W = 0, H = 0, S = 1; // S = scale factor vs 640px logical height
let state = 'ready'; // ready | play | dead
let bird, pipes, particles, stars, buildings, buildingsFar;
let score = 0, best = 0;
let flashT = 0, shake = 0, deathT = 0;
let continueUsed = false, coinAwarded = false, invulnT = 0;
let pipeTimer = 0, groundX = 0;
let lastTime = 0;
try { best = parseInt(localStorage.getItem('flappyClawHigh') || '0') || 0; } catch(e){}
document.getElementById('best').textContent = best;

function resize(){
    W = gameArea.clientWidth; H = gameArea.clientHeight;
    S = H / 640;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    makeBackdrop();
}

function makeBackdrop(){
    stars = [];
    for (let i = 0; i < 70; i++) stars.push({
        x: Math.random()*W, y: Math.random()*H*0.75,
        depth: 0.05 + Math.random()*0.15, size: 0.6 + Math.random()*1.5,
        tw: Math.random()*Math.PI*2
    });
    buildingsFar = genSkyline(0.32, 0.30, '#0d1030');
    buildings = genSkyline(0.55, 0.46, '#12163e');
}
function genSkyline(depth, hFrac, color){
    const arr = []; let x = -40;
    while (x < W * 2 + 100){
        const bw = 34 + Math.random()*70;
        const bh = H * hFrac * (0.35 + Math.random()*0.65);
        const windows = [];
        const cols = Math.max(1, Math.floor(bw / 14)), rows = Math.max(2, Math.floor(bh / 22));
        for (let c = 0; c < cols; c++) for (let r = 0; r < rows; r++)
            if (Math.random() < 0.28) windows.push([c, r, Math.random() < 0.6 ? '#00f0ff' : '#ff2a6d']);
        arr.push({ x, w: bw, h: bh, depth, color, windows, cols, rows });
        x += bw + 6 + Math.random()*26;
    }
    return arr;
}

function newBird(){
    return { x: W * 0.3, y: H * 0.44, vy: 0, r: 15 * S, flapT: 0, bob: 0 };
}

function reset(){
    bird = newBird();
    pipes = []; particles = [];
    score = 0; pipeTimer = 0.9;
    continueUsed = false; coinAwarded = false; invulnT = 0;
    flashT = 0; shake = 0;
    state = 'ready';
    document.getElementById('overlay').classList.add('hidden');
}

const GAP = () => Math.max(150 * S, 132);
const SPEED = () => Math.min(170 * S + score * 1.2, 260 * S);
const GRAV = () => 1180 * S;
const FLAP = () => -378 * S;

function spawnPipe(){
    const gap = GAP();
    const margin = 60 * S;
    const groundH = 56 * S;
    const cy = margin + gap/2 + Math.random() * (H - groundH - gap - margin*2);
    pipes.push({ x: W + 40, cy, gap, w: 66 * S, passed: false, hue: Math.random() < 0.5 ? 'c' : 'm' });
}

function flap(){
    initAudio();
    if (state === 'ready'){
        state = 'play';
        bird.vy = FLAP();
        bird.flapT = 1;
        sfxFlap();
        return;
    }
    if (state === 'play'){
        bird.vy = FLAP();
        bird.flapT = 1;
        sfxFlap();
        // jet puff
        for (let i = 0; i < 6; i++){
            const a = Math.PI/2 + (Math.random()-0.5)*1.1;
            particles.push({
                x: bird.x - 6*S, y: bird.y + 10*S,
                vx: -60 - Math.random()*60 + Math.cos(a)*40, vy: Math.sin(a)*90 + 40,
                life: 0.3 + Math.random()*0.25, maxLife: 0.55,
                color: Math.random() < 0.5 ? '#00f0ff' : '#f0e010', size: 1.5 + Math.random()*2.4
            });
        }
    }
}

function die(){
    if (state !== 'play' || invulnT > 0) return;
    state = 'dead';
    deathT = 0;
    flashT = 1;
    shake = 16;
    sfxDie();
    for (let i = 0; i < 36; i++){
        const a = Math.random()*Math.PI*2, s = 60 + Math.random()*260;
        particles.push({ x: bird.x, y: bird.y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 60,
            life: 0.5 + Math.random()*0.7, maxLife: 1.1,
            color: ['#00f0ff','#ff2a6d','#f0e010','#ffffff'][Math.floor(Math.random()*4)], size: 2 + Math.random()*3 });
    }
    if (score > best){ best = score; try { localStorage.setItem('flappyClawHigh', String(best)); } catch(e){} }
    document.getElementById('best').textContent = best;
    setTimeout(showGameOver, 900);
}

function showGameOver(){
    if (state !== 'dead') return;
    const isBest = score >= best && score > 0;
    document.getElementById('ovTitle').textContent = 'GAME OVER';
    document.getElementById('ovTitle').classList.remove('title-cyan');
    const medal = document.getElementById('medal');
    medal.classList.add('hidden');
    medal.classList.remove('bronze','silver','gold');
    if (score >= 50){ medal.textContent = 'GOLD'; medal.classList.add('gold'); medal.classList.remove('hidden'); }
    else if (score >= 25){ medal.textContent = 'SILVER'; medal.classList.add('silver'); medal.classList.remove('hidden'); }
    else if (score >= 10){ medal.textContent = 'BRONZE'; medal.classList.add('bronze'); medal.classList.remove('hidden'); }
    document.getElementById('ovMsg').innerHTML =
        '<span class="score-line' + (isBest ? ' newhigh' : '') + '">SCORE: ' + score + (isBest ? ' — NEW BEST!' : '') + '</span><br>BEST: ' + best;
    document.getElementById('ovBtn').onclick = e => { e.stopPropagation(); initAudio(); reset(); };
    document.getElementById('overlay').classList.remove('hidden');
}

/* ===== update ===== */
function update(dt){
    const groundH = 56 * S;
    groundX = (groundX - SPEED() * dt * 1.15) % (34 * S);

    if (state === 'ready'){
        bird.bob += dt * 3;
        bird.y = H * 0.44 + Math.sin(bird.bob) * 9 * S;
        bird.flapT = (Math.sin(bird.bob * 2) + 1) / 2;
    }

    if (state === 'play' || state === 'dead'){
        bird.vy += GRAV() * dt;
        bird.y += bird.vy * dt;
        if (bird.flapT > 0) bird.flapT -= dt * 4;
        if (invulnT > 0) invulnT -= dt;

        if (bird.y + bird.r > H - groundH){
            bird.y = H - groundH - bird.r;
            if (state === 'play'){ if (invulnT > 0){ bird.vy = FLAP(); } else die(); }
            else bird.vy = 0;
        }
        if (bird.y - bird.r < 0){ bird.y = bird.r; bird.vy = Math.max(bird.vy, 0); }
    }

    if (state === 'play'){
        pipeTimer -= dt;
        if (pipeTimer <= 0){
            spawnPipe();
            pipeTimer = Math.max(1.15, 1.55 - score * 0.008);
        }
        for (let i = pipes.length - 1; i >= 0; i--){
            const p = pipes[i];
            p.x -= SPEED() * dt;
            if (!p.passed && p.x + p.w < bird.x){
                p.passed = true;
                score++;
                sfxScore();
            }
            if (p.x + p.w < -60) pipes.splice(i, 1);
            // collision
            if (invulnT <= 0 &&
                bird.x + bird.r * 0.75 > p.x && bird.x - bird.r * 0.75 < p.x + p.w){
                if (bird.y - bird.r * 0.72 < p.cy - p.gap/2 || bird.y + bird.r * 0.72 > p.cy + p.gap/2){
                    die();
                }
            }
        }
    }

    // parallax scroll
    const sp = SPEED() * dt;
    if (state !== 'dead'){
        for (const s of stars){ s.x -= sp * s.depth; if (s.x < -4) s.x += W + 8; }
        scrollSkyline(buildingsFar, sp);
        scrollSkyline(buildings, sp);
    }

    for (let i = particles.length - 1; i >= 0; i--){
        const p = particles[i];
        p.x += p.vx * dt; p.y += p.vy * dt;
        p.vy += 300 * dt;
        p.life -= dt;
        if (p.life <= 0) particles.splice(i, 1);
    }

    if (flashT > 0) flashT -= dt * 2.4;
    if (shake > 0) shake = Math.max(0, shake - dt * 30);
}
function scrollSkyline(arr, sp){
    let maxX = -Infinity;
    for (const b of arr) maxX = Math.max(maxX, b.x + b.w);
    for (const b of arr){
        b.x -= sp * b.depth;
        if (b.x + b.w < -60){ b.x = maxX - sp * b.depth + 6 + Math.random()*26; maxX = b.x + b.w; }
    }
}

/* ===== draw ===== */
function lerp(a, b, t){ return a + (b - a) * t; }
function skyColors(){
    // day/night cycle every 30 points
    const t = (Math.sin((score / 30) * Math.PI * 2 - Math.PI/2) + 1) / 2; // 0 night -> 1 "neon day"
    const top = [lerp(4, 18, t), lerp(4, 10, t), lerp(14, 52, t)];
    const bot = [lerp(16, 70, t), lerp(8, 18, t), lerp(40, 86, t)];
    return {
        top: 'rgb(' + top.map(Math.round).join(',') + ')',
        bot: 'rgb(' + bot.map(Math.round).join(',') + ')',
        t
    };
}

function drawBird(){
    const rot = state === 'ready' ? Math.sin(bird.bob) * 0.06
        : Math.max(-0.45, Math.min(1.25, bird.vy / (520 * S)));
    ctx.save();
    ctx.translate(bird.x, bird.y);
    ctx.rotate(rot);
    const r = bird.r;
    const blink = invulnT > 0 && Math.floor(invulnT * 9) % 2 === 0;
    if (invulnT > 0){
        ctx.globalAlpha = 0.3 + Math.sin(performance.now()*0.012)*0.15;
        ctx.strokeStyle = '#05ffa1';
        ctx.shadowColor = '#05ffa1'; ctx.shadowBlur = 14;
        ctx.beginPath(); ctx.arc(0, 0, r * 1.7, 0, Math.PI*2); ctx.stroke();
        ctx.shadowBlur = 0; ctx.globalAlpha = 1;
    }
    if (blink) ctx.globalAlpha = 0.4;

    // jet exhaust
    const jet = 0.35 + bird.flapT * 0.65;
    const jl = r * (1.1 + jet * 1.3) * (0.85 + Math.random()*0.3);
    const jg = ctx.createLinearGradient(-r*0.9, 0, -r*0.9 - jl, 0);
    jg.addColorStop(0, 'rgba(240,224,16,' + (0.85*jet) + ')');
    jg.addColorStop(0.5, 'rgba(255,42,109,' + (0.5*jet) + ')');
    jg.addColorStop(1, 'rgba(255,42,109,0)');
    ctx.fillStyle = jg;
    ctx.shadowColor = '#ff2a6d'; ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.moveTo(-r*0.85, -r*0.3); ctx.lineTo(-r*0.9 - jl, 0); ctx.lineTo(-r*0.85, r*0.3);
    ctx.closePath(); ctx.fill();
    ctx.shadowBlur = 0;

    // body capsule
    const bodyG = ctx.createLinearGradient(0, -r, 0, r);
    bodyG.addColorStop(0, '#1b2a4a');
    bodyG.addColorStop(1, '#0b1226');
    ctx.fillStyle = bodyG;
    ctx.strokeStyle = '#00f0ff';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#00f0ff'; ctx.shadowBlur = 16;
    ctx.beginPath();
    ctx.ellipse(0, 0, r, r * 0.82, 0, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
    ctx.shadowBlur = 0;

    // wing (flap-animated)
    const wingA = -0.9 + bird.flapT * 1.5 + Math.sin(performance.now()*0.02) * 0.08;
    ctx.save();
    ctx.translate(-r*0.15, 0);
    ctx.rotate(wingA * 0.5);
    ctx.fillStyle = 'rgba(255,42,109,0.28)';
    ctx.strokeStyle = '#ff2a6d';
    ctx.lineWidth = 1.8;
    ctx.shadowColor = '#ff2a6d'; ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(-r*1.1, r*0.15, -r*0.75, r*0.85);
    ctx.quadraticCurveTo(-r*0.2, r*0.6, 0, 0);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();

    // visor eye
    ctx.fillStyle = '#05ffa1';
    ctx.shadowColor = '#05ffa1'; ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.ellipse(r*0.38, -r*0.18, r*0.3, r*0.22, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#06060c';
    ctx.beginPath(); ctx.arc(r*0.48, -r*0.18, r*0.09, 0, Math.PI*2); ctx.fill();

    // claw pincers on front
    ctx.strokeStyle = '#f0e010';
    ctx.lineWidth = 2.2;
    ctx.lineCap = 'round';
    ctx.shadowColor = '#f0e010'; ctx.shadowBlur = 8;
    const pinch = 0.28 + bird.flapT * 0.22;
    ctx.beginPath();
    ctx.moveTo(r*0.8, r*0.1);
    ctx.quadraticCurveTo(r*1.45, r*0.1 - r*pinch, r*1.25, r*0.1 - r*pinch*1.4);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(r*0.8, r*0.28);
    ctx.quadraticCurveTo(r*1.45, r*0.28 + r*pinch, r*1.25, r*0.28 + r*pinch*1.4);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // antenna
    ctx.strokeStyle = '#00f0ff';
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.moveTo(-r*0.1, -r*0.75);
    ctx.lineTo(-r*0.25, -r*1.25);
    ctx.stroke();
    ctx.fillStyle = '#ff2a6d';
    ctx.shadowColor = '#ff2a6d'; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(-r*0.25, -r*1.3, r*0.13, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;

    ctx.restore();
}

function drawPipes(){
    const groundH = 56 * S;
    for (const p of pipes){
        const col = p.hue === 'c' ? '#00f0ff' : '#ff2a6d';
        const colA = p.hue === 'c' ? 'rgba(0,240,255,' : 'rgba(255,42,109,';
        const topH = p.cy - p.gap/2;
        const botY = p.cy + p.gap/2;
        for (const seg of [[0, topH, true], [botY, H - groundH - botY, false]]){
            const [y, h, isTop] = seg;
            if (h <= 0) continue;
            const g = ctx.createLinearGradient(p.x, 0, p.x + p.w, 0);
            g.addColorStop(0, colA + '0.10)');
            g.addColorStop(0.5, colA + '0.30)');
            g.addColorStop(1, colA + '0.08)');
            ctx.fillStyle = g;
            ctx.fillRect(p.x, y, p.w, h);
            ctx.strokeStyle = col;
            ctx.lineWidth = 2;
            ctx.shadowColor = col; ctx.shadowBlur = 14;
            ctx.strokeRect(p.x + 1, y - (isTop ? 4 : 0), p.w - 2, h + 4);
            ctx.shadowBlur = 0;
            // cap
            const capY = isTop ? y + h - 16 : y;
            ctx.fillStyle = colA + '0.42)';
            ctx.shadowColor = col; ctx.shadowBlur = 18;
            ctx.fillRect(p.x - 5, capY, p.w + 10, 16);
            ctx.shadowBlur = 0;
            ctx.strokeRect(p.x - 5, capY, p.w + 10, 16);
            // inner light strip
            ctx.fillStyle = colA + '0.5)';
            ctx.fillRect(p.x + p.w*0.44, isTop ? y : y + 16, p.w*0.12, Math.max(0, h - 16));
        }
    }
}

function draw(){
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const sky = skyColors();
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, sky.top);
    g.addColorStop(1, sky.bot);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    if (shake > 0) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);

    // stars (fade during "day")
    const now = performance.now() * 0.002;
    for (const s of stars){
        const tw = 0.3 + 0.35 * Math.sin(now * 2 + s.tw);
        ctx.fillStyle = 'rgba(190,235,255,' + (tw * (1 - sky.t * 0.7)) + ')';
        ctx.fillRect(s.x, s.y, s.size, s.size);
    }
    // moon/sun orb
    const orbX = W * 0.82, orbY = H * (0.16 + sky.t * 0.06);
    const orbCol = sky.t > 0.5 ? '255,42,109' : '0,240,255';
    const og = ctx.createRadialGradient(orbX, orbY, 0, orbX, orbY, 60 * S);
    og.addColorStop(0, 'rgba(' + orbCol + ',0.75)');
    og.addColorStop(0.35, 'rgba(' + orbCol + ',0.25)');
    og.addColorStop(1, 'rgba(' + orbCol + ',0)');
    ctx.fillStyle = og;
    ctx.beginPath(); ctx.arc(orbX, orbY, 60 * S, 0, Math.PI*2); ctx.fill();

    // skylines
    const groundH = 56 * S;
    drawSkyline(buildingsFar, groundH, 0.55);
    drawSkyline(buildings, groundH, 1);

    drawPipes();

    // ground
    const gg = ctx.createLinearGradient(0, H - groundH, 0, H);
    gg.addColorStop(0, '#0c1030');
    gg.addColorStop(1, '#06060c');
    ctx.fillStyle = gg;
    ctx.fillRect(0, H - groundH, W, groundH);
    ctx.strokeStyle = '#00f0ff';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#00f0ff'; ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.moveTo(0, H - groundH); ctx.lineTo(W, H - groundH); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(0,240,255,0.22)';
    ctx.lineWidth = 1;
    for (let x = groundX; x < W; x += 34 * S){
        ctx.beginPath(); ctx.moveTo(x, H - groundH); ctx.lineTo(x - 14 * S, H); ctx.stroke();
    }

    // particles (additive)
    ctx.globalCompositeOperation = 'lighter';
    for (const p of particles){
        const a = Math.max(0, p.life / p.maxLife);
        ctx.globalAlpha = a;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color; ctx.shadowBlur = 10;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size * a + 0.4, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    ctx.globalCompositeOperation = 'source-over';

    drawBird();

    // big glowing score
    if (state !== 'ready'){
        ctx.textAlign = 'center';
        ctx.font = '900 ' + Math.round(54 * S) + 'px Orbitron, sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.95)';
        ctx.shadowColor = '#00f0ff'; ctx.shadowBlur = 26;
        ctx.fillText(String(score), W/2, 80 * S);
        ctx.shadowColor = '#ff2a6d'; ctx.shadowBlur = 12;
        ctx.fillText(String(score), W/2, 80 * S);
        ctx.shadowBlur = 0;
    } else {
        ctx.textAlign = 'center';
        ctx.font = '700 ' + Math.round(21 * S) + 'px Orbitron, sans-serif';
        ctx.fillStyle = '#00f0ff';
        ctx.shadowColor = '#00f0ff'; ctx.shadowBlur = 18;
        ctx.fillText('TAP / SPACE TO FLAP', W/2, H * 0.3);
        ctx.font = '400 ' + Math.round(12 * S) + 'px "Share Tech Mono", monospace';
        ctx.fillStyle = '#8899aa';
        ctx.shadowBlur = 0;
        ctx.fillText('thread the neon pipes · medals at 10 / 25 / 50', W/2, H * 0.3 + 30 * S);
    }

    // death flash
    if (flashT > 0){
        ctx.fillStyle = 'rgba(255,255,255,' + Math.max(0, flashT * 0.65) + ')';
        ctx.fillRect(-20, -20, W + 40, H + 40);
    }
}
function drawSkyline(arr, groundH, alpha){
    for (const b of arr){
        if (b.x > W + 60 || b.x + b.w < -60) continue;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = b.color;
        ctx.fillRect(b.x, H - groundH - b.h, b.w, b.h);
        ctx.strokeStyle = 'rgba(0,240,255,0.18)';
        ctx.lineWidth = 1;
        ctx.strokeRect(b.x, H - groundH - b.h, b.w, b.h);
        for (const [c, r, col] of b.windows){
            const wx = b.x + 4 + c * (b.w - 8) / b.cols;
            const wy = H - groundH - b.h + 6 + r * (b.h - 12) / b.rows;
            ctx.fillStyle = col;
            ctx.globalAlpha = alpha * 0.75;
            ctx.fillRect(wx, wy, 4, 6);
        }
        ctx.globalAlpha = 1;
    }
}

/* ===== loop ===== */
function loop(now){
    requestAnimationFrame(loop);
    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;
    update(dt);
    draw();
}

/* ===== input ===== */
function tapHandler(e){
    if (state === 'dead') return;
    if (e.cancelable) e.preventDefault();
    flap();
}
canvas.addEventListener('mousedown', tapHandler);
canvas.addEventListener('touchstart', tapHandler, {passive: false});
document.addEventListener('keydown', e => {
    if (e.key === ' ' || e.key === 'ArrowUp'){
        e.preventDefault();
        if (state !== 'dead') flap();
    }
});

window.addEventListener('resize', resize);

/* init */
resize();
reset();
lastTime = performance.now();
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
