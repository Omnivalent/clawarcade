<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Neon Racer — ClawArcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100dvh;overflow:hidden;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
        body{font-family:'Orbitron',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#05060a;color:#e8e6e3;display:flex;flex-direction:column;height:100dvh}
        body::after{
            content:'';position:fixed;inset:0;
            background:repeating-linear-gradient(0deg,rgba(0,0,0,0.08) 0px,rgba(0,0,0,0.08) 1px,transparent 1px,transparent 3px);
            pointer-events:none;z-index:1000;opacity:0.4;
        }
        .top-bar{display:flex;justify-content:space-between;align-items:center;padding:0 10px;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);flex-shrink:0;height:44px;min-height:44px;border-bottom:2px solid rgba(255,42,109,0.4);box-shadow:0 2px 20px rgba(255,42,109,0.2);gap:8px}
        .back-btn{color:#ffd23e;text-decoration:none;font-size:.7rem;letter-spacing:1px;border:1px solid rgba(255,210,62,0.4);padding:4px 8px;border-radius:14px;white-space:nowrap;text-shadow:0 0 8px rgba(255,210,62,0.5)}
        .back-btn:active{background:rgba(255,210,62,0.2)}
        .top-bar h1{font-size:.9rem;color:#ff2a6d;white-space:nowrap;text-shadow:0 0 10px rgba(255,42,109,0.8),0 0 20px rgba(255,42,109,0.4);letter-spacing:2px;animation:neonPulse 2s ease-in-out infinite}
        @keyframes neonPulse{0%,100%{text-shadow:0 0 10px rgba(255,42,109,0.8),0 0 20px rgba(255,42,109,0.4)}50%{text-shadow:0 0 20px rgba(255,42,109,1),0 0 40px rgba(255,42,109,0.6)}}
        .top-stats{display:flex;gap:10px;font-size:.72rem;align-items:center;font-family:'Rajdhani',sans-serif;font-weight:600}
        .top-stats .lbl{color:#8899aa}
        .stat-value{color:#22e59a;font-weight:bold;text-shadow:0 0 8px rgba(34,229,154,0.6);font-size:.9rem}
        .top-btn{background:rgba(255,42,109,0.1);border:2px solid rgba(255,42,109,0.4);color:#ff2a6d;padding:4px 9px;border-radius:20px;font-size:.7rem;cursor:pointer;min-height:26px;font-family:'Orbitron',sans-serif;transition:all .2s}
        .top-btn:active{background:rgba(255,42,109,0.3);transform:scale(0.95)}
        .game-area{flex:1;position:relative;min-height:0;overflow:hidden}
        canvas#game{position:absolute;inset:0;display:block;cursor:pointer}
        .hidden{display:none!important}
        .overlay{position:fixed;inset:0;background:rgba(4,4,14,0.9);display:flex;align-items:center;justify-content:center;z-index:20;animation:fadeIn .3s ease;backdrop-filter:blur(8px)}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .overlay .inner{text-align:center;padding:30px;max-width:92vw}
        .overlay h2{color:#ff2a6d;margin-bottom:14px;text-shadow:0 0 18px rgba(255,42,109,0.9),0 0 40px rgba(255,42,109,0.4);font-size:1.9rem;letter-spacing:4px}
        .overlay p{color:#aab;margin-bottom:12px;font-size:.95rem;font-family:'Rajdhani',sans-serif;font-weight:600;line-height:1.7}
        .overlay .score-line{color:#22e59a;font-size:1.25rem;text-shadow:0 0 12px rgba(34,229,154,0.7)}
        .overlay .btn{display:block;margin:12px auto 0;background:linear-gradient(135deg,#ff2a6d 0%,#a8114a 100%);color:#fff;border:none;padding:14px 38px;font-size:1rem;font-weight:700;border-radius:26px;cursor:pointer;min-height:50px;box-shadow:0 0 22px rgba(255,42,109,0.5);transition:all .2s;font-family:'Orbitron',sans-serif;letter-spacing:1px}
        .overlay .btn:active{transform:scale(0.95)}
        .newhigh{color:#ffd23e!important;text-shadow:0 0 14px rgba(255,210,62,0.8)!important}
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="../index.html" class="back-btn">← MENU</a>
        <h1>NEON RACER</h1>
        <div class="top-stats">
            <span><span class="lbl">BEST </span><span class="stat-value" id="best">0</span></span>
            <button class="top-btn" id="muteBtn">🔊</button>
        </div>
    </div>
    <div class="game-area" id="gameArea">
        <canvas id="game"></canvas>
    </div>
    <div class="overlay hidden" id="overlay">
        <div class="inner">
            <h2 id="ovTitle">TIME UP</h2>
            <p id="ovMsg"></p>
            <button class="btn" id="ovBtn">RACE AGAIN</button>
        </div>
    </div>
    <script src="../js/human-check.js"></script>
    <script src="../js/joystick.js"></script>
<script>
(function(){
'use strict';
const dpr = window.devicePixelRatio || 1;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const gameArea = document.getElementById('gameArea');

const CYAN = '#00e5f6', MAG = '#ff2a6d', GOLD = '#ffd23e', GRN = '#22e59a';

/* ===== audio ===== */
let audioCtx = null, soundEnabled = true, audioInitialized = false;
let engineOsc = null, engineGain = null, engineOsc2 = null;
function initAudio(){
    if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){ return; } }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (!engineOsc){
        try {
            engineGain = audioCtx.createGain();
            engineGain.gain.value = 0;
            const filt = audioCtx.createBiquadFilter();
            filt.type = 'lowpass'; filt.frequency.value = 420;
            engineOsc = audioCtx.createOscillator();
            engineOsc.type = 'sawtooth'; engineOsc.frequency.value = 50;
            engineOsc2 = audioCtx.createOscillator();
            engineOsc2.type = 'square'; engineOsc2.frequency.value = 25;
            const g2 = audioCtx.createGain(); g2.gain.value = 0.5;
            engineOsc.connect(filt);
            engineOsc2.connect(g2); g2.connect(filt);
            filt.connect(engineGain);
            engineGain.connect(audioCtx.destination);
            engineOsc.start(); engineOsc2.start();
        } catch(e){}
    }
    audioInitialized = true;
}
function initAudioOnce(){ if (!audioInitialized) initAudio(); }
document.addEventListener('click', initAudioOnce, {once:true});
document.addEventListener('touchstart', initAudioOnce, {once:true});
document.addEventListener('keydown', initAudioOnce, {once:true});
function playTone(freq, type, dur, vol=0.15, slideTo){
    if (!soundEnabled || !audioCtx) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1, slideTo), audioCtx.currentTime + dur);
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
}
function playNoise(dur, vol=0.25){
    if (!soundEnabled || !audioCtx) return;
    const len = Math.floor(audioCtx.sampleRate * dur);
    const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * (1 - i/len);
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    src.connect(g); g.connect(audioCtx.destination); src.start();
}
const sfxCheckpoint = () => [784, 988, 1319, 1568].forEach((f,i)=>setTimeout(()=>playTone(f,'square',0.12,0.12),i*85));
const sfxCrash = () => { playNoise(0.5, 0.35); [280,190,120,70].forEach((f,i)=>setTimeout(()=>playTone(f,'sawtooth',0.28,0.18),i*100)); };
const sfxGo = () => playTone(660, 'square', 0.25, 0.14, 990);
document.getElementById('muteBtn').onclick = e => {
    e.stopPropagation();
    initAudio(); soundEnabled = !soundEnabled;
    document.getElementById('muteBtn').textContent = soundEnabled ? '🔊' : '🔇';
};

/* ===== canvas / scale ===== */
let W = 0, H = 0, S = 1;
function resize(){
    W = gameArea.clientWidth; H = gameArea.clientHeight;
    S = H / 640;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    makeBackdrop();
}

/* ===== road geometry ===== */
const SEG_LEN = 200, ROAD_W = 2200, RUMBLE = 3;
const CAM_H = 1150, DRAW_DIST = 165, FOG_D = 4;
const CAM_DEPTH = 1 / Math.tan((100/2) * Math.PI/180);
const PLAYER_Z = CAM_H * CAM_DEPTH;
const M_PER_U = 1/130; // world units -> meters

let segments = [], trackLength = 0;
const SIGN_TEXTS = ['CLAW', 'NEON', 'TURBO', 'SYNTH', 'ARCADE', 'VAPOR'];

function lastY(){ return segments.length ? segments[segments.length-1].p2.world.y : 0; }
function addSegment(curve, y){
    const i = segments.length;
    segments.push({
        index: i, curve,
        p1: { world: { y: lastY(), z: i * SEG_LEN }, camera: {}, screen: {} },
        p2: { world: { y: y, z: (i+1) * SEG_LEN }, camera: {}, screen: {} },
        sprites: [], clip: 0
    });
}
function easeIn(a,b,p){ return a + (b-a)*p*p; }
function easeInOut(a,b,p){ return a + (b-a)*((-Math.cos(p*Math.PI)/2)+0.5); }
function addRoad(enter, hold, leave, curve, y){
    const startY = lastY(), endY = startY + y * SEG_LEN;
    const total = enter + hold + leave;
    for (let i = 0; i < enter; i++) addSegment(easeIn(0, curve, i/enter), easeInOut(startY, endY, i/total));
    for (let i = 0; i < hold; i++)  addSegment(curve, easeInOut(startY, endY, (enter+i)/total));
    for (let i = 0; i < leave; i++) addSegment(easeInOut(curve, 0, i/leave), easeInOut(startY, endY, (enter+hold+i)/total));
}
function buildTrack(){
    segments = [];
    addRoad(40, 60, 40, 0, 0);
    addRoad(30, 60, 30, -4, 0);
    addRoad(30, 50, 30, 4, 20);
    addRoad(40, 40, 40, 0, -30);
    addRoad(25, 50, 25, 6, 0);
    addRoad(25, 50, 25, -6, 10);
    addRoad(50, 80, 50, 2, 40);
    addRoad(40, 40, 40, 0, -40);
    addRoad(30, 60, 30, -5, -10);
    addRoad(40, 60, 40, 3, 25);
    addRoad(30, 60, 30, 0, -15);
    trackLength = segments.length * SEG_LEN;
    // roadside sprites: palms + neon signs
    let signN = 0;
    for (let i = 20; i < segments.length; i += 10){
        const side = (i % 20 === 0) ? -1 : 1;
        segments[i].sprites.push({ t: 'palm', o: side * (1.6 + Math.random()*1.4), v: Math.random() });
        if (Math.random() < 0.4)
            segments[(i+5) % segments.length].sprites.push({ t: 'palm', o: -side * (1.8 + Math.random()*1.6), v: Math.random() });
    }
    for (let i = 60; i < segments.length; i += 85){
        segments[i].sprites.push({ t: 'sign', o: (signN % 2 === 0 ? -1 : 1) * 2.1, v: signN % SIGN_TEXTS.length });
        signN++;
    }
}
function findSegment(z){
    return segments[Math.floor(z / SEG_LEN) % segments.length];
}

/* ===== state ===== */
let state = 'ready'; // ready | play | over
let position = 0, playerX = 0, speed = 0, totalDist = 0;
let timer = 45, nextCk = 0, ckNum = 0;
let crashT = 0, spin = 0, lean = 0, shake = 0, bgShift = 0;
let msgText = '', msgT = 0, flashT = 0;
let cars = [], dust = [], skyStars = [], mtnFar = [], mtnNear = [];
let best = 0, lastTime = 0;
const keys = { left: false, right: false, up: false, down: false };
try { best = parseInt(localStorage.getItem('neonRacerHigh') || '0') || 0; } catch(e){}
document.getElementById('best').textContent = best;

const MAX_BASE = 12000;
function maxSpeed(){ return MAX_BASE * (0.62 + 0.38 * Math.min(1, totalDist / 1200000)); }
const CK_EVERY = 110000, CK_BONUS = 20;

function makeBackdrop(){
    skyStars = [];
    for (let i = 0; i < 80; i++) skyStars.push({
        x: Math.random()*W*2, y: Math.random()*H*0.42, size: 0.6 + Math.random()*1.6, tw: Math.random()*6
    });
    mtnFar = genMtn(9, 0.10);
    mtnNear = genMtn(6, 0.16);
}
function genMtn(n, hFrac){
    const pts = [];
    for (let i = 0; i <= n; i++) pts.push(H * hFrac * (0.35 + Math.random()*0.65));
    return pts;
}

function resetCars(){
    cars = [];
    for (let i = 0; i < 12; i++){
        cars.push({
            z: ((i + 1) / 13) * trackLength,
            offset: -0.75 + Math.random()*1.5,
            speed: MAX_BASE * (0.22 + Math.random()*0.28),
            hue: [CYAN, GOLD, GRN, '#b45bff'][i % 4]
        });
    }
}

function reset(){
    position = 0; playerX = 0; speed = 0; totalDist = 0;
    timer = 45; nextCk = CK_EVERY; ckNum = 0;
    crashT = 0; spin = 0; lean = 0; shake = 0; bgShift = 0;
    msgText = ''; msgT = 0; flashT = 0;
    dust = [];
    resetCars();
    state = 'ready';
    document.getElementById('overlay').classList.add('hidden');
}
function startPlay(){
    if (state !== 'ready') return;
    state = 'play';
    timer = 45; totalDist = 0; nextCk = CK_EVERY;
    sfxGo();
    msgText = 'GO!'; msgT = 1;
}
function gameOver(){
    state = 'over';
    flashT = 0.6;
    const dist = Math.floor(totalDist * M_PER_U);
    const isBest = dist > best;
    if (isBest){ best = dist; try { localStorage.setItem('neonRacerHigh', String(best)); } catch(e){} }
    document.getElementById('best').textContent = best;
    document.getElementById('ovMsg').innerHTML =
        '<span class="score-line' + (isBest ? ' newhigh' : '') + '">DISTANCE: ' + dist + 'm' + (isBest ? ' — NEW BEST!' : '') + '</span><br>CHECKPOINTS: ' + ckNum + ' · BEST: ' + best + 'm';
    document.getElementById('ovBtn').onclick = e => { e.stopPropagation(); initAudio(); reset(); };
    document.getElementById('overlay').classList.remove('hidden');
}

/* ===== update ===== */
function update(dt){
    const ms = maxSpeed();
    const sp = speed / ms;
    const playerSeg = findSegment((position + PLAYER_Z) % trackLength);
    const dx = dt * 2 * sp;

    if (state === 'play' || state === 'ready'){
        // speed: auto-accelerate, up = boost, down = brake
        const cruise = state === 'ready' ? ms * 0.22 : ms;
        let accel = ms / 6;
        if (keys.up) accel *= 1.7;
        if (speed < cruise) speed = Math.min(cruise, speed + accel * dt);
        else speed += (cruise - speed) * Math.min(1, dt * 2);
        if (keys.down && state === 'play') speed = Math.max(0, speed - ms * 0.55 * dt);

        // steering + centrifugal pull
        let steer = 0;
        if (crashT <= 0){
            if (keys.left) steer -= 1;
            if (keys.right) steer += 1;
            playerX += steer * dx;
        }
        lean += (steer - lean) * Math.min(1, dt * 6);
        playerX -= dx * sp * playerSeg.curve * 0.31;
        playerX = Math.max(-2.4, Math.min(2.4, playerX));

        // off-road
        if (Math.abs(playerX) > 1.04 && state === 'play'){
            if (speed > ms * 0.3) speed = Math.max(ms * 0.28, speed - ms * 1.1 * dt);
            shake = Math.max(shake, 4 * sp);
            if (Math.random() < 0.7) dust.push({
                x: W/2 + (playerX > 0 ? 1 : -1) * W*0.06 + (Math.random()-0.5)*30,
                y: H - 40*S, vx: (Math.random()-0.5)*120, vy: -60 - Math.random()*90,
                life: 0.3 + Math.random()*0.3, maxLife: 0.6,
                color: Math.random() < 0.5 ? MAG : '#8b6cd9', size: 2 + Math.random()*3
            });
        }

        if (crashT > 0){
            crashT -= dt;
            spin += dt * 9;
            speed = Math.max(speed - ms * 0.5 * dt, ms * 0.12);
        }

        position += speed * dt;
        while (position >= trackLength) position -= trackLength;
        totalDist += speed * dt;
        bgShift -= playerSeg.curve * sp * dt * 90;

        // traffic
        for (const c of cars){
            c.z += c.speed * dt;
            while (c.z >= trackLength) c.z -= trackLength;
            if (state === 'play' && crashT <= 0){
                let dz = c.z - ((position + PLAYER_Z) % trackLength);
                if (dz < -trackLength/2) dz += trackLength;
                if (dz > trackLength/2) dz -= trackLength;
                if (dz > -SEG_LEN*0.2 && dz < SEG_LEN && speed > c.speed && Math.abs(playerX - c.offset) < 0.32){
                    crashT = 1.4; spin = 0;
                    speed = Math.max(c.speed * 0.5, ms * 0.15);
                    playerX += (playerX < c.offset ? -1 : 1) * 0.25;
                    shake = 16;
                    flashT = 0.5;
                    sfxCrash();
                    msgText = 'CRASH!'; msgT = 1.1;
                }
            }
        }

        // checkpoint timer
        if (state === 'play'){
            timer -= dt;
            if (totalDist >= nextCk){
                nextCk += CK_EVERY;
                ckNum++;
                timer += CK_BONUS;
                sfxCheckpoint();
                msgText = 'CHECKPOINT +' + CK_BONUS + 's'; msgT = 1.5;
            }
            if (timer <= 0){ timer = 0; gameOver(); }
        }
    }

    // engine hum tied to speed
    if (engineOsc && audioCtx){
        const p = speed / MAX_BASE;
        engineOsc.frequency.value = 46 + p * 155 + Math.sin(performance.now()*0.02) * 2;
        engineOsc2.frequency.value = 23 + p * 78;
        const target = (soundEnabled && state !== 'over') ? 0.015 + p * 0.045 : 0;
        engineGain.gain.setTargetAtTime(target, audioCtx.currentTime, 0.08);
    }

    for (let i = dust.length - 1; i >= 0; i--){
        const p = dust[i];
        p.x += p.vx * dt; p.y += p.vy * dt;
        p.life -= dt;
        if (p.life <= 0) dust.splice(i, 1);
    }
    if (msgT > 0) msgT -= dt;
    if (flashT > 0) flashT -= dt * 2;
    if (shake > 0) shake = Math.max(0, shake - dt * 26);
}

/* ===== projection ===== */
function project(p, camX, camY, camZ){
    p.camera.x = -camX;
    p.camera.y = p.world.y - camY;
    p.camera.z = p.world.z - camZ;
    p.screen.scale = CAM_DEPTH / p.camera.z;
    p.screen.x = Math.round(W/2 + p.screen.scale * p.camera.x * W/2);
    p.screen.y = Math.round(H/2 - p.screen.scale * p.camera.y * H/2);
    p.screen.w = Math.round(p.screen.scale * ROAD_W * W/2);
}
function poly(x1,y1,x2,y2,x3,y3,x4,y4,color){
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3); ctx.lineTo(x4,y4);
    ctx.closePath(); ctx.fill();
}
const FOG_C = [8, 6, 20];
function mixC(c, amt){
    return 'rgb(' + Math.round(c[0]+(FOG_C[0]-c[0])*amt) + ',' + Math.round(c[1]+(FOG_C[1]-c[1])*amt) + ',' + Math.round(c[2]+(FOG_C[2]-c[2])*amt) + ')';
}

/* ===== draw ===== */
function lerp(a,b,t){ return a + (b-a)*t; }
function draw(){
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.save();
    if (shake > 0) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);

    // ---- synthwave sky with day-night hue drift ----
    const k = (1 - Math.cos((totalDist / 600000) * Math.PI * 2)) / 2; // 0 dusk -> 1 deep night
    const horizon = H * 0.46;
    const skyTop = [lerp(24, 4, k), lerp(8, 4, k), lerp(46, 18, k)];
    const skyBot = [lerp(110, 26, k), lerp(20, 10, k), lerp(78, 52, k)];
    const sg = ctx.createLinearGradient(0, 0, 0, horizon);
    sg.addColorStop(0, mixC(skyTop, 0));
    sg.addColorStop(1, mixC(skyBot, 0));
    ctx.fillStyle = sg;
    ctx.fillRect(0, 0, W, horizon + 2);

    // stars
    const now = performance.now() * 0.002;
    for (const s of skyStars){
        const sx = (((s.x + bgShift * 0.2) % (W*2)) + W*2) % (W*2) - W*0.5;
        if (sx < -4 || sx > W + 4) continue;
        ctx.fillStyle = 'rgba(200,230,255,' + ((0.25 + 0.3*Math.sin(now*2 + s.tw)) * (0.4 + k*0.6)) + ')';
        ctx.fillRect(sx, s.y, s.size, s.size);
    }

    // chromatic sun with slats
    const sunX = W/2 + ((bgShift * 0.35) % W) * 0.3;
    const sunY = horizon - H * 0.08;
    const sunR = H * 0.17;
    ctx.save();
    ctx.beginPath(); ctx.arc(sunX, sunY, sunR, 0, Math.PI*2); ctx.clip();
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = MAG; ctx.beginPath(); ctx.arc(sunX + 4, sunY, sunR, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = CYAN; ctx.beginPath(); ctx.arc(sunX - 4, sunY, sunR, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    const sung = ctx.createLinearGradient(0, sunY - sunR, 0, sunY + sunR);
    sung.addColorStop(0, GOLD);
    sung.addColorStop(0.55, '#ff7a3c');
    sung.addColorStop(1, MAG);
    ctx.fillStyle = sung;
    ctx.beginPath(); ctx.arc(sunX, sunY, sunR, 0, Math.PI*2); ctx.fill();
    // slats
    ctx.fillStyle = mixC(skyBot, 0);
    let slY = sunY + sunR * 0.05, slH = sunR * 0.045;
    while (slY < sunY + sunR){
        ctx.fillRect(sunX - sunR, slY, sunR*2, slH);
        slY += slH * 2.6; slH *= 1.35;
    }
    ctx.restore();
    // sun bloom
    const bloom = ctx.createRadialGradient(sunX, sunY, sunR*0.4, sunX, sunY, sunR*2.4);
    bloom.addColorStop(0, 'rgba(255,120,90,0.25)');
    bloom.addColorStop(1, 'rgba(255,42,109,0)');
    ctx.fillStyle = bloom;
    ctx.fillRect(sunX - sunR*2.4, sunY - sunR*2.4, sunR*4.8, Math.max(0, horizon - (sunY - sunR*2.4)));

    // mountain silhouettes (parallax with curves)
    drawMtn(mtnFar, bgShift * 0.35, horizon, '#141034', 0.9);
    drawMtn(mtnNear, bgShift * 0.6, horizon, '#0c0a24', 1);

    // ground
    const gg = ctx.createLinearGradient(0, horizon, 0, H);
    gg.addColorStop(0, mixC([14, 8, 32], 0.6));
    gg.addColorStop(1, '#05060a');
    ctx.fillStyle = gg;
    ctx.fillRect(0, horizon, W, H - horizon);

    // ---- road segments ----
    const baseSeg = findSegment(position);
    const basePct = (position % SEG_LEN) / SEG_LEN;
    const playerSeg = findSegment((position + PLAYER_Z) % trackLength);
    const playerPct = (((position + PLAYER_Z) % trackLength) % SEG_LEN) / SEG_LEN;
    const camYw = CAM_H + lerp(playerSeg.p1.world.y, playerSeg.p2.world.y, playerPct);
    let maxY = H, x = 0, ddx = -(baseSeg.curve * basePct);
    const spriteQ = [];

    // cars grouped by segment (this frame)
    const carSegs = {};
    for (const c of cars){
        const idx = Math.floor(c.z / SEG_LEN) % segments.length;
        (carSegs[idx] = carSegs[idx] || []).push(c);
    }

    for (let n = 0; n < DRAW_DIST; n++){
        const seg = segments[(baseSeg.index + n) % segments.length];
        const looped = seg.index < baseSeg.index;
        const camZ = position - (looped ? trackLength : 0);
        const camX = playerX * ROAD_W;
        project(seg.p1, camX - x, camYw, camZ);
        project(seg.p2, camX - x - ddx, camYw, camZ);
        x += ddx; ddx += seg.curve;
        seg.clip = maxY;

        const fogAmt = 1 - Math.exp(-Math.pow(n / DRAW_DIST * 1.6, 2) * FOG_D);

        const p1 = seg.p1.screen, p2 = seg.p2.screen;
        const drawable = !(seg.p1.camera.z <= CAM_DEPTH || p2.y >= maxY || p2.y >= p1.y);

        if (drawable){
            // ground grid line (synthwave)
            if (seg.index % 4 === 0){
                ctx.strokeStyle = 'rgba(0,229,246,' + (0.12 * (1 - fogAmt)) + ')';
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(0, p1.y); ctx.lineTo(W, p1.y); ctx.stroke();
            }
            const alt = Math.floor(seg.index / RUMBLE) % 2 === 0;
            const roadC = alt ? [23, 27, 48] : [18, 21, 40];
            const rumbleC = alt ? [0, 190, 205] : [200, 30, 85];
            const rw1 = p1.w, rw2 = p2.w;
            const rmb1 = rw1 * 0.07, rmb2 = rw2 * 0.07;
            // rumble strips
            poly(p1.x - rw1 - rmb1, p1.y, p1.x - rw1, p1.y, p2.x - rw2, p2.y, p2.x - rw2 - rmb2, p2.y, mixC(rumbleC, fogAmt));
            poly(p1.x + rw1 + rmb1, p1.y, p1.x + rw1, p1.y, p2.x + rw2, p2.y, p2.x + rw2 + rmb2, p2.y, mixC(rumbleC, fogAmt));
            // road
            poly(p1.x - rw1, p1.y, p1.x + rw1, p1.y, p2.x + rw2, p2.y, p2.x - rw2, p2.y, mixC(roadC, fogAmt));
            // lane stripes
            if (alt){
                const l1 = rw1 * 0.015, l2 = rw2 * 0.015;
                for (const lane of [-1/3, 1/3]){
                    const lx1 = p1.x + rw1 * lane, lx2 = p2.x + rw2 * lane;
                    poly(lx1 - l1, p1.y, lx1 + l1, p1.y, lx2 + l2, p2.y, lx2 - l2, p2.y, mixC([225, 240, 255], fogAmt));
                }
                // center glow stripe
                poly(p1.x - l1*1.4, p1.y, p1.x + l1*1.4, p1.y, p2.x + l2*1.4, p2.y, p2.x - l2*1.4, p2.y, mixC([0, 229, 246], fogAmt * 0.8));
            }
            maxY = p2.y;
        }

        // roadside sprites
        for (const spr of seg.sprites){
            spriteQ.push({
                t: spr.t, v: spr.v,
                x: p1.x + p1.scale * spr.o * ROAD_W * W/2,
                y: p1.y, scale: p1.scale, clip: seg.clip, fog: fogAmt
            });
        }
        // traffic cars in this segment
        const segCars = carSegs[(baseSeg.index + n) % segments.length];
        if (segCars) for (const c of segCars){
            const pct = (c.z % SEG_LEN) / SEG_LEN;
            spriteQ.push({
                t: 'car', car: c,
                x: lerp(p1.x, p2.x, pct) + lerp(p1.scale, p2.scale, pct) * c.offset * ROAD_W * W/2,
                y: lerp(p1.y, p2.y, pct),
                scale: lerp(p1.scale, p2.scale, pct),
                clip: seg.clip, fog: fogAmt
            });
        }
    }

    // sprites far -> near
    for (let i = spriteQ.length - 1; i >= 0; i--) drawSprite(spriteQ[i]);

    // fog haze band at horizon over road
    const fz = ctx.createLinearGradient(0, horizon - 14*S, 0, horizon + 40*S);
    fz.addColorStop(0, 'rgba(8,6,20,0)');
    fz.addColorStop(0.5, 'rgba(24,14,50,0.35)');
    fz.addColorStop(1, 'rgba(8,6,20,0)');
    ctx.fillStyle = fz;
    ctx.fillRect(0, horizon - 14*S, W, 54*S);

    // dust particles
    ctx.globalCompositeOperation = 'lighter';
    for (const p of dust){
        const a = Math.max(0, p.life / p.maxLife);
        ctx.globalAlpha = a * 0.8;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size * a + 0.5, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';

    drawPlayerCar();

    // speed lines
    const sp = speed / MAX_BASE;
    if (sp > 0.68){
        const a = (sp - 0.68) * 2.2;
        ctx.strokeStyle = 'rgba(200,240,255,' + (a * 0.35) + ')';
        ctx.lineWidth = 1.5;
        for (let i = 0; i < 10; i++){
            const ang = (i / 10) * Math.PI * 2 + now * 3;
            const r1 = H * (0.55 + Math.random()*0.2), r2 = r1 + H*0.18;
            const cx = W/2, cy = H*0.45;
            ctx.beginPath();
            ctx.moveTo(cx + Math.cos(ang)*r1, cy + Math.sin(ang)*r1*0.6);
            ctx.lineTo(cx + Math.cos(ang)*r2, cy + Math.sin(ang)*r2*0.6);
            ctx.stroke();
        }
    }
    ctx.restore();

    drawHUD();

    if (flashT > 0){
        ctx.fillStyle = 'rgba(255,255,255,' + Math.max(0, flashT * 0.5) + ')';
        ctx.fillRect(0, 0, W, H);
    }
}

function drawMtn(pts, shift, horizon, color, alpha){
    const tile = W * 1.4;
    const step = tile / (pts.length - 1);
    let off = ((shift % tile) + tile) % tile - tile;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(-2, horizon + 2);
    for (let rep = 0; rep < 3; rep++){
        for (let i = 0; i < pts.length - 1; i++){
            ctx.lineTo(off + rep*tile + i*step, horizon - pts[i]);
        }
    }
    ctx.lineTo(W + 2, horizon + 2);
    ctx.closePath(); ctx.fill();
    ctx.globalAlpha = 1;
}

function drawSprite(s){
    if (s.clip <= 0 || s.y < 0) return;
    const a = Math.max(0, 1 - s.fog * 1.05);
    if (a <= 0.02) return;
    ctx.save();
    ctx.beginPath(); ctx.rect(0, 0, W, s.clip); ctx.clip();
    ctx.globalAlpha = a;
    if (s.t === 'palm') drawPalm(s);
    else if (s.t === 'sign') drawSign(s);
    else if (s.t === 'car') drawTraffic(s);
    ctx.restore();
    ctx.globalAlpha = 1;
}
function drawPalm(s){
    const h = s.scale * 3400 * (0.8 + s.v*0.4) * H/2;
    if (h < 3) return;
    const w = h * 0.06;
    const sway = Math.sin(performance.now()*0.001 + s.v*9) * h * 0.03;
    ctx.strokeStyle = '#1a0f36';
    ctx.lineWidth = Math.max(1, w);
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.quadraticCurveTo(s.x + h*0.08, s.y - h*0.55, s.x + h*0.12 + sway, s.y - h);
    ctx.stroke();
    // neon edge on trunk
    ctx.strokeStyle = 'rgba(255,42,109,0.55)';
    ctx.lineWidth = Math.max(0.5, w*0.3);
    ctx.stroke();
    // fronds
    const tx = s.x + h*0.12 + sway, ty = s.y - h;
    ctx.strokeStyle = 'rgba(0,229,246,0.85)';
    ctx.lineWidth = Math.max(1, w*0.5);
    for (let i = 0; i < 6; i++){
        const ang = -Math.PI*0.95 + i * (Math.PI*0.95/5) + Math.PI*0.03;
        const fl = h * 0.36;
        ctx.beginPath();
        ctx.moveTo(tx, ty);
        ctx.quadraticCurveTo(tx + Math.cos(ang)*fl*0.7, ty + Math.sin(ang)*fl*0.7 - fl*0.16, tx + Math.cos(ang)*fl, ty + Math.sin(ang)*fl + fl*0.32);
        ctx.stroke();
    }
}
function drawSign(s){
    const h = s.scale * 2600 * H/2;
    if (h < 4) return;
    const w = h * 1.5;
    const col = s.v % 2 === 0 ? CYAN : MAG;
    // posts
    ctx.fillStyle = '#141031';
    ctx.fillRect(s.x - w*0.35, s.y - h*0.55, Math.max(1, w*0.05), h*0.55);
    ctx.fillRect(s.x + w*0.3, s.y - h*0.55, Math.max(1, w*0.05), h*0.55);
    // board
    ctx.fillStyle = 'rgba(6,8,18,0.92)';
    ctx.strokeStyle = col;
    ctx.lineWidth = Math.max(1, h*0.03);
    ctx.shadowColor = col; ctx.shadowBlur = Math.min(20, h*0.12);
    ctx.fillRect(s.x - w/2, s.y - h, w, h*0.5);
    ctx.strokeRect(s.x - w/2, s.y - h, w, h*0.5);
    ctx.shadowBlur = 0;
    if (h > 14){
        ctx.fillStyle = col;
        ctx.font = '700 ' + (h*0.22) + 'px Orbitron, sans-serif';
        ctx.textAlign = 'center';
        ctx.shadowColor = col; ctx.shadowBlur = 8;
        ctx.fillText(SIGN_TEXTS[Math.floor(s.v) % SIGN_TEXTS.length], s.x, s.y - h*0.68);
        ctx.shadowBlur = 0;
    }
}
function drawTraffic(s){
    const w = s.scale * 1300 * W/2;
    if (w < 2) return;
    const h = w * 0.62;
    const x = s.x, y = s.y;
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath(); ctx.ellipse(x, y, w*0.55, h*0.1, 0, 0, Math.PI*2); ctx.fill();
    // body
    const g = ctx.createLinearGradient(x, y - h, x, y);
    g.addColorStop(0, '#262a4c');
    g.addColorStop(1, '#101226');
    ctx.fillStyle = g;
    ctx.strokeStyle = s.car.hue;
    ctx.lineWidth = Math.max(1, w*0.03);
    ctx.beginPath();
    ctx.moveTo(x - w*0.5, y);
    ctx.lineTo(x - w*0.42, y - h*0.55);
    ctx.lineTo(x - w*0.3, y - h*0.9);
    ctx.lineTo(x + w*0.3, y - h*0.9);
    ctx.lineTo(x + w*0.42, y - h*0.55);
    ctx.lineTo(x + w*0.5, y);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // rear window
    ctx.fillStyle = 'rgba(0,229,246,0.25)';
    ctx.fillRect(x - w*0.24, y - h*0.84, w*0.48, h*0.26);
    // tail lights
    ctx.fillStyle = s.car.hue;
    ctx.shadowColor = s.car.hue; ctx.shadowBlur = Math.min(16, w*0.12);
    ctx.fillRect(x - w*0.42, y - h*0.42, w*0.2, h*0.1);
    ctx.fillRect(x + w*0.22, y - h*0.42, w*0.2, h*0.1);
    ctx.shadowBlur = 0;
}

function drawPlayerCar(){
    const cw = Math.min(W * 0.24, 190 * S);
    const ch = cw * 0.5;
    const cx = W/2 + lean * 8 * S;
    const cy = H - 26 * S;
    const sp = speed / MAX_BASE;
    const bounce = Math.sin(performance.now() * 0.02) * sp * 2.2 * S;
    ctx.save();
    ctx.translate(cx, cy - ch*0.5 + bounce);
    let rot = lean * 0.07;
    if (crashT > 0) rot += Math.sin(spin) * 0.9 * Math.min(1, crashT);
    ctx.rotate(rot);

    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.beginPath(); ctx.ellipse(0, ch*0.5, cw*0.56, ch*0.12, 0, 0, Math.PI*2); ctx.fill();

    // wheels
    ctx.fillStyle = '#07080f';
    ctx.fillRect(-cw*0.5, ch*0.18, cw*0.14, ch*0.34);
    ctx.fillRect(cw*0.36, ch*0.18, cw*0.14, ch*0.34);

    // body
    const bg = ctx.createLinearGradient(0, -ch*0.5, 0, ch*0.5);
    bg.addColorStop(0, '#4a1560');
    bg.addColorStop(0.6, '#2a0f3d');
    bg.addColorStop(1, '#140722');
    ctx.fillStyle = bg;
    ctx.strokeStyle = MAG;
    ctx.lineWidth = 2;
    ctx.shadowColor = MAG; ctx.shadowBlur = 18;
    ctx.beginPath();
    ctx.moveTo(-cw*0.5, ch*0.42);
    ctx.lineTo(-cw*0.46, -ch*0.05);
    ctx.lineTo(-cw*0.3, -ch*0.16);
    ctx.lineTo(cw*0.3, -ch*0.16);
    ctx.lineTo(cw*0.46, -ch*0.05);
    ctx.lineTo(cw*0.5, ch*0.42);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.shadowBlur = 0;

    // cabin
    const cg = ctx.createLinearGradient(0, -ch*0.52, 0, -ch*0.14);
    cg.addColorStop(0, 'rgba(0,229,246,0.5)');
    cg.addColorStop(1, 'rgba(0,90,110,0.35)');
    ctx.fillStyle = cg;
    ctx.strokeStyle = CYAN;
    ctx.lineWidth = 1.6;
    ctx.shadowColor = CYAN; ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.moveTo(-cw*0.26, -ch*0.16);
    ctx.lineTo(-cw*0.18, -ch*0.5);
    ctx.lineTo(cw*0.18, -ch*0.5);
    ctx.lineTo(cw*0.26, -ch*0.16);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.shadowBlur = 0;

    // tail light bar
    ctx.fillStyle = GOLD;
    ctx.shadowColor = GOLD; ctx.shadowBlur = 16;
    ctx.fillRect(-cw*0.4, ch*0.06, cw*0.8, ch*0.09);
    ctx.fillStyle = MAG;
    ctx.shadowColor = MAG;
    ctx.fillRect(-cw*0.44, ch*0.2, cw*0.16, ch*0.11);
    ctx.fillRect(cw*0.28, ch*0.2, cw*0.16, ch*0.11);
    ctx.shadowBlur = 0;

    // exhaust flicker at high speed
    if (sp > 0.85 && Math.random() < 0.6){
        ctx.fillStyle = 'rgba(0,229,246,0.7)';
        ctx.shadowColor = CYAN; ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.ellipse(-cw*0.3, ch*0.44, cw*0.05, ch*0.08 + Math.random()*ch*0.06, 0, 0, Math.PI*2);
        ctx.ellipse(cw*0.3, ch*0.44, cw*0.05, ch*0.08 + Math.random()*ch*0.06, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
    ctx.restore();
}

function drawHUD(){
    ctx.textAlign = 'center';
    if (state !== 'ready'){
        // timer
        const tSec = Math.ceil(timer);
        const low = timer < 6 && state === 'play';
        ctx.font = '900 ' + Math.round(42 * S) + 'px Orbitron, sans-serif';
        ctx.fillStyle = low ? (Math.floor(performance.now()/250) % 2 ? MAG : '#ffffff') : 'rgba(255,255,255,0.95)';
        ctx.shadowColor = low ? MAG : CYAN; ctx.shadowBlur = 22;
        ctx.fillText(String(tSec), W/2, 52 * S);
        ctx.shadowBlur = 0;
        ctx.font = '600 ' + Math.round(11 * S) + 'px Rajdhani, sans-serif';
        ctx.fillStyle = '#8899aa';
        ctx.fillText('TIME', W/2, 66 * S);
        // distance
        ctx.textAlign = 'right';
        ctx.font = '700 ' + Math.round(16 * S) + 'px Orbitron, sans-serif';
        ctx.fillStyle = GRN;
        ctx.shadowColor = GRN; ctx.shadowBlur = 10;
        ctx.fillText(Math.floor(totalDist * M_PER_U) + 'm', W - 14, 30 * S);
        ctx.shadowBlur = 0;
        // speed
        ctx.font = '700 ' + Math.round(20 * S) + 'px Orbitron, sans-serif';
        ctx.fillStyle = GOLD;
        ctx.shadowColor = GOLD; ctx.shadowBlur = 12;
        ctx.fillText(Math.round(speed * 3.6 * M_PER_U * 10) / 10 | 0, W - 14, H - 28 * S);
        ctx.shadowBlur = 0;
        ctx.font = '600 ' + Math.round(11 * S) + 'px Rajdhani, sans-serif';
        ctx.fillStyle = '#8899aa';
        ctx.fillText('KM/H', W - 14, H - 14 * S);
        ctx.textAlign = 'center';
    }
    if (msgT > 0){
        ctx.globalAlpha = Math.min(1, msgT * 2);
        ctx.font = '900 ' + Math.round(26 * S) + 'px Orbitron, sans-serif';
        ctx.fillStyle = msgText.indexOf('CRASH') >= 0 ? MAG : GOLD;
        ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 24;
        ctx.fillText(msgText, W/2, H * 0.3);
        ctx.shadowBlur = 0; ctx.globalAlpha = 1;
    }
    if (state === 'ready'){
        ctx.font = '700 ' + Math.round(20 * S) + 'px Orbitron, sans-serif';
        ctx.fillStyle = MAG;
        ctx.shadowColor = MAG; ctx.shadowBlur = 18;
        ctx.fillText('← → STEER · TAP TO LAUNCH', W/2, H * 0.24);
        ctx.font = '600 ' + Math.round(13 * S) + 'px Rajdhani, sans-serif';
        ctx.fillStyle = '#aab';
        ctx.shadowBlur = 0;
        ctx.fillText('auto-throttle · ↓ brakes · dodge traffic', W/2, H * 0.24 + 26 * S);
        ctx.fillText('hit checkpoints before the clock runs out', W/2, H * 0.24 + 44 * S);
    }
}

/* ===== loop ===== */
function loop(now){
    requestAnimationFrame(loop);
    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;
    update(dt);
    draw();
}

/* ===== input ===== */
document.addEventListener('keydown', e => {
    let used = true;
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
    else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
    else if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.up = true;
    else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.down = true;
    else if (e.key !== ' ') used = false;
    if (used){
        if (e.cancelable) e.preventDefault();
        startPlay();
    }
});
document.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.up = false;
    if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.down = false;
});
// touch/click halves of the canvas steer
function pointerSteer(e){
    if (e.cancelable) e.preventDefault();
    initAudio();
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX !== undefined ? e.clientX : 0) - rect.left;
    keys.left = x < rect.width / 2;
    keys.right = !keys.left;
    startPlay();
}
function pointerStop(){ keys.left = false; keys.right = false; }
canvas.addEventListener('pointerdown', pointerSteer);
canvas.addEventListener('pointermove', e => { if (e.buttons) pointerSteer(e); });
canvas.addEventListener('pointerup', pointerStop);
canvas.addEventListener('pointercancel', pointerStop);
canvas.addEventListener('pointerleave', pointerStop);

window.addEventListener('resize', resize);

/* mobile analog stick (dispatches synthetic Arrow key events) */
if (window.ArcadeStick) ArcadeStick.create({ mode: 'hold', axes: 4, lockY: true });

/* init */
buildTrack();
resize();
reset();
lastTime = performance.now();
requestAnimationFrame(loop);
})();
</script>
